name: ci

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same PR supersedes the in-flight run — cancel it. Push (main) runs each get
# a unique group (run_id) so back-to-back merges never queue-cancel each other (GitHub allows only
# one running + one pending run per group, regardless of cancel-in-progress).
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: lint OpenAPI
        run: npx --yes @redocly/cli lint --config packages/contracts/redocly.yaml packages/contracts/openapi.yaml

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install uv
        # exact pin — setup-uv stopped publishing floating major tags at v8
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
      - name: sync
        working-directory: apps/api
        run: uv sync --frozen
      - name: lint
        working-directory: apps/api
        run: uv run ruff check . && uv run ruff format --check --diff .
      - name: types
        working-directory: apps/api
        run: uv run mypy src
      - name: unit tests
        working-directory: apps/api
        run: uv run pytest -m unit

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: easysynq
          POSTGRES_PASSWORD: easysynq
          POSTGRES_DB: easysynq
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U easysynq" --health-interval 5s
          --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL_SYNC: postgresql+psycopg://easysynq:easysynq@localhost:5432/easysynq
      DATABASE_URL: postgresql+psycopg://easysynq:easysynq@localhost:5432/easysynq
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
      - working-directory: apps/api
        run: uv sync --frozen
      - name: upgrade head then downgrade base (reversible) then back to head
        working-directory: apps/api
        run: uv run alembic upgrade head && uv run alembic downgrade base && uv run alembic upgrade head
      - name: autogenerate drift check (models == migrations)
        working-directory: apps/api
        run: uv run alembic check

  # The integration suite is sharded across N parallel runners (pytest-split, balanced by the
  # committed apps/api/.test_durations). Each shard is its own process spinning its own testcontainers
  # → the single-DB / single-org contract holds per shard. ~45 min serial → ~13 min wall.
  #
  # Each green shard also re-times exactly the tests it ran (--store-durations --clean-durations
  # replaces the workspace file with this shard's fresh timings; the *split* still reads the
  # committed file) and publishes them as an artifact. scripts/refresh-test-durations.sh merges the
  # four into apps/api/.test_durations — re-run it whenever shard wall-clocks drift apart.
  integration-shards:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
      - working-directory: apps/api
        run: uv sync --frozen
      - name: integration tests (shard ${{ matrix.group }}/4, testcontainers spin their own Postgres)
        working-directory: apps/api
        run: >-
          uv run pytest -m integration --splits 4 --group ${{ matrix.group }}
          --durations-path .test_durations --store-durations --clean-durations
      - name: publish fresh shard durations
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: test-durations-${{ matrix.group }}
          path: apps/api/.test_durations
          # dotfile: v4 excludes hidden files by default → without this the upload silently
          # matches zero files; error (not the default warn) keeps that failure loud.
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  # Aggregator gate: keeps the required-status-check name "integration" stable (no branch-protection
  # change needed) and passes iff EVERY shard passed.
  integration:
    needs: integration-shards
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: gate on the shard results
        run: |
          result='${{ needs.integration-shards.result }}'
          if [ "$result" != "success" ]; then
            echo "integration shards did not all pass (result=$result)"; exit 1
          fi
          echo "all integration shards passed"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - working-directory: apps/web
        run: npm ci
      - working-directory: apps/web
        run: npm run lint && npm run typecheck && npm run build && npm test

  # Dependency + filesystem + base-image vulnerability scan (Phase-1 tech-debt: I-1). WARN-ONLY on the
  # FINDINGS: a scan that RUNS and finds CVEs/secrets is reported but does not fail the job (so the
  # baseline surfaces without blocking merges on pre-existing transitive CVEs). But a scan that FAILS TO
  # RUN (uvx/npm/registry error → no valid report) DOES fail its step, so a never-ran scan can't read
  # green (Codex #153). NOT in branch protection's required checks. RATCHET to a hard gate once the
  # baseline is clean: make pip-audit/npm-audit also fail on findings, set trivy `exit-code: "1"` + drop
  # its `continue-on-error`, and add `security` to the required checks.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
      - name: pip-audit (Python deps, resolved from uv.lock)
        working-directory: apps/api
        run: |
          uv export --frozen --no-emit-project --format requirements-txt -o "$RUNNER_TEMP/py-requirements.txt"
          # A valid JSON report proves pip-audit actually RAN. Warn-only on findings; FAIL the step if
          # no report was produced (uvx couldn't fetch pip-audit, a resolver error, …) so a never-ran
          # scan isn't silently green (Codex #153).
          set +e
          uvx pip-audit -r "$RUNNER_TEMP/py-requirements.txt" --format json -o "$RUNNER_TEMP/pip-audit.json"
          set -e
          if ! jq -e . "$RUNNER_TEMP/pip-audit.json" >/dev/null 2>&1; then
            echo "::error::pip-audit produced no valid JSON report — the scan did not run"; exit 1
          fi
          echo "pip-audit ran. Vulnerable locked dependencies (if any):"
          jq -r '(.dependencies // [])[] | select((.vulns // []) | length > 0) | "  \(.name) \(.version): \([.vulns[].id] | join(", "))"' "$RUNNER_TEMP/pip-audit.json"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: npm audit (web deps, from package-lock.json)
        working-directory: apps/web
        run: |
          # Same posture: a valid JSON report proves npm audit RAN. Warn-only on findings; FAIL on a
          # transport/registry error that produced no report (Codex #153).
          set +e
          npm audit --audit-level=high --json > "$RUNNER_TEMP/npm-audit.json"
          set -e
          if ! jq -e '.metadata.vulnerabilities' "$RUNNER_TEMP/npm-audit.json" >/dev/null 2>&1; then
            echo "::error::npm audit produced no valid report — the scan did not run"
            cat "$RUNNER_TEMP/npm-audit.json" 2>/dev/null || true
            exit 1
          fi
          echo "npm audit severity counts (high/critical are the warn signal):"
          jq '.metadata.vulnerabilities' "$RUNNER_TEMP/npm-audit.json"
      - name: trivy filesystem scan (vuln + secret + IaC misconfig; HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true # warn-only: a trivy/DB-fetch hiccup must not fail the (non-required) job
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table
      # The fs scan above does NOT detect base-image / apt OS-package CVEs (Trivy needs an image
      # target). Scan the two Dockerfile FROM refs so a vulnerable base layer can't be baked into the
      # air-gap bundle unnoticed (Codex #153). NOTE: this covers the BASE layer; a full built-image
      # scan (our own apt installs) is the ratchet — kept off the per-PR path for build-time cost.
      - name: trivy image scan — API base (python:3.12-slim-bookworm)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true # warn-only (the action's vuln-DB fetch can be flaky on a non-required job)
        with:
          scan-type: image
          image-ref: python:3.12-slim-bookworm
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table
      - name: trivy image scan — web base (node:22-slim)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true # warn-only
        with:
          scan-type: image
          image-ref: node:22-slim
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table
