            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Task" } }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /tasks/{task_id}:
    get:
      tags: [tasks]
      operationId: getTask
      summary: "A single task the caller may see (assignee or candidate); else 404 (sensitive collapse)."
      parameters:
        - { name: task_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The task.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /tasks/{task_id}/decision:
    post:
      tags: [tasks]
      operationId: decideTask
      summary: "The canonical approval/review trigger — writes signature_event + task_outcome + audit in one txn."
      description: >-
        Dispatches on the task's workflow subject. DOCUMENT: permission is derived from the
        outcome — approve → document.approve (sig-hook, SoD-1/2 enforced → 403 sod_violation with
        conflicting_duty); changes_requested/reject → document.review. CAPA (action-plan approval):
        authorized by candidate-pool membership (the role-resolved approver pool — no document
        permission); on the completing approval it writes a signature_event(meaning=approval,
        signed_object=capa_stage) + the signed ActionPlan stage and flips the CAPA to ActionPlan;
        409 if the actor already decided an earlier stage of the same approval. Idempotent via the
        Idempotency-Key header (replay on match, else 409).
      parameters:
        - { name: task_id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Decision" }
      responses:
        "200":
          description: The recorded decision (+ the signature_event for an approval).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DecisionResult" }
        "403":
          description: "permission_denied, or sod_violation (with conflicting_duty), or step_up_required."
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: "Task already decided (conflict), or an illegal lifecycle transition."
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /workflow-instances/{instance_id}:
    get:
