openapi: 3.1.0
info:
  title: EasySynQ API
  version: 0.1.0
  description: >-
    The external HTTP contract for the EasySynQ self-hosted ISO 9001:2015 QMS.
    OpenAPI-first source of truth (doc 15): the FastAPI server models and the TS
    client are generated from THIS document; the running server is proven to
    conform via schemathesis. Lifecycle transitions are named action sub-resources,
    never `PATCH status=`. Immutability shows up as the absence of write verbs.

    Slice S0 (walking skeleton) covers only the health surface + the shared
    RFC 9457 problem model and standard parameters. Later slices add the auth,
    document, version, lock, task, audit, and search routers.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/v1
    description: Versioned QMS surface (behind Caddy; same origin as the SPA).

tags:
  - name: health
    description: Liveness and readiness. Public, unversioned-friendly probes.
  - name: auth
    description: Authentication & session. Keycloak OIDC + PKCE; the API is a resource server.
  - name: setup
    description: >-
      First-run setup wizard (slice S8a). Latch-exempt; the QMS surface is 423 setup_incomplete
      until setup finalizes to OPERATIONAL. The bootstrap secret grants the first System
      Administrator (outside the PEP); org-profile + finalize need config.update.
  - name: authz
    description: >-
      Authorization admin — the permission catalog, roles, and per-user role/override
      grants. Deny-by-default, deny-wins; reads need role.read/user.read, grants need
      permission.grant (two-tier guard).
  - name: users
    description: >-
      User-lifecycle admin (slice S8d) — the roster, invite (pre-create INVITED, reconciled by
      JIT), and enable/disable (with a last-admin lock-out guard). Needs user.read / user.create /
      user.deactivate. Per-user role/override grants live under the authz tag.
  - name: documents
    description: >-
      The controlled vault — documents, the check-out → presigned CAS upload → immutable
      check-in cycle, break-lock, and version reads. Content I/O is presigned (never proxied);
      check-in is content-addressed (identical bytes create no new version) and requires a
      change reason + significance (INV-3).
  - name: clauses
    description: >-
      The ISO 9001:2015 clause spine (slice S9) — read-only reference data (INSERT-by-seed only,
      no write surface) — and the M:N document↔clause mapping. Reading the spine needs
      clauseMap.read; the per-document mapping sub-resources (under /documents/{id}) need
      document.read (list) / document.manage_metadata (map, unmap). A document must carry ≥1
      clause mapping before submit-review.
  - name: processes
    description: >-
      The ISO 9001 Clause 4.4 process landscape (slice S9c) — the process graph (nodes + edges)
      and the M:N document↔process link. Reads need process.read (default SYSTEM scope); authoring
      needs process.create (create) / process.manage (update, edges); the per-document
      process-link sub-resources (under /documents/{id}) need document.manage_metadata.
  - name: records
    description: >-
      Records & documented evidence (slice S-rec-1, doc 06) — the "retain" half of ISO documented
      information. A Record is immutable proof an activity happened: captured once (base + subtype +
      WORM-sealed evidence + content_hash), never edited. There is no PATCH/PUT/DELETE on a record —
      corrections capture a successor (correction_of); only the evidence-link sub-resource has a
      DELETE (an audited annotation). Capture/correction/linking need record.create (held by no role
      at a records-reachable scope → grant via override); reads need record.read (row-filtered list).
  - name: retention-policies
    description: >-
      Retention-policy management (slice S-rec-4, doc 06 §5.1) — CRUD + soft-archive over the
      policy-as-data schedules. Reads need retention.read (QMS Owner + Internal Auditor), writes need
      retention.manage (QMS Owner) — the two CONTENT-domain keys opened additively in 0028 (R38).
      A hard DELETE is impossible (3 RESTRICT FKs); retirement is the soft :archive action. PATCH is
      extend-forward only while records are pinned (doc 06 §5.2); shorten-for-future = archive + new.
  - name: imports
    description: >-
      The Ingestion engine (slice S-ing-1, doc 09, UJ-2) — bulk-import an existing QMS file tree into
      the controlled vault. THIS slice ships the run + scan/inventory foundation only: it walks a
      read-only mounted source root, inventories every file (path/size/mtime/mime/sha256), applies the
      §4.2 filters/quarantine, content-addresses included bytes into a non-WORM staging bucket, and
      produces a calm inventory summary — all transient import_* rows; it writes NOTHING to the vault
      (extract/classify/dedup/review/commit are later slices). SYSTEM-scope, admin-only: writes
      (create + cancel) need import.execute, reads need import.review (the SoD-as-data split, R5/R35).
  - name: audit
    description: >-
      The append-only, hash-chained audit trail (read-only). No POST/PATCH/DELETE ever —
      append-only + hash-chained is a system invariant, not an API capability (the app DB role
      lacks UPDATE/DELETE on audit_event). Gated by system.audit_log.read. verify-chain recomputes
      the chain on demand; /audit/status surfaces the tamper-evidence soft-gate (R13).
  - name: search
    description: >-
      Unified search (slice S10) — Postgres-FTS over the document metadata plane behind an Indexer
      seam (OpenSearch is a v1 drop-in, R34). Results are post-filtered by the caller's effective
      document.read; a list surface filters rather than 403s, so a caller who may read nothing gets
      200 with an empty result set and a non-zero hidden_by_scope ("N hidden by your access scope").
  - name: reports
    description: >-
      QMS-health reporting (slice S10) — the org-wide Compliance Checklist (★ mandatory-item
      coverage), computed from PostgreSQL only (never the search index). Gated by
      report.compliance_checklist.read (SYSTEM; held by QMS Owner and Internal Auditor).
  - name: evidence-packs
    description: >-
      Evidence Packs (UJ-7, slices S-pack-1/2) — on-demand, scope-limited, immutable, self-verifying
      bundles of records + their evidence + a traceability manifest, sealed and registered as a
      RETAIN_PERMANENT EVIDENCE Record. Preview is synchronous; build/seal runs on the worker (poll
      GET for SEALED). Gated by report.evidence_pack.generate (SYSTEM override); download by
      report.export. The pack content is immutable once sealed (no PUT/PATCH/DELETE). S-pack-2 adds
      external delivery: a time-boxed, revocable Ed25519 share link (share/revoke ride
      report.evidence_pack.generate) + a PUBLIC, no-auth, latch-exempt guest landing + ZIP/PDF
      download where the signed token IS the authorization.
  - name: admin
    description: >-
      Post-OPERATIONAL organization configuration. PATCH /admin/config carries org-level toggles
      (today the Mode-B capture_pre_release_templates flag, doc 06 §4.2), gated on the SYSTEM-domain
      config.update key (admin-only; the R35 two-tier guard blocks a content-tier grant).
  - name: audits
    description: >-
      Internal audits (slice S-aud-1, doc 02 Cl 9.2, doc 10 §5) — the maintained audit programme +
      its plans (the schedule) and the retained audit records walked through a linear lifecycle FSM
      (Scheduled→Planned→InProgress→FindingsDraft→Reported→Closing→Closed). Programmes/plans need
      audit.plan (QMS Owner, SYSTEM scope); audits are created with audit.create and conducted/closed
      with audit.conduct / audit.close (PROCESS scope, resolved from the plan's auditee process with a
      SYSTEM-override fallback); reads need audit.read. All keys are the seeded doc-07 catalog. An
      audit is a kind=RECORD subtype, so its lifecycle events also surface at
      /documents/{id}/audit-events. Findings + the NC→CAPA close gate land in S-aud-2.
  - name: capa
    description: >-
      CAPA core + intake (slice S-capa-1, doc 02 Cl 8.7/10.2, doc 10 §6) — corrective-action
      containers (a kind=RECORD subtype with a mutable close_state + an append-only capa_stage
      trail; S-capa-1 wires Raised→Containment via capa.update), lightweight customer complaints
      (R16) that one-click spawn a CAPA (capa.create, idempotent), and NCRs (ISO 8.7 nonconforming
      output, R20) with a recorded disposition (ncr.create / ncr.record_correction). The PROCESS-
      scoped write keys resolve scope from the relevant process (SYSTEM fallback). All keys are the
      seeded doc-07 catalog (S-capa-1 backfills the orphaned grants — no new keys).
  - name: dcr
    description: >-
      Document Change Request — core + intake (slice S-dcr-1, doc 05 §5, doc 14 §7, doc 15 §8.7). A
      DCR is a controlled WORKFLOW object with a mutable state + an append-only dcr_stage_event trail
      (R22 — NOT a kind=RECORD artifact). S-dcr-1 wires the Open intake (raise) + edit-while-Open
      (PATCH) + cancel; assess (S-dcr-2), route + approval (S-dcr-4), implement/close (S-dcr-5) are
      later slices. Keys are the seeded changeRequest.* catalog family (R5 normalizes doc 15's
      dcr.*): create/read are granted by 0004, assess/close backfilled by 0040 — no new keys.

paths:
  /healthz:
    get:
      tags: [health]
      operationId: getHealthz
      summary: Liveness probe
      description: Process is up. Does not check dependencies. Always cheap.
      security: []
      responses:
        "200":
          description: The service process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
              example: { status: ok, service: api, version: "0.1.0" }

  /readyz:
    get:
      tags: [health]
      operationId: getReadyz
      summary: Readiness probe
      description: >-
        Reports reachability of every backing dependency (PostgreSQL, MinIO,
        Redis, Keycloak) plus the Alembic migration head. OpenSearch is NOT
        checked in the MVP (omitted per Decisions Register R34). Returns 200 when
        all required dependencies are ready, 503 otherwise.
      security: []
      responses:
        "200":
          description: All required dependencies are ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Readiness" }
        "503":
          description: One or more required dependencies are not ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Readiness" }

  /auth/config:
    get:
      tags: [auth]
      operationId: getAuthConfig
      summary: Public OIDC config the SPA needs to start Authorization-Code + PKCE.
      security: []
      responses:
        "200":
          description: Realm / client / audience.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthConfig" }

  /setup/state:
    get:
      tags: [setup]
      operationId: getSetupState
      summary: The first-run setup latch state (public, so the SPA can route before sign-in).
      security: []
      responses:
        "200":
          description: The current setup_state.
          content:
            application/json:
              schema:
                type: object
                required: [setup_state]
                properties:
                  setup_state: { type: string, enum: [UNINITIALIZED, IN_SETUP, OPERATIONAL] }

  /setup:
    get:
      tags: [setup]
      operationId: getSetup
      summary: The wizard view — state + live gate status + current org profile. Authenticated.
      responses:
        "200":
          description: Setup state, gate status, and org profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupDetail" }

  /setup/bootstrap:
    post:
      tags: [setup]
      operationId: bootstrapSetup
      summary: >-
        Consume the one-time install secret and grant the caller System Administrator
        (the bootstrap-of-trust). Authenticated, but outside the PEP — the secret authorizes it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [secret]
              properties:
                secret: { type: string }
      responses:
        "200":
          description: The caller is now System Administrator; setup_state advanced to IN_SETUP.
          content:
            application/json:
              schema:
                type: object
                required: [setup_state, admin_user_id]
                properties:
                  setup_state: { type: string }
                  admin_user_id: { type: string, format: uuid }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "429": { $ref: "#/components/responses/ProblemResponse" }

  /setup/org-profile:
    patch:
      tags: [setup]
      operationId: setSetupOrgProfile
      summary: Set the organization profile (Step 2 / gate G-E). Needs config.update.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrgProfileUpdate" }
      responses:
        "200":
          description: The updated org profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrgProfileUpdate" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /setup/verify-storage:
    post:
      tags: [setup]
      operationId: verifySetupStorage
      summary: >-
        Verify the vault bucket enforces WORM object-lock (gate G-B) + record the object-lock mode
        (GOVERNANCE default; COMPLIANCE recorded but not plumbed in v1, D-7). Needs storage.manage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                object_lock_mode: { type: string, enum: [GOVERNANCE, COMPLIANCE], default: GOVERNANCE }
      responses:
        "200":
          description: WORM verified; G-B satisfied.
          content:
            application/json:
              schema:
                type: object
                required: [worm_verified, object_lock_mode]
                properties:
                  worm_verified: { type: boolean }
                  object_lock_mode: { type: string }
                  retain_until: { type: [string, "null"], format: date-time }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: The vault bucket does not enforce WORM (worm_not_enforced).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /setup/configure-backup:
    post:
      tags: [setup]
      operationId: configureSetupBackup
      summary: >-
        Record the admin-controlled backup policy + a live destination writability check (Step 4
        config; doc 08 §8.1). Needs backup.configure. Does NOT satisfy gate G-C — the restore-test
        drill must PASS. Rejects wal_pitr_enabled=true (reserved for a later release, D-6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination]
              properties:
                destination: { type: string }
                cron: { type: string, default: "0 2 * * *" }
                retention_daily: { type: integer, default: 7 }
                retention_weekly: { type: integer, default: 4 }
                retention_monthly: { type: integer, default: 6 }
                encryption_key_ref: { type: [string, "null"] }
                alert_sink: { type: [string, "null"] }
                wal_pitr_enabled: { type: boolean, default: false }
      responses:
        "200":
          description: Backup policy recorded.
          content:
            application/json:
              schema:
                type: object
                required: [configured, destination]
                properties:
                  configured: { type: boolean }
                  destination: { type: string }
                  cron: { type: string }
                  detail: { type: string }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /setup/run-restore-test:
    post:
      tags: [setup]
      operationId: runSetupRestoreTest
      summary: >-
        Enqueue the backup→restore-into-scratch drill (gate G-C / AC#5). Async worker task; poll
        GET /setup for the persisted result. Needs restore.run; 409 if no backup configured.
      responses:
        "202":
          description: The drill was enqueued.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /setup/configure-auth:
    post:
      tags: [setup]
      operationId: configureSetupAuth
      summary: >-
        Record the auth method + prove a non-bootstrap login (gate G-D; doc 08 §9). The caller's
        valid non-bootstrap JWT + a live OIDC-issuer reachability probe are the proof. Needs
        config.update. 422 auth_unavailable if the issuer is not reachable/well-formed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method: { type: string, enum: [LOCAL, FEDERATED], default: LOCAL }
                mfa_acknowledged: { type: boolean, default: false }
      responses:
        "200":
          description: Auth verified; gate G-D satisfied.
          content:
            application/json:
              schema:
                type: object
                required: [auth_test_login_ok, method]
                properties:
                  auth_test_login_ok: { type: boolean }
                  method: { type: string }
                  detail: { type: string }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /setup/finalize:
    post:
      tags: [setup]
      operationId: finalizeSetup
      summary: >-
        Re-check the gates live and flip the setup latch to OPERATIONAL (Step 10). Needs
        config.update. 409 setup_gates_unsatisfied lists the failed gates.
      responses:
        "200":
          description: Setup finalized; the latch is now OPERATIONAL.
          content:
            application/json:
              schema:
                type: object
                required: [setup_state]
                properties:
                  setup_state: { type: string }
                  finalized_at: { type: string, format: date-time }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /verify:
    get:
      tags: [verify]
      operationId: verifyControlledCopy
      summary: Public controlled-copy currency check (no auth). Scan a printout's QR / signed token.
      description: >-
        Returns an HTML page with the copy's currency: CURRENT (this revision still governs),
        SUPERSEDED (a newer revision is now Effective, or the version is obsolete), or UNKNOWN
        (bad/forged/tampered token, or no such version). The token is Ed25519-signed, so this only
        confirms what a valid token encodes — no enumeration. Minimal disclosure (status + identifier
        + current revision/date; no content). doc 05 §6.4.
      security: []
      parameters:
        - name: t
          in: query
          required: true
          schema: { type: string }
          description: The signed verify token from the controlled copy's QR/footer.
      responses:
        "200":
          description: An HTML verify page (CURRENT / SUPERSEDED / UNKNOWN).
          content:
            text/html:
              schema: { type: string }

  /me:
    get:
      tags: [auth]
      operationId: getMe
      summary: The authenticated user, JIT-provisioned from the Keycloak subject.
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppUser" }
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /auth/step-up:
    post:
      tags: [auth]
      operationId: postAuthStepUp
      summary: Reserved Part-11 re-auth seam (declared; not enforced in v1).
      responses:
        "200":
          description: Step-up acknowledgement.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /permissions:
    get:
      tags: [authz]
      operationId: listPermissions
      summary: Read the closed v1 permission catalog (reference data).
      responses:
        "200":
          description: The full permission catalog.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Permission" }
        "403": { $ref: "#/components/responses/ProblemResponse" }

  /roles:
    get:
      tags: [authz]
      operationId: listRoles
      summary: List the org's roles (seeded starter roles plus any org-defined).
      responses:
        "200":
          description: Roles.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Role" }
        "403": { $ref: "#/components/responses/ProblemResponse" }

  /roles/{role_id}:
    get:
      tags: [authz]
      operationId: getRole
      summary: A role with its resolved permission grants.
      parameters:
        - name: role_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The role and its grants.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RoleDetail" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /users:
    get:
      tags: [users]
      operationId: listUsers
      summary: The user roster (S8d). Needs user.read. Optional status/is_guest filters.
      parameters:
        - { name: status_filter, in: query, required: false, schema: { type: string } }
        - { name: is_guest, in: query, required: false, schema: { type: boolean } }
      responses:
        "200":
          description: The user roster.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserAdmin" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [users]
      operationId: inviteUser
      summary: >-
        Invite a user — pre-create an INVITED app_user bound to an operator-supplied Keycloak
        subject (reconciled to ACTIVE on first login). Needs user.create. 409 if the subject exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keycloak_subject]
              properties:
                keycloak_subject: { type: string }
                display_name: { type: [string, "null"] }
                email: { type: [string, "null"] }
      responses:
        "201":
          description: The invited (INVITED) user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserAdmin" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /users/{user_id}:
    get:
      tags: [users]
      operationId: getUser
      summary: A single user record (S8d). Needs user.read.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The user record.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserAdmin" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    patch:
      tags: [users]
      operationId: updateUserStatus
      summary: >-
        Enable/disable a user (S8d). Needs user.deactivate. 409 last_admin when disabling the sole
        active System Administrator (the break-glass guard, doc 08 §9.1).
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [ACTIVE, DISABLED] }
      responses:
        "200":
          description: The updated user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserAdmin" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /users/{user_id}/roles:
    get:
      tags: [authz]
      operationId: listUserRoles
      summary: A user's role assignments.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Role assignments.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RoleAssignment" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [authz]
      operationId: assignUserRole
      summary: Assign a role to a user. Needs permission.grant; two-tier guard (R35).
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleAssignmentCreate" }
      responses:
        "201":
          description: The created role assignment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RoleAssignment" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: Validation or two_tier_violation (system-domain role at content tier).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /users/{user_id}/roles/{assignment_id}:
    delete:
      tags: [authz]
      operationId: revokeUserRole
      summary: Revoke a role assignment. Needs permission.grant.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: assignment_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Assignment revoked.
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /users/{user_id}/overrides:
    get:
      tags: [authz]
      operationId: listUserOverrides
      summary: A user's direct permission overrides.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Overrides.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PermissionOverride" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [authz]
      operationId: createUserOverride
      summary: Grant a direct ALLOW/DENY override. Needs permission.grant; two-tier guard.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PermissionOverrideCreate" }
      responses:
        "201":
          description: The created override.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PermissionOverride" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: Validation or two_tier_violation (system-domain key at content tier).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /users/{user_id}/overrides/{override_id}:
    delete:
      tags: [authz]
      operationId: deleteUserOverride
      summary: Remove a direct override. Needs permission.grant.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: override_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Override removed.
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /users/{user_id}/effective-permissions:
    get:
      tags: [authz]
      operationId: getEffectivePermissions
      summary: The user's resolved effective permissions (with provenance) at a scope.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: scope_level
          in: query
          required: false
          description: Scope to resolve at (default SYSTEM).
          schema:
            type: string
            enum: [SYSTEM, FRAMEWORK, PROCESS, FOLDER, DOC_CLASS, ARTIFACT]
        - name: scope_id
          in: query
          required: false
          description: The scope selector value (process id / folder path / artifact id / doc class).
          schema: { type: string }
      responses:
        "200":
          description: Effective permissions with provenance.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EffectivePermissions" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /document-types:
    get:
      tags: [documents]
      operationId: listDocumentTypes
      summary: The org's document-type catalog (read-only reference data; slice S-web-2).
      description: >-
        Resolves document_type_id (a bare UUID on document rows) to a friendly code/name for the
        library Type column / facet. Authentication-only (any org member), like GET /documents —
        the type catalog is innocuous org reference data, not a per-resource document.read object.
      responses:
        "200":
          description: The document-type catalog, ordered by name.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DocumentType" } }
        "401": { $ref: "#/components/responses/ProblemResponse" }

  /directory/users:
    get:
      tags: [users]
      operationId: listDirectoryUsers
      summary: A minimal user-name directory — display name only (slice S-web-2).
      description: >-
        Resolves owner_user_id (a bare UUID on document rows) to a display name for the library Owner
        column / facet. Returns ONLY {id, display_name} for ACTIVE non-guest members — never the PII
        (email/keycloak_subject/status/roles) the admin GET /users exposes. Authentication-only.
      responses:
        "200":
          description: ACTIVE non-guest members as {id, display_name}, ordered by display name.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DirectoryUser" } }
        "401": { $ref: "#/components/responses/ProblemResponse" }

  /documents:
    get:
      tags: [documents]
      operationId: listDocuments
      summary: List documents the caller may read (row-filtered by scope).
      description: >-
        Row-filtered by document.read (filter, not 403). Each row carries clause_refs (the mapped
        clause numbers, slice S10). The bracketed filter[field][op] grammar (doc 15 §3.2) narrows
        the candidate set in SQL before the row-filter; an unrecognised field/op → 400 unknown_filter,
        a bad enum/uuid/timestamp value → 422. Pagination (slice S-web-2) returns a {data, page}
        envelope: limit + offset slice the AUTHZ-FILTERED set (applied after the per-row scope filter,
        not as a pre-authz SQL OFFSET), so page boundaries are correct for scoped users. page.has_more
        is derived (no COUNT(*)); it is accurate up to a bounded candidate scan cap.
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, default: 0 } }
        - name: "filter[clause_refs][has]"
          in: query
          required: false
          schema: { type: string }
          description: Only documents mapped to this exact clause number (e.g. 8.4). No subtree rollup.
        - name: "filter[current_state][eq]"
          in: query
          required: false
          schema:
            type: string
            enum: [Draft, InReview, Approved, Effective, UnderRevision, Superseded, Obsolete]
        - { name: "filter[document_type][eq]", in: query, required: false, schema: { type: string, format: uuid } }
        - { name: "filter[owner_user_id][eq]", in: query, required: false, schema: { type: string, format: uuid } }
        - name: "filter[classification][eq]"
          in: query
          required: false
          schema: { type: string, enum: [Public, Internal, Confidential, Restricted] }
        - name: "filter[effective_from][gte]"
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: >-
            Documents whose CURRENT effective version's effective_from is ≥ this ISO timestamp
            (the library "Effective date" facet). Docs with no effective version are excluded.
        - name: "filter[effective_from][lte]"
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: As effective_from][gte] but an upper bound (≤).
      responses:
        "200":
          description: A page of documents (each row with clause_refs) plus pagination metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentPage" }
        "400":
          description: Unknown filter field or operator (code=unknown_filter).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: Invalid filter value (bad enum/uuid; code=validation_error).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
    post:
      tags: [documents]
      operationId: createDocument
      summary: Create a Draft document; allocates a {TYPE}-{AREA}-{SEQ} identifier. Needs document.create.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DocumentCreate" }
      responses:
        "201":
          description: The created document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: Validation error.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}:
    parameters:
      - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [documents]
      operationId: getDocument
      summary: A document's metadata. Needs document.read.
      responses:
        "200":
          description: The document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    patch:
      tags: [documents]
      operationId: updateDocumentMetadata
      summary: Edit metadata (title/folder/classification). Needs document.manage_metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MetadataUpdate" }
      responses:
        "200":
          description: The updated document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/form-schema:
    parameters:
      - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [documents]
      operationId: getFormSchema
      summary: A Form/Template's editable working field schema (null if unset). Needs document.read.
      responses:
        "200":
          description: The working field schema.
          content:
            application/json:
              schema:
                type: object
                properties:
                  document_id: { type: string, format: uuid }
                  field_schema:
                    oneOf:
                      - { $ref: "#/components/schemas/FieldSchema" }
                      - { type: "null" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    put:
      tags: [documents]
      operationId: setFormSchema
      summary: >-
        Set/replace a Form/Template's working field schema (FRM + Draft/UnderRevision, enforced
        in-service). Validates the bespoke field-list DSL. Needs document.manage_metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [field_schema]
              properties:
                field_schema: { $ref: "#/components/schemas/FieldSchema" }
      responses:
        "200":
          description: The stored working schema.
          content:
            application/json:
              schema:
                type: object
                properties:
                  document_id: { type: string, format: uuid }
                  field_schema: { $ref: "#/components/schemas/FieldSchema" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The form template is not editable (not Draft/UnderRevision).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Not a Form/Template, or a malformed field schema (validation_error).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/effective-form-schema:
    parameters:
      - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [documents]
      operationId: getEffectiveFormSchema
      summary: >-
        The schema pinned in the template's in-force version — the form to render (doc 06 §4.2).
        Read from the version snapshot, honoring the org pre-release-capture toggle. Needs document.read.
      responses:
        "200":
          description: The pinned schema + the resolved version.
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_version_id: { type: string, format: uuid }
                  revision_label: { type: string }
                  version_state: { type: string }
                  field_schema: { $ref: "#/components/schemas/FieldSchema" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The resolved version carries no field schema.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: No resolvable version (template_not_effective / no_resolvable_template_version).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/form-schema:checkin:
    parameters:
      - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [documents]
      operationId: checkinFormSchema
      summary: >-
        Freeze the working schema into an immutable Draft version — its WORM source blob IS the
        canonical-serialized schema; the schema is pinned into metadata_snapshot. Needs document.edit.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FormSchemaCheckin" }
      responses:
        "201":
          description: The created (Draft) version.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentVersion" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The form template is not editable (not Draft/UnderRevision).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Not a Form/Template, no working schema set, or missing change_reason/significance.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/clause-mappings:
    parameters:
      - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [clauses]
      operationId: listClauseMappings
      summary: The document's clause mappings. Needs document.read.
      responses:
        "200":
          description: The document↔clause mappings.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ClauseMapping" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [clauses]
      operationId: mapClause
      summary: Map the document to a clause of its own framework. Needs document.manage_metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClauseMappingCreate" }
      responses:
        "201":
          description: The created mapping.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClauseMapping" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The clause is already mapped to this document (conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: The clause belongs to a different framework (validation_error, framework_mismatch).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/clause-mappings/{clause_id}:
    delete:
      tags: [clauses]
      operationId: unmapClause
      summary: Remove a clause mapping. Needs document.manage_metadata.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: clause_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Unmapped. }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/process-links:
    parameters:
      - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [processes]
      operationId: listProcessLinks
      summary: The document's process links. Needs document.read.
      responses:
        "200":
          description: The document↔process links.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ProcessLink" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [processes]
      operationId: linkProcess
      summary: Link the document to a process. Needs document.manage_metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProcessLinkCreate" }
      responses:
        "201":
          description: The created link.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProcessLink" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The process is already linked to this document (conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: The referenced process does not exist (validation_error).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/process-links/{process_id}:
    delete:
      tags: [processes]
      operationId: unlinkProcess
      summary: Remove a process link. Needs document.manage_metadata.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: process_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Unlinked. }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/links:
    get:
      tags: [documents]
      operationId: listDocumentLinks
      summary: >-
        Every document↔document link touching this document (outbound + inbound) — the where-used
        reference graph (doc 14 §5.6, S-dcr-2). Needs document.read.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The links touching this document.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DocumentLink" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [documents]
      operationId: createDocumentLink
      summary: >-
        Create a directed from→to link of link_type (doc 14 §5.6). Both must be in-org Documents;
        no self-link (422); 409 on a duplicate (from,to,type). Needs document.manage_metadata.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DocumentLinkCreate" }
      responses:
        "201":
          description: The created link.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentLink" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
  /documents/{document_id}/links/{link_id}:
    delete:
      tags: [documents]
      operationId: deleteDocumentLink
      summary: Remove a document link touching this document. Needs document.manage_metadata.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: link_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Unlinked. }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
  /documents/{document_id}/where-used:
    get:
      tags: [documents]
      operationId: getDocumentWhereUsed
      summary: >-
        The doc 05 §7.2 where-used panel (processes · child/parent documents · referenced-by ·
        forms/templates · records-produced-under · clauses · related CAPAs/findings) + the §7.3
        obsoletion_safety advisory (S-dcr-2). Needs document.read.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The where-used panel.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WhereUsed" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/checkout:
    post:
      tags: [documents]
      operationId: checkoutDocument
      summary: Acquire the exclusive 8h check-out lock. Needs document.checkout.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The check-out (working draft).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkingDraft" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Already checked out by another user (lock_conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/versions:init-upload:
    post:
      tags: [documents]
      operationId: initVersionUpload
      summary: Step 1 of upload — get a presigned PUT URL (or a dedup hit). Needs document.checkout.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InitUpload" }
      responses:
        "200":
          description: Presigned upload, or a dedup result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InitUploadResult" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/checkin:
    post:
      tags: [documents]
      operationId: checkinDocument
      summary: Freeze an immutable Draft version (or detect no change). Needs document.edit.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckIn" }
      responses:
        "201":
          description: The version (change_detected=false means dedup, no new version).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckInResult" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Caller does not hold the check-out (lock_conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: INV-3 — missing change_reason or change_significance.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/break-lock:
    post:
      tags: [documents]
      operationId: breakDocumentLock
      summary: Release the lock without check-in, preserving scratch (R9). Needs document.checkout.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Lock broken.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [document_id, lock_broken]
                properties:
                  document_id: { type: string, format: uuid }
                  lock_broken: { type: boolean }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/heartbeat:
    post:
      tags: [documents]
      operationId: heartbeatCheckout
      summary: Refresh the 8h check-out lock (R24) for a long edit. Needs document.checkout.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The refreshed lock TTL.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [document_id, lock_ttl_seconds]
                properties:
                  document_id: { type: string, format: uuid }
                  lock_ttl_seconds: { type: integer, example: 28800 }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Caller does not hold the check-out (lock_conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  # --- lifecycle (S4): named POST action sub-resources; never PATCH status= -----------------
  /documents/{document_id}/submit-review:
    post:
      tags: [documents]
      operationId: submitReview
      summary: "Draft→InReview (T2) / UnderRevision→InReview (T9). Needs document.submit."
      description: "Enforces the >=1 clause_mapping precondition (S9): a document with zero clause mappings is rejected 422 (validation_error). Map via POST /documents/{id}/clause-mappings first."
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Illegal transition (invalid_state_transition; body includes allowed_transitions).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  # Approval/review is NOT a direct document action — it routes through POST /tasks/{id}/decision
  # (C7). There is intentionally no /documents/{id}/approve or /request-changes endpoint.

  /documents/{document_id}/release:
    post:
      tags: [documents]
      operationId: releaseDocument
      summary: "Approved→Effective (T6) — atomic single-Effective cutover (SERIALIZABLE + INV-1). Needs document.release."
      description: "Supersedes the prior Effective version in one transaction; future-dated versions stay Approved (the Beat sweep activates them). Only Released versions reach the FS mirror."
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Release" }
      responses:
        "200":
          description: The document (now Effective).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Illegal transition (invalid_state_transition), or a concurrent release won (conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: effective_from is in the future (validation_error) — the version stays Approved.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/start-revision:
    post:
      tags: [documents]
      operationId: startRevision
      summary: "Effective→UnderRevision (T7) — opens a working draft while the Effective version keeps governing. Needs document.edit."
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The document (now UnderRevision).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Illegal transition (invalid_state_transition), or already checked out (lock_conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/obsolete:
    post:
      tags: [documents]
      operationId: obsoleteDocument
      summary: >-
        Effective→Obsolete (T11), or archive a Superseded version (T12) via version_id. The doc 05
        §7.3 obsoletion-safety gate (S-dcr-5) blocks a T11 obsoletion that would create a coverage gap
        (409 obsoletion_blocked) unless force_retire + override_justification. Needs document.obsolete.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Obsolete" }
      responses:
        "200":
          description: The document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: >-
            Illegal transition (invalid_state_transition; body includes allowed_transitions) OR a
            §7.3 coverage gap (obsoletion_blocked; the reasons are in errors[]).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Missing reason (validation_error).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/download:
    get:
      tags: [documents]
      operationId: downloadDocument
      summary: A presigned GET URL for the Effective version's controlled-copy PDF. Needs document.read.
      description: >-
        Presigns the Effective version's cached watermarked CONTROLLED COPY rendition
        (rendition=controlled_copy). If the rendition is still being generated or the source format is
        non-renderable (R26), presigns the source bytes instead (rendition=source). Never proxied.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: A short-lived presigned download URL for the controlled copy (or the source).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentDownload" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/export:
    get:
      tags: [documents]
      operationId: exportDocument
      summary: A fresh per-request UNCONTROLLED-when-printed export of the Effective version. Needs document.export.
      description: >-
        Streams a fresh, per-request PDF of the Effective version stamped "UNCONTROLLED WHEN PRINTED —
        valid as of {date}" + "Exported {ts} by {user}" (doc 04 §11.2), as an application/pdf
        attachment. Distinct from /download (the cached, deterministic CONTROLLED COPY presign): this
        rendition carries a timestamp + actor, is never cached, and is audited as an EXPORTED event.
        Returns 409 no_controlled_rendition when no controlled PDF exists yet (still rendering, or a
        non-renderable R26 format — fetch the source via /download instead).
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The stamped export PDF (download attachment).
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: No controlled PDF rendition is available yet (no_controlled_rendition).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/print:
    get:
      tags: [documents]
      operationId: printDocument
      summary: A fresh per-request CONTROLLED-COPY print rendition of the Effective version. Needs document.print_controlled.
      description: >-
        Streams a fresh, per-request PDF of the Effective version stamped "CONTROLLED COPY — valid on
        {date} only" + "Printed {ts} by {user}" (doc 04 §11.2), inline for the browser print dialog.
        Audited as a PRINTED event. Returns 409 no_controlled_rendition when no controlled PDF exists
        yet (still rendering, or a non-renderable R26 format).
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The stamped controlled-copy PDF (inline).
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: No controlled PDF rendition is available yet (no_controlled_rendition).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/versions:
    get:
      tags: [documents]
      operationId: listVersions
      summary: A document's versions, newest first. Needs document.read_draft.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Versions.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DocumentVersion" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/versions/{version_id}:
    get:
      tags: [documents]
      operationId: getVersion
      summary: A single immutable version. Needs document.read_draft.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The version.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentVersion" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/versions/{version_id}/diff:
    get:
      tags: [documents]
      operationId: diffVersions
      summary: >-
        The doc 05 §8 redline of `from` → `version_id` (two versions of THIS document): metadata diff
        (frozen snapshots) + text redline (on-demand Tika extraction + line-LCS; degrades to
        `unavailable` if text can't be extracted) + both provenance headers. Read-only. Needs
        document.read_draft (the diff exposes non-released version content). Visual page-image diff is S-dcr-3b.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: from
          in: query
          required: true
          description: The other version (of the same document) to diff against.
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The version diff.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionDiff" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/versions/{version_id}/visual-diff:
    post:
      tags: [documents]
      operationId: requestVisualDiff
      summary: >-
        Request the doc 05 §8.1 visual page-image diff of `from` → `version_id` (worker-async — the API
        can't render). Idempotent (UPSERTs the cached row + enqueues the worker when not terminal). 202
        Pending / 200 once Ready (then poll GET). Needs document.read_draft.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: from, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "202":
          description: Accepted (rendering in progress).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VisualDiffStatus" }
        "200":
          description: Already terminal (Ready / Failed / Unavailable).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VisualDiffStatus" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    get:
      tags: [documents]
      operationId: getVisualDiff
      summary: >-
        Poll the cached visual-diff result (no side effect). 404 if not yet requested (POST first), 202
        while Pending, 200 once terminal. Needs document.read_draft.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: from, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The terminal visual-diff result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VisualDiffStatus" }
        "202":
          description: Still rendering.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VisualDiffStatus" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/versions/{version_id}/visual-diff/page/{page}:
    get:
      tags: [documents]
      operationId: getVisualDiffPage
      summary: >-
        Stream one page's rendered PNG (`layer` = from | to | diff). 404 unless the visual diff is Ready
        and the page/layer exists. Needs document.read_draft.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: page, in: path, required: true, schema: { type: integer } }
        - { name: from, in: query, required: true, schema: { type: string, format: uuid } }
        - name: layer
          in: query
          required: false
          schema: { type: string, enum: [from, to, diff], default: diff }
      responses:
        "200":
          description: The page image.
          content:
            image/png:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/versions/{version_id}/download:
    get:
      tags: [documents]
      operationId: downloadVersion
      summary: A presigned GET URL for a version's bytes (never proxied). Needs document.read_draft.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: A short-lived presigned download URL.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionDownload" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /clauses:
    get:
      tags: [clauses]
      operationId: listClauses
      summary: The ISO clause spine (flat, ordered by clause number; each row carries parent_id). Needs clauseMap.read.
      parameters:
        - { name: framework, in: query, required: false, schema: { type: string, default: "iso9001:2015" }, description: "Framework code; defaults to the org's iso9001:2015." }
      responses:
        "200":
          description: The clause catalog.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Clause" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /processes:
    get:
      tags: [processes]
      operationId: listProcesses
      summary: The org's process nodes (default SYSTEM scope). Needs process.read.
      responses:
        "200":
          description: The process nodes.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Process" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [processes]
      operationId: createProcess
      summary: Create a SEED process node. Needs process.create (seeded but held by no role → grant via override until the role UI).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProcessCreate" }
      responses:
        "201":
          description: The created process (state=SEED).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Process" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: A process with that name already exists (conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: A referenced parent/owner/supplier is missing, or an outsourced process names no supplier (validation_error).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /processes/map:
    get:
      tags: [processes]
      operationId: getProcessMap
      summary: The process graph as {nodes, edges}. Needs process.read.
      responses:
        "200":
          description: The process landscape.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProcessMap" }
        "403": { $ref: "#/components/responses/ProblemResponse" }

  /processes/{process_id}:
    parameters:
      - { name: process_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [processes]
      operationId: getProcess
      summary: A single process node. Needs process.read.
      responses:
        "200":
          description: The process.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Process" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    patch:
      tags: [processes]
      operationId: updateProcess
      summary: Edit a process; confirm SEED→ACTIVE (a one-way ratchet). Needs process.manage.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProcessUpdate" }
      responses:
        "200":
          description: The updated process.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Process" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: An illegal state transition (e.g. ACTIVE→SEED) or a duplicate name (invalid_state_transition / conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: A null on a non-nullable field, or a missing owner_org_role (validation_error).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /processes/{process_id}/edges:
    post:
      tags: [processes]
      operationId: addProcessEdge
      summary: Add a directed edge from this process to another. Needs process.manage.
      parameters:
        - { name: process_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdgeCreate" }
      responses:
        "201":
          description: The created edge.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProcessEdge" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: A self-loop or a duplicate edge (conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: The target process does not exist (validation_error).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /processes/{process_id}/edges/{edge_id}:
    delete:
      tags: [processes]
      operationId: removeProcessEdge
      summary: Remove an edge from this process. Needs process.manage.
      parameters:
        - { name: process_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: edge_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Removed. }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /records:init-upload:
    post:
      tags: [records]
      operationId: initRecordEvidenceUpload
      summary: Step 1 of evidence capture — get a presigned PUT URL (or a dedup hit). Needs record.create.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InitUpload" }
      responses:
        "200":
          description: Presigned upload (to the staging bucket), or a dedup result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InitUploadResult" }
        "403": { $ref: "#/components/responses/ProblemResponse" }

  /records:
    get:
      tags: [records]
      operationId: listRecords
      summary: List records the caller may read (row-filtered by record.read).
      description: >-
        Row-filtered by record.read (filter, not 403). Effective-immutable records only (records are
        not in the documents surface). Plain query-param filters (no bracketed grammar); a bad enum
        value → 422. limit is a pre-authz cap.
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - name: record_type
          in: query
          required: false
          schema: { $ref: "#/components/schemas/RecordType" }
        - { name: source_document_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: captured_by, in: query, required: false, schema: { type: string, format: uuid } }
        - name: disposition_state
          in: query
          required: false
          schema: { type: string, enum: [ACTIVE, DUE_FOR_REVIEW, ON_HOLD, DISPOSED] }
        - { name: legal_hold, in: query, required: false, schema: { type: boolean } }
      responses:
        "200":
          description: Records (newest capture first).
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Record" } }
        "422":
          description: Invalid filter value (bad enum; code=validation_error).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
    post:
      tags: [records]
      operationId: captureRecord
      summary: Capture an immutable record (base + subtype + WORM evidence + seal). Needs record.create.
      description: >-
        A record produced under a controlled document MUST pin its exact version (source_version_id);
        ad-hoc EVIDENCE leaves both source fields null (R21). Evidence blobs are promoted to the WORM
        records bucket; content_hash seals the manifest. The resolved retention policy is snapshotted.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecordCreate" }
      responses:
        "201":
          description: The captured record (with evidence_blobs + evidence_links).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Record" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: >-
            Validation error — bad record_type/classification, unknown source document/version, or a
            record-under-document missing source_version_id (errors[].code=source_version_required) or
            a framework mismatch (errors[].code=framework_mismatch).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "423":
          description: An evidence object is not WORM-locked (code=worm_required).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /records/{record_id}:
    parameters:
      - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [records]
      operationId: getRecord
      summary: A record's metadata + evidence blobs + evidence links. Needs record.read.
      responses:
        "200":
          description: The record.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Record" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /records/{record_id}/evidence/{sha256}/download:
    get:
      tags: [records]
      operationId: downloadRecordEvidence
      summary: A presigned GET for one attached evidence blob. Needs record.read.
      parameters:
        - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: sha256, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: A short-lived presigned GET URL for the evidence blob.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceDownload" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /records/{record_id}/rendition:
    get:
      tags: [records]
      operationId: getRecordRendition
      summary: >-
        A presigned GET for the structured-record PDF rendition (doc 06 §4.2) — a derived,
        regenerable view of a Mode-B record's fielded data. Needs record.read.
      parameters:
        - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: A short-lived presigned GET URL for the rendition PDF.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceDownload" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: No rendition yet (still building, or the record is not structured) — rendition_pending.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /records/{record_id}/correction:
    post:
      tags: [records]
      operationId: correctRecord
      summary: Correct a record by capturing a successor (correct, don't change). Needs record.create.
      description: >-
        Captures a NEW record (correction_of → the original) and flags the original
        superseded_by_correction; the original stays retrievable forever. 409 if already superseded.
      parameters:
        - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecordCreate" }
      responses:
        "201":
          description: The successor (correcting) record.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Record" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The record is already superseded by a correction (conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Validation error (see captureRecord).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "423":
          description: An evidence object is not WORM-locked (code=worm_required).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /records/{record_id}/evidence-links:
    parameters:
      - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [records]
      operationId: listEvidenceLinks
      summary: The record's evidence-for links. Needs record.read.
      responses:
        "200":
          description: The evidence-for links.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/EvidenceLink" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [records]
      operationId: linkEvidence
      summary: Link the record as evidence for a clause/process/document. Needs record.create.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvidenceLinkCreate" }
      responses:
        "201":
          description: The created evidence-for link.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceLink" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The link already exists (conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: >-
            Target not found, or it belongs to a different framework
            (errors[].code=framework_mismatch).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /records/{record_id}/evidence-links/{link_id}:
    delete:
      tags: [records]
      operationId: unlinkEvidence
      summary: Remove an evidence-for link (an audited annotation). Needs record.create.
      parameters:
        - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: link_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Unlinked. }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /records/{record_id}/disposition:
    parameters:
      - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [records]
      operationId: getDisposition
      summary: Disposition status + retention_until + legal_hold + tombstone history. Needs record.read.
      responses:
        "200":
          description: The record's disposition status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DispositionStatus" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    patch:
      tags: [records]
      operationId: advanceDisposition
      summary: Advance disposition_state (the only PATCH on a record — not a content edit). Needs record.dispose.
      description: >-
        The sanctioned record state advance (doc 06 §5.3): ACTIVE↔DUE_FOR_REVIEW↔DISPOSED (ON_HOLD is
        driven by /legal-hold). A DESTROY physically removes the WORM bytes (fail-closed); it is
        blocked 409 while the lock is unexpired or a legal hold is active, and that refusal is audited
        (RECORD_ERASURE_REFUSED — the GDPR refused-with-reason, R27). SoD-6 (S-rec-4, doc 07 §7): a
        DISPOSED transition by the record's own capturer is refused 409 sod_self_disposition (audited
        DISPOSITION_REFUSED_SOD) unless the org sets allow_self_disposition.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DispositionAdvance" }
      responses:
        "200":
          description: The record after the transition (full serialization).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Record" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: >-
            Illegal transition, on legal hold, a DESTROY refused, or SoD-6 self-disposition (codes:
            invalid_transition, on_legal_hold, worm_lock_unexpired, retain_permanent,
            sod_self_disposition).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /records/{record_id}/legal-hold:
    post:
      tags: [records]
      operationId: legalHold
      summary: Place or release a legal hold (overrides retention expiry). Needs record.dispose.
      parameters:
        - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LegalHoldAction" }
      responses:
        "200":
          description: The record after the hold change (full serialization).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Record" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Already on hold / not on hold / already disposed (codes vary).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /records/{record_id}/worm-destroy-requests:
    parameters:
      - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [records]
      operationId: listWormDestroyRequests
      summary: The record's WORM destroy-under-legal-order requests. Needs record.read.
      responses:
        "200":
          description: The destroy requests.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/WormDestroyRequest" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [records]
      operationId: requestWormDestroy
      summary: "R27 dual-control destroy — step 1 (request). Needs record.dispose."
      description: >-
        The dual-control escape hatch for destroying a WORM blob before its lock expires (a mis-import
        or a binding legal order). A distinct second actor must approve before any bytes are destroyed.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WormDestroyRequestCreate" }
      responses:
        "201":
          description: The created (open) destroy request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WormDestroyRequest" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: An open request already exists, or the record is already disposed.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /records/{record_id}/worm-destroy-requests/{req_id}/approve:
    post:
      tags: [records]
      operationId: approveWormDestroy
      summary: "R27 dual-control destroy — step 2 (approve + execute). Needs record.dispose."
      description: >-
        A second, distinct actor approves → the governance-bypass purge runs fail-closed → the record
        becomes DISPOSED with a tombstone (is_worm_destroy=true, both actors, the legal basis). 409 if
        the approver is the requester, or if COMPLIANCE mode forbids the bypass (audited).
      parameters:
        - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: req_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DispositionReason" }
      responses:
        "200":
          description: The destroyed record (DISPOSED tombstone; full serialization).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Record" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: >-
            Not open, same actor as requester, already disposed, or COMPLIANCE mode (codes:
            not_open, dual_control_same_actor, already_disposed, compliance_mode_denies_destroy).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /records/{record_id}/worm-destroy-requests/{req_id}/cancel:
    post:
      tags: [records]
      operationId: cancelWormDestroy
      summary: Cancel an open WORM destroy request (audited). Needs record.dispose.
      parameters:
        - { name: record_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: req_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DispositionReason" }
      responses:
        "200":
          description: The cancelled request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WormDestroyRequest" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The request is not open (code=not_open).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /retention-policies:
    get:
      tags: [retention-policies]
      operationId: listRetentionPolicies
      summary: List the org's retention policies (active only by default). Needs retention.read.
      parameters:
        - { name: include_archived, in: query, required: false, schema: { type: boolean, default: false } }
      responses:
