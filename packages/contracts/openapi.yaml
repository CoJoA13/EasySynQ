  /capas:
    post:
      tags: [capa]
      operationId: raiseCapa
      summary: >-
        Raise a CAPA directly (source defaults process; origin_finding_id null — the NC→CAPA
        auto-link is S-aud-2). Captures an immutable RECORD + the sealed Raised stage. Needs
        capa.create (scope from body.process_id; SYSTEM fallback).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CapaRaise" }
      responses:
        "201":
          description: The raised CAPA (close_state=Raised).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
    get:
      tags: [capa]
      operationId: listCapas
      summary: List the org's CAPAs. Needs capa.read.
      responses:
        "200":
          description: The org's CAPAs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Capa" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
  /capas/{capa_id}:
    get:
      tags: [capa]
      operationId: getCapa
      summary: A CAPA with its sealed stage trail. Needs capa.read.
      parameters:
        - { name: capa_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The CAPA + stages.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
  /capas/{capa_id}/containment:
    post:
      tags: [capa]
      operationId: capaContainment
      summary: >-
        Raised → Containment — append the immediate-correction (symptom-fix) stage block. Needs
        capa.update. 409 invalid_capa_transition if the CAPA is not in Raised.
      parameters:
        - { name: capa_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContainmentCreate" }
      responses:
        "200":
          description: The CAPA (close_state=Containment).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
  /capas/{capa_id}/root-cause:
    post:
      tags: [capa]
      operationId: capaRootCause
      summary: >-
        Containment → RootCause — append the sealed RCA narrative (5-Whys / fishbone). Unsigned (RCA
        is an informational gate). Needs capa.record_rca. 409 if not in Containment.
      parameters:
        - { name: capa_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StageBlockCreate" }
      responses:
        "200":
          description: The CAPA (close_state=RootCause).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
  /capas/{capa_id}/action-plan:
    post:
      tags: [capa]
      operationId: capaProposeActionPlan
      summary: >-
        Propose the corrective action plan + open the severity-routed approval workflow (Critical =
        QMS-Owner → Top-Management sequential; Major/Minor = QMS-Owner ANY). close_state stays
        RootCause until the approval completes (the flip to ActionPlan happens on the approving
        POST /tasks/{id}/decision). Needs capa.plan_action. 409 if not in RootCause, or
        capa_approval_in_progress if one is already running.
      parameters:
        - { name: capa_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StageBlockCreate" }
      responses:
        "200":
          description: >-
            The CAPA (still close_state=RootCause) + the opened approval_instance (current_state is
            NEEDS_ATTENTION when no QMS-Owner / Top-Management approver is assigned).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
  /capas/{capa_id}/implement:
    post:
      tags: [capa]
      operationId: capaImplement
      summary: >-
        ActionPlan → Implement — append the action-completion stage (unsigned). Link completion
        evidence to the new Implement stage via POST /records/{id}/evidence-links
        (target_type=capa_stage). Needs capa.capture_effectiveness. 409 if not in ActionPlan.
      parameters:
        - { name: capa_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StageBlockCreate" }
      responses:
        "200":
          description: The CAPA (close_state=Implement).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
  /capas/{capa_id}/verify:
    post:
      tags: [capa]
      operationId: capaVerify
      summary: >-
        Implement → Verify — record the effectiveness decision (effective | not_effective) as a
        SIGNED Verify stage (signature_event meaning=verify). Severity-aware SoD-4 is enforced first
        (409 sod_self_verify when the verifier is among the implementers — Critical/Major always,
        Minor unless allow_capa_self_verify). Evidence linked to the new Verify stage is then frozen
        (unlink-blocked). Needs capa.verify. 409 if not in Implement.
      parameters:
        - { name: capa_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CapaVerifyCreate" }
      responses:
        "200":
          description: The CAPA (close_state=Verify; the decision is sealed into the Verify stage).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
  /capas/{capa_id}/close:
    post:
      tags: [capa]
      operationId: capaClose
      summary: >-
        The M4 closure gate. Requires close_state=Verify. An effective verification with root_cause +
        implemented-action-with-evidence + effectiveness-evidence → Closed (this is the real path
        that satisfies the S-aud-2 block-until-corrected audit-close gate). A not_effective
        verification loops back to RootCause (cycle_marker++; a revised plan must be re-proposed +
        re-approved). An effective verification still missing evidence → 409 capa_close_incomplete.
        Needs capa.close.
      parameters:
        - { name: capa_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The CAPA (close_state=Closed, or RootCause with cycle_marker bumped on a loop).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /complaints:
