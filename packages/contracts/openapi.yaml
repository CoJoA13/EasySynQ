      summary: >-
        Idempotently spawn a CAPA from a complaint (R16). Returns 201 on the first spawn, 200 on an
        idempotent replay (the complaint already spawned — the SAME CAPA is returned; a retry after a
        timed-out first attempt receives 200). severity resolves from the body else the complaint;
        422 if neither is set. Needs capa.create.
      parameters:
        - { name: complaint_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SpawnCapa" }
      responses:
        "201":
          description: A newly spawned CAPA (close_state=Raised, source=complaint).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "200":
          description: The existing CAPA (idempotent replay).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capa" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /ncrs:
    post:
      tags: [capa]
      operationId: createNcr
      summary: >-
        Raise an NCR (ISO 9001 8.7 nonconforming output) with an NCR-{SEQ} identifier. Needs
        ncr.create (scope from body.process_id; SYSTEM fallback).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NcrCreate" }
      responses:
        "201":
          description: The raised NCR.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ncr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
    get:
      tags: [capa]
      operationId: listNcrs
      summary: List the org's NCRs. Needs ncr.read.
      responses:
        "200":
          description: The org's NCRs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Ncr" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
  /ncrs/{ncr_id}:
    get:
      tags: [capa]
      operationId: getNcr
      summary: A single NCR. Needs ncr.read.
      parameters:
        - { name: ncr_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The NCR.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ncr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
  /ncrs/{ncr_id}/disposition:
    patch:
      tags: [capa]
      operationId: recordNcrDisposition
      summary: >-
        Record the ISO 9001 8.7 disposition decision + its authorizer (R20). One-shot — 409
        ncr_already_dispositioned if already set. Needs ncr.record_correction.
      parameters:
        - { name: ncr_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NcrDispositionBody" }
      responses:
        "200":
          description: The NCR with its recorded disposition.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ncr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /dcrs:
    post:
      tags: [dcr]
      operationId: createDcr
      summary: >-
        Raise a Document Change Request at Open (doc 15 §8.7). CREATE has no target; REVISE/RETIRE
        require an in-org controlled Document target (422 otherwise; 422 not_a_document for a Record
        target). Writes the genesis stage event + a DCR_RAISED audit. Needs changeRequest.create
        (scope from the target document; SYSTEM fallback for CREATE).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DcrCreate" }
      responses:
        "201":
          description: The raised DCR (state=Open).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dcr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
    get:
      tags: [dcr]
      operationId: listDcrs
      summary: >-
        List the org's DCRs. Filter state / change_type / target_document_id / created_by /
        reason_class. Needs changeRequest.read.
      parameters:
        - { name: state, in: query, required: false, schema: { $ref: "#/components/schemas/DcrState" } }
        - name: change_type
          in: query
          required: false
          schema: { $ref: "#/components/schemas/DcrChangeType" }
        - name: target_document_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - { name: created_by, in: query, required: false, schema: { type: string, format: uuid } }
        - name: reason_class
          in: query
          required: false
          schema: { $ref: "#/components/schemas/DcrReasonClass" }
      responses:
        "200":
          description: The org's DCRs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Dcr" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
  /dcrs/{dcr_id}:
    get:
      tags: [dcr]
      operationId: getDcr
      summary: A DCR with its append-only stage-event trail. Needs changeRequest.read.
      parameters:
        - { name: dcr_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The DCR + stage_events.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dcr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    patch:
      tags: [dcr]
      operationId: patchDcr
      summary: >-
        Edit a DCR's request details (reason / significance / proposed_effective_from) while Open —
        409 dcr_not_editable once it has advanced. Writes a DCR_UPDATED audit. Needs
        changeRequest.assess.
      parameters:
        - { name: dcr_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DcrPatch" }
      responses:
        "200":
          description: The edited DCR.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dcr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
  /dcrs/{dcr_id}/cancel:
    post:
      tags: [dcr]
      operationId: cancelDcr
      summary: >-
        Withdraw a DCR while not yet approved (Open / Assessed / Routed → Cancelled) — 409
        dcr_not_cancellable otherwise. Appends a Cancelled stage event + a DCR_TRANSITIONED audit.
        Needs changeRequest.close.
      parameters:
        - { name: dcr_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DcrCancel" }
      responses:
        "200":
          description: The cancelled DCR (state=Cancelled).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dcr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /dcrs/{dcr_id}/assess:
    post:
      tags: [dcr]
      operationId: assessDcr
      summary: >-
        Open → Assessed (S-dcr-2). Auto-populates the seven doc 05 §5.3 impact dimensions from the
        target document's where-used (a CREATE DCR → N/A rows). 409 dcr_not_assessable if not Open.
        Needs changeRequest.assess.
      parameters:
        - { name: dcr_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The Assessed DCR + the auto-populated impact_assessment rows.
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: "#/components/schemas/Dcr" }
                  - type: object
                    properties:
                      impact_assessment:
                        type: array
                        items: { $ref: "#/components/schemas/ImpactAssessment" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /dcrs/{dcr_id}/route:
    post:
      tags: [dcr]
      operationId: routeDcr
      summary: >-
        Assessed → Routed → InApproval (S-dcr-4). Instantiates the significance-routed `dcr_approval`
        workflow (ROUTER on change_significance: MAJOR → Process Owner → QMS Owner SEQUENTIAL; MINOR →
        QMS Owner) and returns the DCR + the opened approval instance. Approvers then decide via
        `POST /tasks/{id}/decision`. 409 dcr_not_routable (not Assessed), dcr_approval_in_progress, or
        dcr_no_approvers (empty routed role pool). Needs changeRequest.route.
      parameters:
        - { name: dcr_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The InApproval DCR + the opened approval instance.
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: "#/components/schemas/Dcr" }
                  - type: object
                    properties:
                      approval_instance:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          current_state: { type: string }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
  /dcrs/{dcr_id}/impact:
    get:
      tags: [dcr]
      operationId: getDcrImpact
      summary: The DCR's auto-populated impact_assessment rows (S-dcr-2). Needs changeRequest.read.
      parameters:
        - { name: dcr_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The impact_assessment rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ImpactAssessment" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    put:
      tags: [dcr]
      operationId: annotateDcrImpact
      summary: >-
        Set requester_annotation on the named impact dimensions (keyed by ImpactDimension value);
        the auto_populated facts are untouched. 422 on an unknown dimension. Needs changeRequest.assess.
      parameters:
        - { name: dcr_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImpactAnnotate" }
      responses:
        "200":
          description: The updated impact_assessment rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ImpactAssessment" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /dcrs/{dcr_id}/implement:
    post:
      tags: [dcr]
      operationId: implementDcr
      summary: >-
        Approved → Implemented (S-dcr-5, DCR-as-orchestrator). REVISE/CREATE schedule the resulting
        version's go-live (effective_from set + the dcr↔document_version cross-FK) — the release_due
        sweep then performs the cutover; RETIRE obsoletes the target behind the doc 05 §7.3 gate
        (force_retire + override_justification to override a coverage gap). Gated changeRequest.implement
        AND the underlying document.release / document.obsolete enforced in-handler with SoD-2 (the
        author of a revision cannot self-implement). 409 dcr_not_implementable / no_approved_draft /
        obsoletion_blocked; 403 sod_violation; 422 (CREATE without resulting_version_id, or force_retire
        without override_justification).
      parameters:
        - { name: dcr_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DcrImplement" }
      responses:
        "200":
          description: The Implemented DCR.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dcr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /dcrs/{dcr_id}/close:
    post:
      tags: [dcr]
      operationId: closeDcr
      summary: >-
        Implemented → Closed (S-dcr-5). The close gate requires the change to have actually taken
        effect (§5.5) — the resulting version Effective (REVISE/CREATE) or the target Obsolete (RETIRE);
        409 dcr_effectivity_pending while a scheduled cutover is still outstanding. Needs
        changeRequest.close.
      parameters:
        - { name: dcr_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The Closed DCR.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dcr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /capas/{capa_id}/raise-dcr:
    post:
      tags: [dcr]
      operationId: raiseDcrFromCapa
      summary: >-
        Spawn a DCR from a CAPA corrective action (S-dcr-5; doc 02 Cl 10.2 / doc 05 §5.1 — closes the
        §10→§7.5 loop; the DCR's source_link = the capa_id). Gated changeRequest.create (scope from the
        target document). 1:N — a CAPA may spawn child DCRs; an Idempotency-Key makes a retry return the
        same DCR (201 new / 200 replay). 409 capa_terminal (a Closed/Rejected CAPA cannot spawn).
      parameters:
        - { name: capa_id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
          description: "Retry-dedup key — a replay with the same key returns the same DCR (200)."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DcrFromCapa" }
      responses:
        "201":
          description: A freshly spawned DCR.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dcr" }
        "200":
          description: An idempotent replay — the DCR already spawned for this Idempotency-Key.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dcr" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

components:
  securitySchemes:
    keycloak:
      type: openIdConnect
      openIdConnectUrl: https://auth.example/realms/easysynq/.well-known/openid-configuration
      description: >-
        OIDC Authorization Code + PKCE via Keycloak. The API validates the access
        JWT against Keycloak's JWKS; permissions are resolved server-side per
        request, never taken from the token.

  responses:
    ProblemResponse:
      description: An error, as RFC 9457 application/problem+json.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    AuditTransition:
      description: The audit after the FSM transition.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Audit" }
    AuditTransitionConflict:
      description: An illegal FSM transition (invalid_audit_transition).
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, service, version]
      properties:
        status: { type: string, enum: [ok] }
        service: { type: string, example: api }
        version: { type: string, example: "0.1.0" }

    DependencyStatus:
      type: object
      additionalProperties: false
      required: [name, ready]
      properties:
        name:
          type: string
          enum: [postgres, minio, redis, keycloak, alembic]
        ready: { type: boolean }
        detail: { type: [string, "null"] }

    Readiness:
      type: object
      additionalProperties: false
      required: [ready, dependencies]
      properties:
        ready:
          type: boolean
          description: True iff every required dependency is ready.
        dependencies:
          type: array
          items: { $ref: "#/components/schemas/DependencyStatus" }

    Problem:
      type: object
      description: RFC 9457 application/problem+json. HTTP status is authoritative; `code` is the stable machine string.
      additionalProperties: true
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "https://errors.easysynq.local/validation_error" }
        title: { type: string }
        status: { type: integer }
        code:
          type: string
          description: Stable machine-readable error code clients branch on.
          enum:
            - validation_error
            - not_found
            - permission_denied
            - unauthenticated
            - token_expired
            - token_invalid
            - invalid_state_transition
            - conflict
            - lock_conflict
            - etag_mismatch
            - worm_required
            - two_tier_violation
            - sod_violation
            - step_up_required
            - setup_incomplete
            - setup_not_initialized
            - setup_already_complete
            - setup_gates_unsatisfied
            - no_bootstrap_secret
            - bootstrap_invalid
            - bootstrap_expired
            - bootstrap_already_consumed
            - worm_not_enforced
            - rate_limited
            - idempotency_replay
            - internal_error
            - dependency_unavailable
        detail: { type: [string, "null"] }
        instance: { type: [string, "null"] }
        request_id: { type: [string, "null"] }
        errors:
          type: [array, "null"]
          items:
            type: object
            additionalProperties: false
            properties:
              field: { type: string }
              code: { type: string }
              message: { type: string }
        allowed_transitions:
          type: [array, "null"]
          items: { type: string }
          description: "On invalid_state_transition: the lifecycle actions legal from the current state."
        conflicting_duty:
          type: [object, "null"]
          description: "On sod_violation: the violated duty pair (duty_a/duty_b/target_binding)."

    AuthConfig:
      type: object
      additionalProperties: false
      required: [issuer, client_id, audience]
      properties:
        issuer: { type: string }
        client_id: { type: string }
        audience: { type: string }

    OrgProfileUpdate:
      type: object
      additionalProperties: false
      required: [legal_name, short_code, timezone]
      properties:
        legal_name: { type: string }
        short_code: { type: string, description: "[A-Z0-9-], 2-32 chars, not 'DEFAULT'" }
        timezone: { type: string, description: "IANA tz; authoritative for effective dates (R8)" }

    SetupDetail:
      type: object
      additionalProperties: false
      required: [setup_state, gates, org_profile]
      properties:
        setup_state: { type: string, enum: [UNINITIALIZED, IN_SETUP, OPERATIONAL] }
        gates:
          type: object
          additionalProperties: { type: boolean }
          description: Live gate status keyed by gate id (G-A, G-E, G-B, G-C, G-D).
        org_profile:
          type: object
          properties:
            legal_name: { type: [string, "null"] }
            short_code: { type: [string, "null"] }
            timezone: { type: [string, "null"] }
        backup:
          type: object
          description: G-C backup/restore status (S8b2).
          properties:
            configured: { type: boolean }
            destination: { type: [string, "null"] }
            last_restore_test_at: { type: [string, "null"], format: date-time }
            last_restore_test_result: { type: [string, "null"] }
        auth:
          type: object
          description: G-D auth-config status (S8c).
          properties:
            configured: { type: boolean }
            method: { type: [string, "null"] }
            last_test_at: { type: [string, "null"], format: date-time }
        tamper_evident:
          type: boolean
          description: Off-host audit-anchor soft gate (R13) — never blocks finalize.

    AppUser:
      type: object
      additionalProperties: false
      required: [id, keycloak_subject, status, is_guest]
      properties:
        id: { type: string, format: uuid }
        keycloak_subject: { type: string }
        display_name: { type: [string, "null"] }
        email: { type: [string, "null"] }
        status:
          type: string
          enum: [INVITED, ACTIVE, LOCKED, DISABLED, RETIRED]
        is_guest: { type: boolean }

    UserAdmin:
      type: object
      additionalProperties: false
      required: [id, keycloak_subject, status, mfa_enrolled, is_guest, roles]
      description: The admin roster representation (S8d) — AppUser + mfa_enrolled + assigned role names.
      properties:
        id: { type: string, format: uuid }
        keycloak_subject: { type: string }
        display_name: { type: [string, "null"] }
        email: { type: [string, "null"] }
        status:
          type: string
          enum: [INVITED, ACTIVE, LOCKED, DISABLED, RETIRED]
        mfa_enrolled: { type: boolean }
        is_guest: { type: boolean }
        roles:
          type: array
          items: { type: string }

    ScopeLevel:
      type: string
      enum: [SYSTEM, FRAMEWORK, PROCESS, FOLDER, DOC_CLASS, ARTIFACT]

    Permission:
      type: object
      additionalProperties: false
      required: [key, resource, action, is_system_domain, sod_sensitive, sig_hook, finest_scope]
      properties:
        key: { type: string, example: document.approve }
        resource: { type: string, example: document }
        action: { type: string, example: approve }
        is_system_domain:
          type: boolean
          description: True for system-administration domains; drives the two-tier grant guard (R35).
        sod_sensitive: { type: boolean }
        sig_hook:
          type: boolean
          description: True for signature-hook actions (approve/release/obsolete/dispose/verify/close).
        finest_scope: { $ref: "#/components/schemas/ScopeLevel" }

    Role:
      type: object
      additionalProperties: false
      required: [id, name, is_reserved]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, "null"] }
        is_reserved: { type: boolean, description: Seeded ADMIN / QMS-Owner roles cannot be deleted. }

    RoleGrantEntry:
      type: object
      additionalProperties: false
      required: [permission_key]
      properties:
        permission_key: { type: string }
        scope_template:
          type: [object, "null"]
          additionalProperties: true
          description: Parameterized default scope, concretized by bound_scope at assignment.

    RoleDetail:
      type: object
      additionalProperties: false
      required: [id, name, is_reserved, grants]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, "null"] }
        is_reserved: { type: boolean }
        grants:
          type: array
          items: { $ref: "#/components/schemas/RoleGrantEntry" }

    RoleAssignment:
      type: object
      additionalProperties: false
      required: [id, role_id, role_name]
      properties:
        id: { type: string, format: uuid }
        role_id: { type: string, format: uuid }
        role_name: { type: string }
        bound_scope:
          type: [object, "null"]
          additionalProperties: true
          description: Concrete scope binding the role's scope_template for this user.

    RoleAssignmentCreate:
      type: object
      additionalProperties: false
      description: Provide exactly one of role_id or role_name.
      properties:
        role_id: { type: string, format: uuid }
        role_name: { type: string }
        bound_scope:
          type: [object, "null"]
          additionalProperties: true

    ScopeInput:
      type: object
      additionalProperties: false
      required: [level]
      properties:
        level: { $ref: "#/components/schemas/ScopeLevel" }
        selector:
          type: [object, "null"]
          additionalProperties: true
          description: e.g. { process_id } / { folder_path } / { document_level } / { artifact_id }.
        predicates:
          type: [object, "null"]
          additionalProperties: true
          description: Narrowing-only ABAC predicates (read_only, lifecycle_state, ip_allow, ...).

    ScopeRepr:
      type: object
      additionalProperties: false
      required: [level]
      properties:
        level: { $ref: "#/components/schemas/ScopeLevel" }
        selector: { type: [object, "null"], additionalProperties: true }
        predicates: { type: [object, "null"], additionalProperties: true }

    PermissionOverride:
      type: object
      additionalProperties: false
      required: [id, permission_key, effect, scope, require_reason]
      properties:
        id: { type: string, format: uuid }
        permission_key: { type: string }
        effect: { type: string, enum: [ALLOW, DENY] }
        scope: { $ref: "#/components/schemas/ScopeRepr" }
        valid_from: { type: [string, "null"], format: date-time }
        valid_until: { type: [string, "null"], format: date-time }
        require_reason: { type: boolean }

    PermissionOverrideCreate:
      type: object
      additionalProperties: false
      required: [permission_key, effect, scope]
      properties:
        permission_key: { type: string }
        effect: { type: string, enum: [ALLOW, DENY] }
        scope: { $ref: "#/components/schemas/ScopeInput" }
        valid_from: { type: [string, "null"], format: date-time }
        valid_until: { type: [string, "null"], format: date-time }
        require_reason: { type: boolean, default: false }
        reason: { type: [string, "null"] }

    EffectivePermissionEntry:
      type: object
      additionalProperties: false
      required: [key, effect]
      properties:
        key: { type: string }
        effect: { type: string, enum: [ALLOW, DENY] }
        source:
          type: [string, "null"]
          description: Provenance, e.g. "role:Author" or "user_override".

    EffectivePermissions:
      type: object
      additionalProperties: false
      required: [scope, permissions]
      properties:
        scope:
          type: object
          additionalProperties: true
          description: The scope the permissions were resolved at.
        permissions:
          type: array
          items: { $ref: "#/components/schemas/EffectivePermissionEntry" }

    Document:
      type: object
      additionalProperties: false
      required: [id, identifier, kind, title, current_state, classification, is_singleton, owner_user_id, framework_id]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: string, example: SOP-PUR-014 }
        kind: { type: string, enum: [DOCUMENT, RECORD] }
        title: { type: string }
        document_type_id: { type: [string, "null"], format: uuid }
        area_code: { type: [string, "null"] }
        folder_path: { type: [string, "null"], description: Dotted scope path (e.g. SOPs.Purchasing). }
        current_state:
          type: string
          enum: [Draft, InReview, Approved, Effective, UnderRevision, Superseded, Obsolete]
        classification: { type: string, enum: [Public, Internal, Confidential, Restricted] }
        is_singleton: { type: boolean }
        owner_user_id: { type: string, format: uuid }
        framework_id: { type: string, format: uuid }
        current_effective_version_id:
          type: [string, "null"]
          format: uuid
          description: The single governing Effective version (set at the release cutover), or null.
        effective_from:
          type: [string, "null"]
          format: date-time
          description: >-
            The governing effective version's effective_from (slice S-web-2; the library Effective
            column + artifact-header date). Present on list/detail reads; null when no effective
            version (or on create/patch responses).
        created_at: { type: [string, "null"], format: date-time }
        clause_refs:
          type: array
          items: { type: string }
          description: >-
            The clause numbers this document is mapped to (e.g. ["8.4"]), derived from clause_mapping
            (slice S10). Present on list (GET /documents) and single-resource reads; omitted on
            create/patch responses.
          example: ["8.4"]

    PageMeta:
      type: object
      additionalProperties: false
      required: [limit, offset, returned, has_more]
      description: Pagination metadata for a {data, page} list envelope (slice S-web-2). No exact total.
      properties:
        limit: { type: integer, description: The page size actually applied (clamped 1..100). }
        offset: { type: integer, description: The zero-based offset into the authz-filtered set. }
        returned: { type: integer, description: Rows in this page (≤ limit). }
        has_more: { type: boolean, description: Whether more rows follow (derived; no COUNT). }

    DocumentPage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Document" } }
        page: { $ref: "#/components/schemas/PageMeta" }

    DocumentType:
      type: object
      additionalProperties: false
      required: [id, code, name, document_level, is_singleton]
      description: A document-type catalog entry (read-only reference data; slice S-web-2).
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: SOP, description: "The {TYPE} identifier token." }
        name: { type: string, example: Standard Operating Procedure }
        document_level: { type: string, enum: [L1_POLICY, L2_PROCEDURE, L3_WORK_INSTRUCTION, L4_FORM] }
        is_singleton: { type: boolean }

    DirectoryUser:
      type: object
      additionalProperties: false
      required: [id, display_name]
      description: >-
        A minimal user-name directory entry (slice S-web-2) — display name only, no PII. ACTIVE
        non-guest members only.
      properties:
        id: { type: string, format: uuid }
        display_name: { type: [string, "null"] }

    DocumentCreate:
      type: object
      additionalProperties: false
      required: [title, document_type_id]
      properties:
        title: { type: string }
        document_type_id: { type: string, format: uuid }
        area_code: { type: [string, "null"] }
        folder_path: { type: [string, "null"] }
        classification: { type: string, enum: [Public, Internal, Confidential, Restricted], default: Internal }

    MetadataUpdate:
      type: object
      additionalProperties: false
      properties:
        title: { type: [string, "null"] }
        folder_path: { type: [string, "null"] }
        classification: { type: [string, "null"], enum: [Public, Internal, Confidential, Restricted, null] }

    DocumentVersion:
      type: object
      additionalProperties: false
      required: [id, document_id, version_seq, revision_label, version_state, change_significance, change_reason, source_blob_sha256, author_user_id]
      properties:
        id: { type: string, format: uuid }
        document_id: { type: string, format: uuid }
        version_seq: { type: integer }
        revision_label: { type: string, example: Rev A }
        version_state:
          type: string
          enum: [Draft, InReview, Approved, Effective, Superseded, Obsolete]
        change_significance: { type: string, enum: [MAJOR, MINOR] }
        change_reason: { type: string }
        source_blob_sha256: { type: string, description: Lowercase-hex SHA-256 (content address). }
        metadata_snapshot: { type: object, additionalProperties: true }
        author_user_id: { type: string, format: uuid }
        effective_from:
          type: [string, "null"]
          format: date-time
          description: Planned/actual go-live (UTC; R8). Set at approval; the window starts here once Effective.
        effective_to:
          type: [string, "null"]
          format: date-time
          description: When this version ceased governing — set only when superseded.
        superseded_by_version_id:
          type: [string, "null"]
          format: uuid
          description: The successor that superseded this version (supersession chain), or null.
        created_at: { type: [string, "null"], format: date-time }

    DiffProvenance:
      type: object
      additionalProperties: false
      description: The doc 05 §8.1 provenance header for one version (listed, not diffed).
      required: [version_id, version_seq, revision_label, version_state, change_significance, change_reason, author_user_id, signatures]
      properties:
        version_id: { type: string, format: uuid }
        version_seq: { type: integer }
        revision_label: { type: string }
        version_state: { type: string }
        change_significance: { type: string, enum: [MAJOR, MINOR] }
        change_reason: { type: string }
        effective_from: { type: [string, "null"], format: date-time }
        effective_to: { type: [string, "null"], format: date-time }
        author_user_id: { type: string, format: uuid }
        created_at: { type: [string, "null"], format: date-time }
        signatures:
          type: array
          description: The version's signature events (PII-projected — signer_user_id only).
          items:
            type: object
            properties:
              meaning: { type: string, enum: [approval, release, obsolete] }
              signer_user_id: { type: [string, "null"], format: uuid }
              signed_at: { type: [string, "null"], format: date-time }
    VersionDiff:
      type: object
      additionalProperties: false
      required: [document_id, from, to, metadata_diff, text_diff]
      properties:
        document_id: { type: string, format: uuid }
        from: { $ref: "#/components/schemas/DiffProvenance" }
        to: { $ref: "#/components/schemas/DiffProvenance" }
        metadata_diff:
          type: array
          description: Field-by-field deltas over the frozen metadata snapshots (doc 05 §8.2).
          items:
            type: object
            properties:
              field: { type: string }
              from: {}
              to: {}
              changed: { type: boolean }
        text_diff:
          type: object
          description: >-
            The doc 05 §8.3 inline text redline. status="ok" with hunks, or "unavailable" (Tika down /
            non-extractable) with a reason.
          properties:
            status: { type: string, enum: [ok, unavailable] }
            reason: { type: string }
            hunks:
              type: array
              items:
                type: object
                properties:
                  op: { type: string, enum: [equal, insert, delete] }
                  text: { type: string }

    VisualDiffStatus:
      type: object
      additionalProperties: false
      description: >-
        The S-dcr-3b visual page-image diff cache result (doc 05 §8.1). Page PNGs stream via the
        `/visual-diff/page/{page}` sub-resource.
      required: [status]
      properties:
        status: { type: string, enum: [Pending, Ready, Failed, Unavailable] }
        page_count: { type: [integer, "null"] }
        reason: { type: [string, "null"], description: Why Failed / Unavailable. }
        pages:
          type: [array, "null"]
          description: Per-page result (null until Ready).
          items:
            type: object
            properties:
              page: { type: integer }
              changed: { type: boolean }

    CheckInResult:
      allOf:
        - $ref: "#/components/schemas/DocumentVersion"
        - type: object
          properties:
            change_detected:
              type: boolean
              description: false means identical bytes were re-checked-in — no new version.

    InitUpload:
      type: object
      additionalProperties: false
      required: [sha256]
      properties:
        sha256: { type: string, description: Client-computed lowercase-hex SHA-256 of the bytes. }
        content_type: { type: string, default: application/octet-stream }

    InitUploadResult:
      type: object
      additionalProperties: false
      required: [dedup, object_key]
      properties:
        dedup: { type: boolean, description: true means the bytes are already vaulted — skip the upload. }
        object_key: { type: string }
        upload_url:
          type: [string, "null"]
          description: A short-lived presigned PUT URL (null when dedup=true). Points at MinIO, not the api.

    CheckIn:
      type: object
      additionalProperties: false
      required: [sha256]
      properties:
        sha256: { type: string }
        change_reason: { type: string, description: "Mandatory, non-empty (INV-3)." }
        change_significance: { type: string, enum: [MAJOR, MINOR], description: Mandatory (INV-3). }
        mime_type: { type: string, default: application/octet-stream }

    Obsolete:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: { type: string, description: "Obsolescence reason (required, non-empty)." }
        version_id:
          type: [string, "null"]
          format: uuid
          description: "A Superseded version to archive (T12); omit to obsolete the Effective document (T11)."
        force_retire:
          type: boolean
          default: false
          description: >-
            Override the doc 05 §7.3 obsoletion-safety block (a coverage gap — governs an active
            process / referenced by an Effective document / sole ★ coverer). Requires
            override_justification. Without it a blocked obsoletion is 409 obsoletion_blocked (S-dcr-5).
        override_justification:
          type: [string, "null"]
          description: "Recorded justification for a force_retire override (required when force_retire; §7.3)."

    DcrImplement:
      type: object
      additionalProperties: false
      properties:
        resulting_version_id:
          type: [string, "null"]
          format: uuid
          description: "CREATE only: the out-of-band-authored Approved version this DCR releases (required for CREATE)."
        force_retire:
          type: boolean
          default: false
          description: "RETIRE only: override the §7.3 obsoletion-safety block (requires override_justification)."
        override_justification:
          type: [string, "null"]
          description: "RETIRE only: recorded justification for a force_retire override (§7.3)."

    DcrFromCapa:
      type: object
      additionalProperties: false
      required: [change_type, change_significance, reason_text]
      properties:
        change_type: { type: string, enum: [REVISE, CREATE, RETIRE] }
        change_significance: { type: string, enum: [MAJOR, MINOR] }
        reason_text: { type: string, minLength: 1, maxLength: 4000 }
        target_document_id:
          type: [string, "null"]
          format: uuid
          description: "Required for a REVISE/RETIRE DCR; must be omitted for CREATE."
        reason_class:
          type: string
          default: capa
          description: "The classified reason-for-change (defaults to capa for a CAPA-driven DCR)."
        proposed_effective_from:
          type: [string, "null"]
          format: date-time

    Release:
      type: object
      additionalProperties: false
      properties:
        version_id:
          type: [string, "null"]
          format: uuid
          description: "The Approved version to release; omit to release the sole Approved version."

    WorkingDraft:
      type: object
      additionalProperties: false
      required: [id, document_id, checked_out_by, lock_ttl_seconds]
      properties:
        id: { type: string, format: uuid }
        document_id: { type: string, format: uuid }
        checked_out_by: { type: string, format: uuid }
        checked_out_at: { type: [string, "null"], format: date-time }
        source_version_id: { type: [string, "null"], format: uuid }
        lock_ttl_seconds: { type: integer, example: 28800 }

    VersionDownload:
      type: object
      additionalProperties: false
      required: [download_url]
      properties:
        download_url: { type: string, description: "Short-lived presigned GET URL (MinIO, not the api)." }
        content_type: { type: string }
        sha256: { type: string }

    DocumentDownload:
      type: object
      additionalProperties: false
      required: [download_url, rendition]
      properties:
        download_url: { type: string, description: "Short-lived presigned GET URL (MinIO, not the api)." }
        content_type: { type: string }
        rendition:
          type: string
          enum: [controlled_copy, source]
          description: "controlled_copy = the watermarked PDF rendition; source = no controlled rendition yet (rendering or R26)."
        sha256: { type: string }

    Clause:
      type: object
      additionalProperties: false
      required: [id, framework_id, number, title, intent_text, is_mandatory_star, pdca_phase, requirement_node]
      properties:
        id: { type: string, format: uuid }
        framework_id: { type: string, format: uuid }
        number: { type: string, example: "8.5.6" }
        parent_id: { type: [string, "null"], format: uuid }
        title: { type: string }
        intent_text: { type: string }
        is_mandatory_star: { type: boolean, description: "A ★ clause demanding its own documented information (doc 02 §2.1, R30; e.g. 8.5.6)." }
        pdca_phase: { type: string, enum: [PLAN, DO, CHECK, ACT] }
        requirement_node: { type: boolean }

    ClauseMapping:
      type: object
      additionalProperties: false
      required: [id, document_id, clause_id, clause_number, clause_title, is_requirement_level, framework_id]
      properties:
        id: { type: string, format: uuid }
        document_id: { type: string, format: uuid }
        clause_id: { type: string, format: uuid }
        clause_number: { type: string, example: "8.5.6" }
        clause_title: { type: string }
        is_requirement_level: { type: boolean }
        framework_id: { type: string, format: uuid }
        created_at: { type: [string, "null"], format: date-time }

    ClauseMappingCreate:
      type: object
      additionalProperties: false
      required: [clause_id]
      properties:
        clause_id: { type: string, format: uuid }
        is_requirement_level: { type: boolean, default: false }

    Process:
      type: object
      additionalProperties: false
      required: [id, org_id, name, pdca_phase, state, excluded, is_outsourced]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        parent_id: { type: [string, "null"], format: uuid }
        owner_org_role_id: { type: [string, "null"], format: uuid }
        pdca_phase: { type: string, enum: [PLAN, DO, CHECK, ACT] }
        criteria: { type: [string, "null"] }
        state: { type: string, enum: [SEED, ACTIVE] }
        excluded: { type: boolean }
        is_outsourced: { type: boolean }
        outsourced_supplier_id: { type: [string, "null"], format: uuid }
        created_at: { type: [string, "null"], format: date-time }

    ProcessCreate:
      type: object
      additionalProperties: false
      required: [name, pdca_phase]
      properties:
        name: { type: string }
        pdca_phase: { type: string, enum: [PLAN, DO, CHECK, ACT] }
        parent_id: { type: [string, "null"], format: uuid }
        criteria: { type: [string, "null"] }
        is_outsourced: { type: boolean, default: false }
        owner_org_role_id: { type: [string, "null"], format: uuid }
        outsourced_supplier_id: { type: [string, "null"], format: uuid }

    ProcessUpdate:
      type: object
      additionalProperties: false
      description: "A PATCH; only the present fields change. state accepts only SEED→ACTIVE (a one-way ratchet)."
      properties:
        name: { type: [string, "null"] }
        pdca_phase: { type: [string, "null"], enum: [PLAN, DO, CHECK, ACT, null] }
        criteria: { type: [string, "null"] }
        excluded: { type: [boolean, "null"] }
        owner_org_role_id: { type: [string, "null"], format: uuid }
        state: { type: [string, "null"], enum: [SEED, ACTIVE, null] }

    ProcessEdge:
      type: object
      additionalProperties: false
      required: [id, from_process_id, to_process_id]
      properties:
        id: { type: string, format: uuid }
        from_process_id: { type: string, format: uuid }
        to_process_id: { type: string, format: uuid }
        io_label: { type: [string, "null"] }

    EdgeCreate:
      type: object
      additionalProperties: false
      required: [to_process_id]
      properties:
        to_process_id: { type: string, format: uuid }
        io_label: { type: [string, "null"] }

    ProcessMap:
      type: object
      additionalProperties: false
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/Process" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/ProcessEdge" }

    ProcessLink:
      type: object
      additionalProperties: false
      required: [id, document_id, process_id, process_name]
      properties:
        id: { type: string, format: uuid }
        document_id: { type: string, format: uuid }
        process_id: { type: string, format: uuid }
        process_name: { type: string }
        created_at: { type: [string, "null"], format: date-time }

    ProcessLinkCreate:
      type: object
      additionalProperties: false
      required: [process_id]
      properties:
        process_id: { type: string, format: uuid }

    Task:
      type: object
      additionalProperties: false
      required: [id, instance_id, stage_key, type, state]
      properties:
        id: { type: string, format: uuid }
        instance_id: { type: string, format: uuid }
        stage_key: { type: string, example: quality_approval }
        type:
          type: string
          enum:
            - APPROVE
            - REVIEW
            - PERIODIC_REVIEW
            - AUDIT_TASK
            - FINDING_ACK
            - CAPA_STAGE
            - CAPA_ACTION
            - VERIFY
            - MR_INPUT
            - MR_ACTION
            - DCR_TRIAGE
        state:
          type: string
          enum: [PENDING, CLAIMED, DONE, SKIPPED, ESCALATED, EXPIRED]
        assignee_user_id: { type: [string, "null"], format: uuid }
        candidate_pool:
          type: [array, "null"]
          items: { type: string, format: uuid }
          description: "Resolved candidate approver ids (role-derived); My-Tasks filters containment."
        action_expected: { type: [string, "null"] }
        due_at: { type: [string, "null"], format: date-time }

    WorkflowInstance:
      type: object
      additionalProperties: false
      required: [id, definition_id, definition_version, subject_type, subject_id, current_state]
      properties:
        id: { type: string, format: uuid }
        definition_id: { type: string, format: uuid }
        definition_version: { type: integer, description: "Pinned at instantiation." }
        subject_type:
          type: string
          enum: [DOCUMENT, DCR, CAPA, AUDIT, MGMT_REVIEW, PERIODIC_REVIEW]
        subject_id: { type: string, format: uuid }
        current_state:
          type: string
          description: "IN_APPROVAL | APPROVED | REJECTED_TO_DRAFT | NEEDS_ATTENTION (MVP approval-only)."
        started_at: { type: [string, "null"], format: date-time }
        revision: { type: integer }
        tasks:
          type: array
          items: { $ref: "#/components/schemas/Task" }
          description: "Present only with ?expand=tasks."

    Decision:
      type: object
      additionalProperties: false
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [approve, changes_requested, reject]
          description: "approve signs (document.approve); changes_requested/reject returns to Draft (document.review)."
        comment:
          type: [string, "null"]
          description: "Required (non-empty) for changes_requested/reject; recorded as the decision intent."
        effective_from:
          type: [string, "null"]
          format: date-time
          description: "Planned go-live on approve (R8, UTC); future dates stay Approved until the Beat sweep."

    SignatureEventSummary:
      type: object
      additionalProperties: false
      required: [id, meaning, method]
      properties:
        id: { type: string, format: uuid }
        meaning:
          type: string
          enum: [review, approval, release, obsolete, verify, disposition, import_baseline, review_confirmed]
        method: { type: string, enum: [app_click, SESSION], example: SESSION }
        content_digest: { type: [string, "null"] }
        auth_context: { type: [object, "null"], description: "OIDC acr/amr." }
        reauth_at: { type: [string, "null"], format: date-time, description: "Reserved (Part-11); NULL in v1." }
        crypto_signature: { type: [string, "null"], description: "Reserved (Part-11); NULL in v1." }

    DecisionResult:
      type: object
      additionalProperties: false
      required: [task_id, instance_id, stage_key, outcome, decided_at, decided_by]
      properties:
        task_id: { type: string, format: uuid }
        instance_id: { type: string, format: uuid }
        stage_key: { type: string }
        outcome: { type: string, enum: [approve, changes_requested, reject] }
        decided_at: { type: [string, "null"], format: date-time }
        decided_by: { type: string, format: uuid }
        signature_event:
          oneOf:
            - { $ref: "#/components/schemas/SignatureEventSummary" }
            - { type: "null" }
          description: "Present for an approval; null for changes_requested/reject."
        comment: { type: [string, "null"] }

    AuditEvent:
      type: object
      additionalProperties: false
      description: "One immutable, attributed, hash-chained audit row (doc 12 §4.2)."
      required: [id, org_id, occurred_at, actor_type, event_type, object_type]
      properties:
        id: { type: integer, format: int64, description: "Monotonic identity; a gap is a tamper signal." }
        org_id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor_id: { type: [string, "null"], format: uuid, description: "Null for system/Beat jobs." }
        actor_type: { type: string, enum: [user, system, external_auditor, admin] }
        event_type: { type: string, description: "Extensible enum (clients tolerate unknown values)." }
        object_type: { type: string, enum: [document, version, record, permission, user, session, config, audit] }
        object_id: { type: [string, "null"], format: uuid }
        scope_ref: { type: [string, "null"] }
        reason: { type: [string, "null"], description: "Mandatory Change Reason for content-changing events." }
        before: { type: [object, "null"], additionalProperties: true }
        after: { type: [object, "null"], additionalProperties: true }
        request_id: { type: [string, "null"], format: uuid }
        client_ip: { type: [string, "null"] }
        user_agent: { type: [string, "null"] }
        auth_context: { type: [object, "null"], additionalProperties: true }
        prev_hash: { type: [string, "null"], description: "Lowercase-hex SHA-256; null until linked." }
        row_hash: { type: [string, "null"], description: "Lowercase-hex SHA-256; null until linked." }
        chained_at: { type: [string, "null"], format: date-time, description: "Null = written-but-not-yet-chained." }
        signature_event_id: { type: [string, "null"], format: uuid, description: "Reserved Part-11 hook (null in v1)." }

    AuditEventPage:
      type: object
      additionalProperties: false
      required: [events, next_cursor]
      properties:
        events:
          type: array
          items: { $ref: "#/components/schemas/AuditEvent" }
        next_cursor: { type: [integer, "null"], format: int64, description: "Pass as ?cursor= for the next page; null at the end." }

    VerifyChainResult:
      type: object
      additionalProperties: false
      required: [verified, checked, pending, breaks]
      properties:
        verified: { type: boolean }
        checked: { type: integer, description: "Linked rows re-walked." }
        pending: { type: integer, description: "Unchained tail (not a break)." }
        breaks:
          type: array
          description: "Empty when verified; the first entry is the root cause."
          items:
            type: object
            additionalProperties: false
            required: [at_id, reason]
            properties:
              at_id: { type: integer, format: int64 }
              reason: { type: string }

    AuditExportJob:
      type: object
      additionalProperties: false
      required: [job_id, status_url]
      properties:
        job_id: { type: string }
        status_url: { type: string }

    AuditStatus:
      type: object
      additionalProperties: false
      required: [tamper_evidence_attested, sink_enabled, chain_lag_seconds]
      properties:
        tamper_evidence_attested: { type: boolean, description: "False until a genuinely off-host anchor exists (R13)." }
        sink_enabled: { type: boolean }
        chain_lag_seconds: { type: number, description: "now − oldest unchained row's occurred_at (0 if fully linked)." }

    SearchHit:
      type: object
      additionalProperties: false
      required: [type, id, identifier, title, current_state, clause_refs, snippet, rank]
      properties:
        type: { type: string, enum: [document], description: "Records/other types are not built yet." }
        id: { type: string, format: uuid }
        identifier: { type: string, example: SOP-PUR-014 }
        title: { type: string }
        current_state: { type: string, enum: [Draft, InReview, Approved, Effective, UnderRevision, Superseded, Obsolete] }
        clause_refs: { type: array, items: { type: string }, example: ["8.4"] }
        snippet: { type: string, description: "ts_headline highlight over title + identifier." }
        rank: { type: number, description: "ts_rank relevance (identifier > title > legacy/area)." }

    SearchResults:
      type: object
      additionalProperties: false
      required: [query, results, hidden_by_scope]
      properties:
        query: { type: string }
        results: { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        hidden_by_scope:
          type: integer
          description: Matching documents the caller may not read ("N hidden by your access scope").

    Suggestion:
      type: object
      additionalProperties: false
      required: [id, identifier, title]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: string }
        title: { type: string }

    Suggestions:
      type: object
      additionalProperties: false
      required: [suggestions]
      properties:
        suggestions: { type: array, items: { $ref: "#/components/schemas/Suggestion" } }

    ChecklistRow:
      type: object
      additionalProperties: false
      required: [clause_id, number, title, pdca_phase, mapped_count, effective_count, status]
      properties:
        clause_id: { type: string, format: uuid }
        number: { type: string, example: "8.4" }
        title: { type: string }
        pdca_phase: { type: string, enum: [PLAN, DO, CHECK, ACT] }
        mapped_count: { type: integer, description: "Distinct documents mapped to this ★ clause." }
        effective_count: { type: integer, description: "Of those, how many have an Effective version." }
        status: { type: string, enum: [COVERED, PARTIAL, GAP] }

    ChecklistRollup:
      type: object
      additionalProperties: false
      required: [total, covered, partial, gap]
      properties:
        total: { type: integer, example: 20 }
        covered: { type: integer }
        partial: { type: integer }
        gap: { type: integer }

    ComplianceChecklist:
      type: object
      additionalProperties: false
      required: [framework, rollup, rows]
      properties:
        framework: { type: string, example: "iso9001:2015" }
        rollup: { $ref: "#/components/schemas/ChecklistRollup" }
        rows: { type: array, items: { $ref: "#/components/schemas/ChecklistRow" } }

    RecordType:
      type: string
      description: The record discriminator (doc 06 §2). All 16 are accepted as flat captures in S-rec-1.
      enum:
        - AUDIT
        - AUDIT_FINDING
        - CAPA
        - COMPETENCE
        - CALIBRATION
        - MGMT_REVIEW
        - SUPPLIER_EVAL
        - RELEASE
        - KPI_READING
        - SATISFACTION
        - TRACEABILITY
        - PROPERTY_EVENT
        - CHANGE
        - EVIDENCE
        - FILLED_FORM
        - COMPLAINT

    RetentionBasis:
      type: string
      description: When a record's retention clock starts (doc 06 §5.1).
      enum:
        - captured_at
        - "event:employment_end"
        - "event:product_eol"
        - "event:contract_end"
        - "event:capa_closed"

    DispositionAction:
      type: string
      description: What happens to a record at end-of-retention (doc 06 §5.1).
      enum:
        - DESTROY
        - ARCHIVE_COLD
        - TRANSFER
        - RETAIN_PERMANENT

    EvidenceRef:
      type: object
      additionalProperties: false
      required: [sha256]
      properties:
        sha256: { type: string, description: Client-computed lowercase-hex SHA-256 of the evidence bytes. }
        content_type: { type: string, default: application/octet-stream }

    EvidenceBlob:
      type: object
      additionalProperties: false
      required: [sha256, is_original, size_bytes]
      properties:
        sha256: { type: string, description: The content-addressed evidence blob (lowercase hex). }
        is_original: { type: boolean, description: true for the uploaded artifact (vs a derived rendition). }
        filename: { type: [string, "null"] }
        content_type: { type: [string, "null"] }
        size_bytes: { type: integer }
        created_at: { type: [string, "null"], format: date-time }

    EvidenceLink:
      type: object
      additionalProperties: false
      required: [id, record_id, target_type, target_id]
      properties:
        id: { type: string, format: uuid }
        record_id: { type: string, format: uuid }
        target_type: { type: string, enum: [clause, process, document, finding, capa_stage] }
        target_id: { type: string, format: uuid }
        link_reason: { type: [string, "null"] }
        created_at: { type: [string, "null"], format: date-time }

    EvidenceLinkCreate:
      type: object
      additionalProperties: false
      required: [target_type, target_id]
      properties:
        target_type:
          type: string
          enum: [clause, process, document, finding, capa_stage]
          description: >-
            The link target kind. S-aud-2 enabled finding/capa_stage (the reserved targets);
            clause/process/document since S-rec-1. The API validates the target exists in the org.
        target_id: { type: string, format: uuid }
        link_reason: { type: [string, "null"] }

    EvidenceDownload:
      type: object
      additionalProperties: false
      required: [download_url, sha256]
      properties:
        download_url:
          type: string
          description: A short-lived presigned GET URL for the evidence blob. Points at MinIO, not the api.
        sha256: { type: string }
        content_type: { type: [string, "null"] }

    FieldDefinition:
      type: object
      additionalProperties: false
      required: [key, type]
      description: One field in a Mode-B form template's schema (the bespoke DSL, doc 06 §4.2).
      properties:
        key: { type: string, description: Unique field key. }
        label: { type: string }
        type: { type: string, enum: [string, text, number, integer, boolean, date, enum] }
        required: { type: boolean, default: false }
        min: { description: "Value bound (number/integer), length bound (string/text), or ISO-date bound (date)." }
        max: { description: As min. }
        enum:
          type: array
          items: { type: string }
          description: Required and non-empty iff type=enum.
    FieldSchema:
      type: object
      additionalProperties: false
      required: [fields]
      description: A form template's field schema — validated server-side at capture (types/required/ranges/enums).
      properties:
        fields:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/FieldDefinition" }
    FormSchemaCheckin:
      type: object
      additionalProperties: false
      description: Freeze the working schema into an immutable version (INV-3 — reason + significance mandatory).
      properties:
        change_reason: { type: string }
        change_significance: { type: string, enum: [MAJOR, MINOR] }
    OrgConfig:
      type: object
      additionalProperties: false
      properties:
        org_id: { type: string, format: uuid }
        capture_pre_release_templates:
          type: boolean
          description: Whether Mode-B capture may use a non-Effective (draft) form template (doc 06 §4.2).
        allow_self_disposition:
          type: boolean
          description: >-
            SoD-6 relaxation (doc 07 §7): when false (default, STRICT) a record's capturer may not
            execute its own disposition; when true the org relaxes that for a small/solo install.
        allow_capa_self_verify:
          type: boolean
          description: >-
            Severity-aware SoD-4 relaxation (R39): when false (default, STRICT) a CAPA's action
            implementer may not verify it; when true a Minor CAPA may be self-verified (Critical/Major
            always hard-enforce). A forward seam exposed now; enforced in S-capa-3.
    OrgConfigUpdate:
      type: object
      additionalProperties: false
      description: A partial org-config update; only supplied fields change.
      properties:
        capture_pre_release_templates: { type: [boolean, "null"] }
        allow_self_disposition: { type: [boolean, "null"] }
        allow_capa_self_verify: { type: [boolean, "null"] }

    CapaSource:
      type: string
      description: review_output is reserved for the deferred Management-Review family (never written in v1).
      enum: [audit, process, complaint, review_output]
    NcSeverity:
      type: string
      enum: [Critical, Major, Minor]
    CapaCloseState:
      type: string
      enum: [Raised, Containment, RootCause, ActionPlan, Implement, Verify, Closed, Rejected]
    NcrSource:
      type: string
      enum: [audit, process, complaint, internal]
    NcrDisposition:
      type: string
      description: ISO 9001 8.7 disposition tokens (R20).
      enum: [use_as_is, rework, scrap, return, concession, regrade]
    CapaStage:
      type: object
      additionalProperties: false
      required: [id, stage, content_block, cycle_marker, created_by, created_at]
      properties:
        id: { type: string, format: uuid }
        stage: { $ref: "#/components/schemas/CapaCloseState" }
        content_block: { type: object, additionalProperties: true }
        cycle_marker: { type: integer }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
    Capa:
      type: object
      additionalProperties: false
      required: [id, identifier, source, severity, close_state, cycle_marker]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: [string, "null"] }
        source: { $ref: "#/components/schemas/CapaSource" }
        severity: { $ref: "#/components/schemas/NcSeverity" }
        process_id: { type: [string, "null"], format: uuid }
        close_state: { $ref: "#/components/schemas/CapaCloseState" }
        cycle_marker: { type: integer }
        origin_finding_id:
          type: [string, "null"]
          format: uuid
          description: NULL in v1 — the NC→CAPA auto-link (audit_finding) lands in S-aud-2.
        stages:
          type: array
          items: { $ref: "#/components/schemas/CapaStage" }
          description: The sealed stage trail (present on a single read, omitted on the list).
    CapaRaise:
      type: object
      additionalProperties: false
      required: [title, severity]
      properties:
        title: { type: string }
        severity: { $ref: "#/components/schemas/NcSeverity" }
        source: { $ref: "#/components/schemas/CapaSource" }
        process_id: { type: [string, "null"], format: uuid }
        problem: { type: [string, "null"] }
    ContainmentCreate:
      type: object
      additionalProperties: false
      required: [content_block]
      properties:
        content_block:
          type: object
          additionalProperties: true
          description: The sealed correction narrative (non-empty).
    StageBlockCreate:
      type: object
      additionalProperties: false
      required: [content_block]
      properties:
        content_block:
          type: object
          additionalProperties: true
          description: >-
            The sealed stage block (non-empty). For root-cause: the RCA narrative (e.g. root_cause,
            method). For action-plan: the proposed corrective plan (e.g. action_items[] with
            description / owner / due_date), which is sealed + signed at approval-complete. For
            implement: the action-completion narrative.
    CapaVerifyCreate:
      type: object
      additionalProperties: false
      required: [decision, content_block]
      properties:
        decision:
          type: string
          enum: [effective, not_effective]
          description: >-
            The verifier's effectiveness decision. Only `effective` can close the CAPA (with the M4
            evidence gate); `not_effective` loops it back to RootCause for a re-approved revised plan.
        content_block:
          type: object
          additionalProperties: true
          description: The sealed effectiveness-verification narrative (non-empty).
    DcrState:
      type: string
      description: >-
        The DCR lifecycle (doc 14 §7). Cancelled/Closed/Rejected are terminal; the InApproval
        changes-requested loop returns to Open (doc 15 §8.7).
      enum: [Open, Assessed, Routed, InApproval, Approved, Implemented, Closed, Cancelled, Rejected]
    DcrChangeType:
      type: string
      enum: [REVISE, CREATE, RETIRE]
    DcrReasonClass:
      type: string
      enum:
        [regulatory, audit_finding, capa, process_improvement, error_correction, periodic_review,
         customer_requirement, other]
    DcrSourceLinkType:
      type: string
      description: mgmt_review / risk are reserved forward seams (those families are not built in v1).
      enum: [capa, finding, mgmt_review, risk]
    ChangeSignificance:
      type: string
      enum: [MAJOR, MINOR]
    DcrStageEvent:
      type: object
      additionalProperties: false
      required: [id, from_state, to_state, actor_id, comment, payload, occurred_at]
      properties:
        id: { type: string, format: uuid }
        from_state:
          oneOf:
            - { $ref: "#/components/schemas/DcrState" }
            - { type: "null" }
        to_state: { $ref: "#/components/schemas/DcrState" }
        actor_id: { type: [string, "null"], format: uuid }
        comment: { type: [string, "null"] }
        payload: { type: [object, "null"], additionalProperties: true }
        occurred_at: { type: string, format: date-time }
    Dcr:
      type: object
      additionalProperties: false
      required:
        [id, identifier, target_document_id, change_type, change_significance, reason_class,
         reason_text, state, created_by, created_at]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: string, description: "DCR-{YYYY}-{SEQ} (4-digit SEQ)." }
        target_document_id:
          type: [string, "null"]
          format: uuid
          description: NULL for a CREATE DCR; the target Document for REVISE/RETIRE.
        change_type: { $ref: "#/components/schemas/DcrChangeType" }
        change_significance: { $ref: "#/components/schemas/ChangeSignificance" }
        reason_class: { $ref: "#/components/schemas/DcrReasonClass" }
        reason_text: { type: string }
        source_link_type:
          oneOf:
            - { $ref: "#/components/schemas/DcrSourceLinkType" }
            - { type: "null" }
        source_link_id: { type: [string, "null"], format: uuid }
        proposed_effective_from: { type: [string, "null"], format: date-time }
        resulting_version_id:
          type: [string, "null"]
          format: uuid
          description: NULL in v1 — set when the DCR-driven version is released (S-dcr-5).
        state: { $ref: "#/components/schemas/DcrState" }
        decision: { type: [string, "null"] }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        stage_events:
          type: array
          items: { $ref: "#/components/schemas/DcrStageEvent" }
          description: The append-only transition trail (present on a single read, omitted on list).
    DcrCreate:
      type: object
      additionalProperties: false
      required: [change_type, change_significance, reason_class, reason_text]
      properties:
        change_type: { $ref: "#/components/schemas/DcrChangeType" }
        change_significance: { $ref: "#/components/schemas/ChangeSignificance" }
        reason_class: { $ref: "#/components/schemas/DcrReasonClass" }
        reason_text: { type: string, minLength: 1, maxLength: 4000 }
        target_document_id:
          type: [string, "null"]
          format: uuid
          description: Required for REVISE/RETIRE; must be omitted/null for CREATE.
        source_link_type:
          oneOf:
            - { $ref: "#/components/schemas/DcrSourceLinkType" }
            - { type: "null" }
        source_link_id: { type: [string, "null"], format: uuid }
        proposed_effective_from: { type: [string, "null"], format: date-time }
    DcrPatch:
      type: object
      additionalProperties: false
      description: All fields optional; null/absent = unchanged (S-dcr-1 cannot clear a field).
      properties:
        reason_text: { type: [string, "null"], minLength: 1, maxLength: 4000 }
        reason_class:
          oneOf:
            - { $ref: "#/components/schemas/DcrReasonClass" }
            - { type: "null" }
        change_significance:
          oneOf:
            - { $ref: "#/components/schemas/ChangeSignificance" }
            - { type: "null" }
        proposed_effective_from: { type: [string, "null"], format: date-time }
    DcrCancel:
      type: object
      additionalProperties: false
      properties:
        comment: { type: [string, "null"], maxLength: 2000 }
    DocumentLinkType:
      type: string
      enum: [parent_of, child_of, references, supersedes]
    DocumentLink:
      type: object
      additionalProperties: false
      required: [id, from_document_id, to_document_id, link_type, created_at]
      properties:
        id: { type: string, format: uuid }
        from_document_id: { type: string, format: uuid }
        to_document_id: { type: string, format: uuid }
        link_type: { $ref: "#/components/schemas/DocumentLinkType" }
        created_at: { type: string, format: date-time }
    DocumentLinkCreate:
      type: object
      additionalProperties: false
      required: [to_document_id, link_type]
      properties:
        to_document_id: { type: string, format: uuid }
        link_type: { $ref: "#/components/schemas/DocumentLinkType" }
    ImpactDimension:
      type: string
      description: The seven doc 05 §5.3 structured impact-assessment dimensions.
      enum:
        [affected_processes, dependent_documents, records_produced_under, training_awareness,
         clause_coverage, effectivity_transition, risk]
    ImpactAssessment:
      type: object
      additionalProperties: false
      required: [id, dimension, auto_populated, requester_annotation, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        dimension: { $ref: "#/components/schemas/ImpactDimension" }
        auto_populated:
          type: object
          additionalProperties: true
          description: "System-computed facts; applicable=false for a CREATE DCR (no target)."
        requester_annotation: { type: [string, "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: [string, "null"], format: date-time }
    ImpactAnnotate:
      type: object
      additionalProperties: false
      required: [annotations]
      properties:
        annotations:
          type: object
          additionalProperties: { type: string }
          description: Keyed by ImpactDimension value → the requester's annotation text.
    WhereUsed:
      type: object
      additionalProperties: true
      description: >-
        The doc 05 §7.2 where-used panel: document_id + arrays of processes / child_documents /
        parent_documents / referenced_by / references_out / forms_templates / supersedes /
        superseded_by / clauses / related_capas_findings, a records_produced_under {count, sample},
        and an obsoletion_safety {blocked, reasons[]} advisory (§7.3).
    Complaint:
      type: object
      additionalProperties: false
      required: [id, identifier, description]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: [string, "null"] }
        customer: { type: [string, "null"] }
        received_at: { type: [string, "null"], format: date-time }
        channel: { type: [string, "null"] }
        description: { type: string }
        severity:
          oneOf:
            - { $ref: "#/components/schemas/NcSeverity" }
            - { type: "null" }
        spawned_capa_id:
          type: [string, "null"]
          format: uuid
          description: The one-click-spawn idempotency latch (R16) — set once at spawn.
    ComplaintCreate:
      type: object
      additionalProperties: false
      required: [description]
      properties:
        description: { type: string }
        customer: { type: [string, "null"] }
        received_at: { type: [string, "null"], format: date-time }
        channel: { type: [string, "null"] }
        severity:
          oneOf:
            - { $ref: "#/components/schemas/NcSeverity" }
            - { type: "null" }
    SpawnCapa:
      type: object
      additionalProperties: false
      properties:
        severity:
          oneOf:
            - { $ref: "#/components/schemas/NcSeverity" }
            - { type: "null" }
        process_id: { type: [string, "null"], format: uuid }
    Ncr:
      type: object
      additionalProperties: false
      required: [id, identifier, source, description, severity, created_at]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: string }
        source: { $ref: "#/components/schemas/NcrSource" }
        description: { type: string }
        severity: { $ref: "#/components/schemas/NcSeverity" }
        process_id: { type: [string, "null"], format: uuid }
        disposition:
          oneOf:
            - { $ref: "#/components/schemas/NcrDisposition" }
            - { type: "null" }
        disposition_authorized_by: { type: [string, "null"], format: uuid }
        disposition_notes: { type: [string, "null"] }
        disposed_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
    NcrCreate:
      type: object
      additionalProperties: false
      required: [source, description, severity]
      properties:
        source: { $ref: "#/components/schemas/NcrSource" }
        description: { type: string }
        severity: { $ref: "#/components/schemas/NcSeverity" }
        process_id: { type: [string, "null"], format: uuid }
    NcrDispositionBody:
      type: object
      additionalProperties: false
      required: [disposition]
      properties:
        disposition: { $ref: "#/components/schemas/NcrDisposition" }
        notes: { type: [string, "null"] }

    AuditProgram:
      type: object
      additionalProperties: false
      required: [id, identifier, title, archived, created_at]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: string }
        title: { type: string }
        period: { type: [string, "null"] }
        coverage: { type: [object, "null"], additionalProperties: true }
        archived: { type: boolean }
        created_at: { type: string, format: date-time }

    AuditProgramCreate:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 300 }
        period: { type: [string, "null"], maxLength: 100 }
        coverage: { type: [object, "null"], additionalProperties: true }

    AuditProgramUpdate:
      type: object
      additionalProperties: false
      description: "A PATCH; only the present fields change."
      properties:
        title: { type: [string, "null"], minLength: 1, maxLength: 300 }
        period: { type: [string, "null"], maxLength: 100 }
        coverage: { type: [object, "null"], additionalProperties: true }
        archived: { type: [boolean, "null"] }

    AuditPlan:
      type: object
      additionalProperties: false
      required: [id, program_id, created_at]
      properties:
        id: { type: string, format: uuid }
        program_id: { type: string, format: uuid }
        auditee_process_id: { type: [string, "null"], format: uuid }
        lead_auditor_user_id: { type: [string, "null"], format: uuid }
        scheduled_date: { type: [string, "null"], format: date }
        checklist_ref: { type: [string, "null"] }
        created_at: { type: string, format: date-time }

    AuditPlanCreate:
      type: object
      additionalProperties: false
      properties:
        auditee_process_id: { type: [string, "null"], format: uuid }
        lead_auditor_user_id: { type: [string, "null"], format: uuid }
        scheduled_date: { type: [string, "null"], format: date }
        checklist_ref: { type: [string, "null"], maxLength: 300 }

    Audit:
      type: object
      additionalProperties: false
      required: [id, plan_id, state]
      properties:
        id: { type: string, format: uuid }
        plan_id: { type: string, format: uuid }
        lead_auditor_user_id: { type: [string, "null"], format: uuid }
        state:
          type: string
          enum: [Scheduled, Planned, InProgress, FindingsDraft, Reported, Closing, Closed]
        started_at: { type: [string, "null"], format: date }
        completed_at: { type: [string, "null"], format: date }
        result_summary: { type: [string, "null"] }

    AuditCreate:
      type: object
      additionalProperties: false
      required: [plan_id]
      properties:
        plan_id: { type: string, format: uuid }
        title: { type: [string, "null"], minLength: 1, maxLength: 300 }
        lead_auditor_user_id: { type: [string, "null"], format: uuid }

    FindingType:
      type: string
      enum: [NC, OBSERVATION, OFI]
      description: NC auto-creates a linked CAPA and gates the audit close; OBSERVATION/OFI do not.

    Finding:
      type: object
      additionalProperties: false
      required: [id, audit_id, finding_type]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: [string, "null"] }
        audit_id: { type: string, format: uuid }
        finding_type: { $ref: "#/components/schemas/FindingType" }
        severity:
          oneOf:
            - { $ref: "#/components/schemas/NcSeverity" }
            - { type: "null" }
        clause_ref: { type: [string, "null"] }
        process_ref: { type: [string, "null"] }
        auto_capa_id:
          type: [string, "null"]
          format: uuid
          description: The mandatory CAPA auto-created for an NC (NULL for OBSERVATION/OFI).
        correction_of: { type: [string, "null"], format: uuid }
        superseded_by_correction: { type: [string, "null"], format: uuid }

    FindingCreate:
      type: object
      additionalProperties: false
      required: [finding_type]
      properties:
        finding_type: { $ref: "#/components/schemas/FindingType" }
        severity:
          oneOf:
            - { $ref: "#/components/schemas/NcSeverity" }
            - { type: "null" }
          description: Required for NC (the auto-CAPA needs one); optional for OBSERVATION/OFI.
        clause_ref: { type: [string, "null"], maxLength: 100 }
        process_ref: { type: [string, "null"], maxLength: 300 }
        summary: { type: [string, "null"], minLength: 1, maxLength: 300 }

    FindingCorrection:
      type: object
      additionalProperties: false
      required: [finding_type]
      properties:
        finding_type: { $ref: "#/components/schemas/FindingType" }
        severity:
          oneOf:
            - { $ref: "#/components/schemas/NcSeverity" }
            - { type: "null" }
        clause_ref: { type: [string, "null"], maxLength: 100 }
        process_ref: { type: [string, "null"], maxLength: 300 }
        reason: { type: [string, "null"], maxLength: 300 }

    RetentionPolicy:
      type: object
      additionalProperties: false
      required: [id, org_id, name, basis, duration, disposition_action, review_required, active]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string, example: "Quality records — 7 years" }
        applies_to:
          type: [object, "null"]
          description: >-
            The auto-attach map — exactly one of {record_type|clause_id|process_id}, or null for an
            explicitly-assigned policy with no auto-attach (the System Default + per-record overrides).
        basis: { $ref: "#/components/schemas/RetentionBasis" }
        duration: { type: string, description: "ISO-8601 date duration or PERMANENT", example: P7Y }
        disposition_action: { $ref: "#/components/schemas/DispositionAction" }
        review_required: { type: boolean }
        worm_lock_period: { type: [string, "null"], description: "ISO-8601 duration ≥ duration" }
        active: { type: boolean, description: "false once soft-archived (hidden from new-capture resolution)" }
        archived_at: { type: [string, "null"], format: date-time }
        archived_by: { type: [string, "null"], format: uuid }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    RetentionPolicyCreate:
      type: object
      additionalProperties: false
      required: [name, duration, disposition_action]
      properties:
        name: { type: string }
        applies_to: { type: [object, "null"] }
        basis: { $ref: "#/components/schemas/RetentionBasis" }
        duration: { type: string, example: P7Y }
        disposition_action: { $ref: "#/components/schemas/DispositionAction" }
        review_required: { type: boolean, default: false }
        worm_lock_period: { type: [string, "null"] }

    RetentionPolicyUpdate:
      type: object
      additionalProperties: false
      description: A partial update; only supplied fields change (extend-forward only while pinned).
      properties:
        name: { type: [string, "null"] }
        applies_to: { type: [object, "null"] }
        basis: { type: [string, "null"], enum: [captured_at, "event:employment_end", "event:product_eol", "event:contract_end", "event:capa_closed", null] }
        duration: { type: [string, "null"] }
        disposition_action: { type: [string, "null"], enum: [DESTROY, ARCHIVE_COLD, TRANSFER, RETAIN_PERMANENT, null] }
        review_required: { type: [boolean, "null"] }
        worm_lock_period: { type: [string, "null"] }

    Record:
      type: object
      additionalProperties: false
      required: [id, identifier, kind, record_type, title, classification, framework_id, captured_by, retention_policy_id, disposition_state, legal_hold]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: string, example: REC-QA-014 }
        kind: { type: string, enum: [DOCUMENT, RECORD] }
        record_type: { $ref: "#/components/schemas/RecordType" }
        title: { type: string }
        classification: { type: string, enum: [Public, Internal, Confidential, Restricted] }
        framework_id: { type: string, format: uuid }
        captured_at: { type: [string, "null"], format: date-time }
        captured_by: { type: string, format: uuid }
        content_hash:
          type: [string, "null"]
          description: The "sha256:"-prefixed seal over the structured content + the evidence-digest manifest.
        source_document_id:
          type: [string, "null"]
          format: uuid
          description: The controlled document this record was produced under, or null for ad-hoc EVIDENCE.
        source_version_id:
          type: [string, "null"]
          format: uuid
          description: The exact pinned version (R21) — required when source_document_id is set, else null.
        form_field_values: { type: [object, "null"], additionalProperties: true }
        retention_policy_id:
          type: string
          format: uuid
          description: The retention policy snapshotted at capture (one-way ratchet, doc 06 §5.2).
        retention_basis_date:
          type: [string, "null"]
          format: date
          description: When the retention clock starts; null for an event:* basis (no event date at capture).
        disposition_state: { type: string, enum: [ACTIVE, DUE_FOR_REVIEW, ON_HOLD, DISPOSED] }
        legal_hold: { type: boolean }
        has_structured_pdf:
          type: boolean
          description: >-
            Whether the best-effort structured-record PDF rendition has been built (S-rec-3);
            fetch it via GET /records/{id}/rendition.
        correction_of:
          type: [string, "null"]
          format: uuid
          description: The record this one corrects (when this record is itself a correction), or null.
        superseded_by_correction:
          type: [string, "null"]
          format: uuid
          description: The successor that corrected this record (this record stays retrievable), or null.
        created_at: { type: [string, "null"], format: date-time }
        evidence_blobs:
          type: array
          items: { $ref: "#/components/schemas/EvidenceBlob" }
          description: The attached evidence (omitted on the list serializer, present on single reads).
        evidence_links:
          type: array
          items: { $ref: "#/components/schemas/EvidenceLink" }
          description: The evidence-for links (omitted on the list serializer, present on single reads).

    RecordCreate:
      type: object
      additionalProperties: false
      required: [record_type, title]
      properties:
        record_type: { $ref: "#/components/schemas/RecordType" }
        title: { type: string }
        classification: { type: string, enum: [Public, Internal, Confidential, Restricted], default: Internal }
        area_code:
          type: [string, "null"]
          description: The AREA segment of the REC-AREA-SEQ identifier (default GEN).
        source_document_id: { type: [string, "null"], format: uuid }
        source_version_id:
          type: [string, "null"]
          format: uuid
          description: Required when source_document_id is set (R21); must be null otherwise.
        evidence:
          type: array
          items: { $ref: "#/components/schemas/EvidenceRef" }
          description: Evidence blobs to seal into the WORM records bucket (upload via :init-upload first).
        form_field_values: { type: [object, "null"], additionalProperties: true }
        retention_policy_id:
          type: [string, "null"]
          format: uuid
          description: A per-record retention override (doc 06 §5.1 tier 1); else the policy is resolved.

    DispositionEvent:
      type: object
      additionalProperties: false
      required: [id, action, tombstone, is_worm_destroy]
      properties:
        id: { type: string, format: uuid }
        action: { type: string, enum: [DESTROY, ARCHIVE_COLD, TRANSFER, RETAIN_PERMANENT] }
        tombstone: { type: boolean }
        policy_id:
          type: [string, "null"]
          format: uuid
          description: The policy that drove the disposition; null for a non-policy legal-order destroy.
        approved_by:
          type: [string, "null"]
          format: uuid
          description: The executing/second authorizer; null for a system (Beat-sweep) auto-disposition.
        requested_by:
          type: [string, "null"]
          format: uuid
          description: The R27 first authorizer (the destroy requester); null otherwise.
        is_worm_destroy: { type: boolean, description: true for the R27 dual-control pre-expiry destroy. }
        legal_basis: { type: [string, "null"] }
        executed_at: { type: [string, "null"], format: date-time }

    WormDestroyRequest:
      type: object
      additionalProperties: false
      required: [id, record_id, status, legal_basis, requested_by]
      properties:
        id: { type: string, format: uuid }
        record_id: { type: string, format: uuid }
        status: { type: string, enum: [open, executed, cancelled] }
        legal_basis: { type: string }
        requested_by: { type: string, format: uuid }
        requested_at: { type: [string, "null"], format: date-time }
        approved_by: { type: [string, "null"], format: uuid }
        executed_at: { type: [string, "null"], format: date-time }
        cancelled_by: { type: [string, "null"], format: uuid }
        cancelled_at: { type: [string, "null"], format: date-time }

    DispositionStatus:
      type: object
      additionalProperties: false
      required: [record_id, disposition_state, legal_hold, retention_policy_id]
      properties:
        record_id: { type: string, format: uuid }
        disposition_state: { type: string, enum: [ACTIVE, DUE_FOR_REVIEW, ON_HOLD, DISPOSED] }
        legal_hold: { type: boolean }
        retention_policy_id: { type: string, format: uuid }
        retention_basis_date: { type: [string, "null"], format: date }
        retention_until:
          type: [string, "null"]
          format: date
          description: basis_date + the policy duration; null for a PERMANENT/RETAIN_PERMANENT or unknown-basis record.
        open_worm_destroy_request:
          oneOf:
            - { $ref: "#/components/schemas/WormDestroyRequest" }
            - { type: "null" }
        disposition_events:
          type: array
          items: { $ref: "#/components/schemas/DispositionEvent" }

    DispositionAdvance:
      type: object
      additionalProperties: false
      required: [to_state]
      properties:
        to_state:
          type: string
          enum: [DUE_FOR_REVIEW, ACTIVE, DISPOSED]
          description: The target state (ON_HOLD is driven by /legal-hold, not here).
        reason: { type: [string, "null"] }

    LegalHoldAction:
      type: object
      additionalProperties: false
      required: [action, reason]
      properties:
        action: { type: string, enum: [place, release] }
        reason: { type: string, minLength: 1, maxLength: 1000, description: Mandatory (audit trail). }

    WormDestroyRequestCreate:
      type: object
      additionalProperties: false
      required: [legal_basis]
      properties:
        legal_basis: { type: string, minLength: 1, maxLength: 1000 }

    DispositionReason:
      type: object
      additionalProperties: false
      properties:
        reason: { type: [string, "null"], maxLength: 1000 }

    EvidencePackCreate:
      type: object
      additionalProperties: false
      required: [title, scope_kind]
      properties:
        title: { type: string }
        scope_kind: { type: string, enum: [CLAUSE, PROCESS, FINDING, CAPA] }
        clause_ids:
          type: array
          items: { type: string, format: uuid }
          description: Required (non-empty) when scope_kind=CLAUSE.
        process_ids:
          type: array
          items: { type: string, format: uuid }
          description: Required (non-empty) when scope_kind=PROCESS.
        finding_ids:
          type: array
          items: { type: string, format: uuid }
          description: >-
            Required (non-empty) when scope_kind=FINDING. Resolves the records linked as evidence to
            the finding(s) and bundles a sealed dossier (the finding's fields + correction chain +
            linked CAPA).
        capa_ids:
          type: array
          items: { type: string, format: uuid }
          description: >-
            Required (non-empty) when scope_kind=CAPA. Resolves the records linked as evidence to the
            CAPA's stages and bundles a sealed dossier (the full stage trail + e-signatures) so an
            auditor can prove the NC was closed effectively.
        period_start: { type: [string, "null"], format: date, description: Optional date overlay (by record captured_at). }
        period_end: { type: [string, "null"], format: date }

    PackItem:
      type: object
      additionalProperties: false
      required: [id, item_type, inclusion_status]
      properties:
        id: { type: string, format: uuid }
        item_type: { type: string, enum: [RECORD, DOCUMENT_VERSION] }
        record_id: { type: [string, "null"], format: uuid }
        version_id: { type: [string, "null"], format: uuid, description: A pinned governing version (record.source_version_id). }
        inclusion_status:
          type: string
          enum: [INCLUDED, EXCLUDED_PERMISSION, EXCLUDED_ABSENCE]
          description: R28 — every in-scope candidate gets a row; a silently-dropped item is a defect.
        exclusion_reason: { type: [string, "null"] }
        content_hash_at_seal: { type: [string, "null"] }

    ImportRunStatus:
      type: string
      description: >-
        The import-run state machine. The pipeline auto-chains Created → Scanning → Scanned →
        Extracting → Classifying → Classified → Deduping → Proposing → Proposed (the resting
        checkpoint awaiting review) (+ Failed/Cancelled); later slices add the commit/complete stages
        additively. S-ing-3: Classified is no longer terminal (it chains to dedup); Proposed is.
      enum:
        [Created, Scanning, Scanned, Extracting, Classifying, Classified, Deduping, Proposing,
         Proposed, Failed, Cancelled]
    ImportKind:
      type: string
      description: >-
        The classifier's kind dimension (doc 09 §6.1). UNKNOWN is a staging-only value the vault
        DocumentKind lacks — kind is ALWAYS human-confirmed (R10); the scorer may decline.
      enum: [DOCUMENT, RECORD, UNKNOWN]
    ImportConfidenceBand:
      type: string
      description: "The row-level review band (doc 09 §6.4): High ≥85 / Medium 60-84 / Low <60, or AMBIGUOUS on a near-tie."
      enum: [HIGH, MEDIUM, LOW, AMBIGUOUS]
    ImportRunCreate:
      type: object
      additionalProperties: false
      required: [source_root]
      properties:
        source_root: { type: string, minLength: 1, maxLength: 4096, description: "Path within the configured import mount root (NG3-confined)." }
        profile: { type: [string, "null"], maxLength: 128 }
        ocr_enabled: { type: boolean, default: false, description: "Enable Tesseract OCR for scanned/image-only PDFs + images (S-ing-2, §5.2)." }
        classifier_version: { type: [string, "null"], maxLength: 128, description: "Reserved; the run records the classifier version that scored it." }
    ImportDecisionAfter:
      type: object
      additionalProperties: false
      description: "The confirmed/changed dimensions of a per-file decision; the R10 kind-confirm rides `kind`."
      properties:
        kind: { type: string, enum: [DOCUMENT, RECORD], description: "The R10 human kind confirmation (never UNKNOWN)." }
        type_code: { type: string }
        clause_numbers: { type: array, items: { type: string } }
        process_names: { type: array, items: { type: string } }
        identifier: { type: string }
        owner: { type: string }
    ImportFileDecisionRequest:
      type: object
      additionalProperties: false
      required: [action]
      properties:
        action: { type: string, enum: [accept, correct, exclude, defer], description: "Dimensional actions only; merge/split are structural (dedicated endpoints)." }
        after: { $ref: "#/components/schemas/ImportDecisionAfter" }
        reason: { type: [string, "null"], maxLength: 2000 }
    ImportBulkSelector:
      type: object
      additionalProperties: false
      description: "A bulk selection over the existing classification/scan dimensions (not a derived review_status)."
      properties:
        kind: { type: [string, "null"] }
        band: { type: [string, "null"] }
        disposition: { type: [string, "null"] }
    ImportBulkDecisionRequest:
      type: object
      additionalProperties: false
      required: [action]
      properties:
        action: { type: string, enum: [accept, correct, exclude, defer] }
        file_ids: { type: [array, "null"], items: { type: string, format: uuid } }
        selector: { $ref: "#/components/schemas/ImportBulkSelector" }
        after: { $ref: "#/components/schemas/ImportDecisionAfter" }
        reason: { type: [string, "null"], maxLength: 2000 }
    ImportMergeRequest:
      type: object
      additionalProperties: false
      required: [file_ids]
      properties:
        file_ids: { type: array, minItems: 2, items: { type: string, format: uuid } }
        effective_file_id: { type: [string, "null"], format: uuid, description: "The §7.2 human override of the effective member; else the deterministic pick." }
        reconstruct_revision_chain: { type: [boolean, "null"], description: "The per-family R10 opt-in; set when present, else preserved/false." }
        reason: { type: [string, "null"], maxLength: 2000 }
    ImportSplitRequest:
      type: object
      additionalProperties: false
      required: [target_kind, target_id, separate_file_ids]
      properties:
        target_kind: { type: string, enum: [dupe_cluster, version_family] }
        target_id: { type: string, format: uuid }
        separate_file_ids: { type: array, minItems: 1, items: { type: string, format: uuid } }
        reason: { type: [string, "null"], maxLength: 2000 }
    ImportRun:
      type: object
      additionalProperties: false
      required: [id, status, source_root, ocr_enabled, created_by]
      properties:
        id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/ImportRunStatus" }
        source_root: { type: string }
        profile: { type: [string, "null"] }
        ocr_enabled: { type: boolean }
        classifier_version: { type: [string, "null"] }
        counts: { type: [object, "null"], additionalProperties: true, description: "The §4.3 inventory summary + per-stage count blocks (S-ing-5 adds counts.commit = {committed, failed})." }
        error: { type: [string, "null"] }
        created_by: { type: string, format: uuid }
        committed_by: { type: [string, "null"], format: uuid, description: "Who clicked Commit (S-ing-5); null until then." }
        report_record_id: { type: [string, "null"], format: uuid, description: "The §12.1 Import Report record (S-ing-5); null until commit completes." }
        created_at: { type: [string, "null"], format: date-time }
        scan_started_at: { type: [string, "null"], format: date-time }
        completed_at: { type: [string, "null"], format: date-time }
    ImportFile:
      type: object
      additionalProperties: false
      required: [id, rel_path, filename, size_bytes, scan_flags, included_candidate]
      properties:
        id: { type: string, format: uuid }
        rel_path: { type: string, description: "Path relative to source_root (no host secrets)." }
        filename: { type: string }
        ext: { type: [string, "null"] }
        size_bytes: { type: integer }
        mime_type: { type: [string, "null"] }
        sha256: { type: [string, "null"], description: "Content address; null for quarantined/excluded files (never hashed)." }
        staged_blob_uri: { type: [string, "null"], description: "s3://import-staging/{sha256}; null when not staged." }
        scan_flags: { type: object, additionalProperties: true, description: "{disposition: included|excluded|quarantine, reason, detail}." }
        included_candidate: { type: boolean }
        mtime: { type: [string, "null"], format: date-time }
        ctime: { type: [string, "null"], format: date-time }
        classification:
          description: "The Stage-3 scored proposal (S-ing-2); null until the run is classified."
          oneOf:
            - { type: "null" }
            - { $ref: "#/components/schemas/ImportClassification" }
        review:
          type: [object, "null"]
          additionalProperties: true
          description: "The S-ing-4 folded effective state (disposition/kind/identifier/.../commit_ready)."
    ImportClassification:
      type: object
      additionalProperties: true
      description: >-
        A scored, four-dimension proposal (doc 09 §6). A SUGGESTION only — nothing is confirmed or
        committed here. kind is human-confirmed at review (R10); type/clause/process resolve to vault
        ids at commit. `evidence` is present only on the per-file detail endpoint.
      required: [kind, kind_conf, type_conf, clause_numbers, clause_conf, process_conf, band, ambiguous, top2_margin, classifier_version]
      properties:
        kind: { $ref: "#/components/schemas/ImportKind" }
        kind_conf: { type: integer, minimum: 0, maximum: 100 }
        type_code: { type: [string, "null"], description: "A document_type code (POL/SOP/WI/FRM) or a record_type, per kind." }
        type_conf: { type: integer, minimum: 0, maximum: 100 }
        clause_numbers: { type: array, items: { type: string }, description: "Catalog clause CODES (e.g. 8.4), not UUIDs." }
        clause_conf: { type: integer, minimum: 0, maximum: 100 }
        process_names: { type: [array, "null"], items: { type: string } }
        process_conf: { type: integer, minimum: 0, maximum: 100 }
        pdca_phase: { type: [string, "null"], enum: [PLAN, DO, CHECK, ACT, null], description: "Derived from the matched requirement-node clauses (never guessed)." }
        band: { $ref: "#/components/schemas/ImportConfidenceBand" }
        ambiguous: { type: boolean, description: "A scored dimension has a <10 top-two margin." }
        top2_margin: { type: integer }
        classifier_version: { type: string }
        evidence: { type: array, items: { type: object, additionalProperties: true }, description: "[{dimension, candidate, signal_type, weight, explanation}] — detail endpoint only." }
    ImportExtract:
      type: object
      additionalProperties: true
      description: "The Stage-2 extraction detail (doc 09 §5)."
      required: [status]
      properties:
        status: { type: string, enum: [extracted, ocr, empty, failed] }
        full_text: { type: [string, "null"] }
        text_truncated: { type: boolean }
        header_block: { type: [string, "null"] }
        embedded_props: { type: [object, "null"], additionalProperties: true }
        language: { type: [string, "null"] }
        structure_hints: { type: [object, "null"], additionalProperties: true }
        ocr_used: { type: boolean }
        ocr_confidence: { type: [number, "null"] }
        char_count: { type: [integer, "null"] }
        page_count: { type: [integer, "null"] }
        error: { type: [string, "null"] }
        extractor_version: { type: [string, "null"] }
    ImportFileDetail:
      allOf:
        - { $ref: "#/components/schemas/ImportFile" }
        - type: object
          properties:
            run_id: { type: string, format: uuid }
            extract:
              oneOf:
                - { type: "null" }
                - { $ref: "#/components/schemas/ImportExtract" }
            dedup: { $ref: "#/components/schemas/ImportDedupMembership" }
            proposal:
              description: "The Stage-5 per-keep-item proposal (S-ing-3); null for a non-keep file."
              oneOf:
                - { type: "null" }
                - { $ref: "#/components/schemas/ImportProposalNode" }
    ImportFileList:
      type: object
      additionalProperties: false
      required: [run_id, files]
      properties:
        run_id: { type: string, format: uuid }
        files: { type: array, items: { $ref: "#/components/schemas/ImportFile" } }
    ImportDedupMembership:
      type: object
      additionalProperties: false
      description: "A file's derived Stage-4 dedup/family role (S-ing-3, doc 09 §7)."
      properties:
        in_exact_cluster: { type: boolean }
        in_near_cluster: { type: boolean }
        is_canonical: { type: [boolean, "null"], description: "The keep-pick of its cluster(s); null if in none." }
        redundant_of_file_id: { type: [string, "null"], format: uuid, description: "The canonical it is a redundant copy of." }
        in_version_family: { type: boolean }
        is_effective: { type: [boolean, "null"], description: "The candidate Effective member of its family; null if in none." }
        superseded_by_file_id: { type: [string, "null"], format: uuid, description: "The effective member it is superseded by." }
    ImportDupeCluster:
      type: object
      additionalProperties: false
      description: "A Stage-4 duplicate cluster (S-ing-3, doc 09 §7.1)."
      required: [id, method, member_file_ids, canonical_file_id]
      properties:
        id: { type: string, format: uuid }
        method: { type: string, enum: [exact, near], description: "exact = byte-identical SHA-256; near = MinHash/Jaccard >= 0.85." }
        member_file_ids: { type: array, items: { type: string, format: uuid }, description: "All files in the cluster (>=2), canonical first." }
        canonical_file_id: { type: string, format: uuid, description: "The §7.2 deterministic keep-pick." }
        jaccard: { type: [number, "null"], description: "1.0 for exact; the min pairwise exact-Jaccard for near." }
        evidence: { type: object, additionalProperties: true, description: "Review caveats, e.g. {truncated_comparison: true}." }
    ImportDupeClusterList:
      type: object
      additionalProperties: false
      required: [run_id, clusters]
      properties:
        run_id: { type: string, format: uuid }
        clusters: { type: array, items: { $ref: "#/components/schemas/ImportDupeCluster" } }
    ImportVersionFamily:
      type: object
      additionalProperties: false
      description: "A Stage-4 reconstructed version family (S-ing-3, doc 09 §7.3)."
      required: [id, family_key, base_name, ordered_member_file_ids, effective_file_id, reconstruct_revision_chain]
      properties:
        id: { type: string, format: uuid }
        family_key: { type: string, description: "The doc-code if present, else the normalized base-name." }
        base_name: { type: string }
        doc_code: { type: [string, "null"] }
        ordered_member_file_ids: { type: array, items: { type: string, format: uuid }, description: "Members in §7.2 canonical (newest-first) order." }
        effective_file_id: { type: string, format: uuid, description: "The candidate Effective baseline (the family head)." }
        reconstruct_revision_chain: { type: boolean, description: "R10 opt-in (default false = current-only-as-provenance); set at review." }
        evidence: { type: object, additionalProperties: true, description: "Per-tie-break rationale + obsolete_candidate pre-flags." }
    ImportVersionFamilyList:
      type: object
      additionalProperties: false
      required: [run_id, families]
      properties:
        run_id: { type: string, format: uuid }
        families: { type: array, items: { $ref: "#/components/schemas/ImportVersionFamily" } }
    ImportProposalNode:
      type: object
      additionalProperties: false
      description: "The Stage-5 per-keep-item proposal (S-ing-3, doc 09 §8). A suggestion only — never an allocated identifier."
      properties:
        proposed_identifier: { type: [string, "null"], description: "A preserved doc-code verbatim, or a {type}-<new> sentinel, or null." }
        identifier_source: { type: [string, "null"], enum: [preserved_doc_code, suggested_default, null] }
        target_ia_path: { type: [string, "null"], description: "The proposed mirror home ('Records' | '{PHASE}/{NN}-{Word}' | '_unmapped')." }
        proposed_owner: { type: [string, "null"], description: "A best-effort owner hint string (resolved to an app_user at review/commit)." }
        owner_source: { type: [string, "null"], enum: [embedded_author, null] }
        conflict_flags: { type: object, additionalProperties: true, description: "{duplicate_identifier_within_import: [...], collides_with_vault_doc: <uuid>, needs_identifier: true}." }
    EvidencePack:
      type: object
      additionalProperties: false
      required: [id, title, scope_kind, status, item_count]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        scope_kind: { type: string, enum: [CLAUSE, PROCESS, FINDING, CAPA] }
        scope_selector: { type: object, additionalProperties: true }
        period_start: { type: [string, "null"], format: date }
        period_end: { type: [string, "null"], format: date }
        status: { type: string, enum: [DRAFT, BUILDING, SEALED, FAILED], description: The build poll state. }
        item_count: { type: integer, description: Included records + their distinct pinned versions. }
        gap_summary:
          type: [object, "null"]
          additionalProperties: true
          description: In-scope ★ clauses lacking current evidence (distinct from the exclusion report).
        exclusion_summary:
          type: [object, "null"]
          additionalProperties: true
          description: R28 permission-vs-absence exclusions (permission/absence id lists + counts).
        content_hash: { type: [string, "null"], description: The domain-separated manifest seal (set at seal). }
        zip_blob_sha256: { type: [string, "null"], description: The sealed ZIP file digest. }
        pack_record_id: { type: [string, "null"], format: uuid, description: The pack's own RETAIN_PERMANENT EVIDENCE Record. }
        error: { type: [string, "null"] }
        created_at: { type: [string, "null"], format: date-time }
        generated_at: { type: [string, "null"], format: date-time }

    EvidencePackDetail:
      allOf:
        - { $ref: "#/components/schemas/EvidencePack" }
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/PackItem" }

    EvidencePackDownload:
      type: object
      additionalProperties: false
      required: [download_url, sha256, content_type]
      properties:
        download_url: { type: string, format: uri }
        sha256: { type: string }
        content_type: { type: string, enum: ["application/zip"] }

    ShareLinkCreate:
      type: object
      additionalProperties: false
      description: >-
        The time-box: an explicit expires_at wins; else ttl_days (server default when unset). The
        server clamps to [1, max] days. recipient is an optional audit label.
      properties:
        ttl_days: { type: integer, minimum: 1 }
        expires_at: { type: string, format: date-time }
        recipient: { type: string }

    ShareLinkRevoke:
      type: object
      additionalProperties: false
      properties:
        reason: { type: string }

    ShareLink:
      type: object
      description: A management view of a share link — never the raw token (only its digest prefix).
      properties:
        id: { type: string, format: uuid }
        pack_id: { type: string, format: uuid }
        recipient: { type: [string, "null"] }
        state: { type: string, enum: [ACTIVE, EXPIRED, REVOKED] }
        token_digest: { type: string, description: "The first 16 hex chars of the token's SHA-256." }
        expires_at: { type: string, format: date-time }
        created_at: { type: [string, "null"], format: date-time }
        revoked_at: { type: [string, "null"], format: date-time }
        revoke_reason: { type: [string, "null"] }
        download_count: { type: integer }
        last_downloaded_at: { type: [string, "null"], format: date-time }

    ShareLinkCreated:
      allOf:
        - $ref: "#/components/schemas/ShareLink"
        - type: object
          description: The creation response — the raw token + URL are shown ONCE (only the digest is stored).
          properties:
            token: { type: string, description: "The signed bearer token (shown once)." }
            share_url: { type: string, format: uri }

security:
  - keycloak: []
