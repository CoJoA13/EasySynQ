openapi: 3.1.0
info:
  title: EasySynQ API
  version: 0.1.0
  description: >-
    The external HTTP contract for the EasySynQ self-hosted ISO 9001:2015 QMS.
    OpenAPI-first source of truth (doc 15): the FastAPI server models and the TS
    client are generated from THIS document; the running server is proven to
    conform via schemathesis. Lifecycle transitions are named action sub-resources,
    never `PATCH status=`. Immutability shows up as the absence of write verbs.

    Slice S0 (walking skeleton) covers only the health surface + the shared
    RFC 9457 problem model and standard parameters. Later slices add the auth,
    document, version, lock, task, audit, and search routers.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/v1
    description: Versioned QMS surface (behind Caddy; same origin as the SPA).

tags:
  - name: health
    description: Liveness and readiness. Public, unversioned-friendly probes.
  - name: auth
    description: Authentication & session. Keycloak OIDC + PKCE; the API is a resource server.
  - name: setup
    description: >-
      First-run setup wizard (slice S8a). Latch-exempt; the QMS surface is 423 setup_incomplete
      until setup finalizes to OPERATIONAL. The bootstrap secret grants the first System
      Administrator (outside the PEP); org-profile + finalize need config.update.
  - name: authz
    description: >-
      Authorization admin — the permission catalog, roles, and per-user role/override
      grants. Deny-by-default, deny-wins; reads need role.read/user.read, grants need
      permission.grant (two-tier guard).
  - name: documents
    description: >-
      The controlled vault — documents, the check-out → presigned CAS upload → immutable
      check-in cycle, break-lock, and version reads. Content I/O is presigned (never proxied);
      check-in is content-addressed (identical bytes create no new version) and requires a
      change reason + significance (INV-3).
  - name: audit
    description: >-
      The append-only, hash-chained audit trail (read-only). No POST/PATCH/DELETE ever —
      append-only + hash-chained is a system invariant, not an API capability (the app DB role
      lacks UPDATE/DELETE on audit_event). Gated by system.audit_log.read. verify-chain recomputes
      the chain on demand; /audit/status surfaces the tamper-evidence soft-gate (R13).

paths:
  /healthz:
    get:
      tags: [health]
      operationId: getHealthz
      summary: Liveness probe
      description: Process is up. Does not check dependencies. Always cheap.
      security: []
      responses:
        "200":
          description: The service process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
              example: { status: ok, service: api, version: "0.1.0" }

  /readyz:
    get:
      tags: [health]
      operationId: getReadyz
      summary: Readiness probe
      description: >-
        Reports reachability of every backing dependency (PostgreSQL, MinIO,
        Redis, Keycloak) plus the Alembic migration head. OpenSearch is NOT
        checked in the MVP (omitted per Decisions Register R34). Returns 200 when
        all required dependencies are ready, 503 otherwise.
      security: []
      responses:
        "200":
          description: All required dependencies are ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Readiness" }
        "503":
          description: One or more required dependencies are not ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Readiness" }

  /auth/config:
    get:
      tags: [auth]
      operationId: getAuthConfig
      summary: Public OIDC config the SPA needs to start Authorization-Code + PKCE.
      security: []
      responses:
        "200":
          description: Realm / client / audience.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthConfig" }

  /setup/state:
    get:
      tags: [setup]
      operationId: getSetupState
      summary: The first-run setup latch state (public, so the SPA can route before sign-in).
      security: []
      responses:
        "200":
          description: The current setup_state.
          content:
            application/json:
              schema:
                type: object
                required: [setup_state]
                properties:
                  setup_state: { type: string, enum: [UNINITIALIZED, IN_SETUP, OPERATIONAL] }

  /setup:
    get:
      tags: [setup]
      operationId: getSetup
      summary: The wizard view — state + live gate status + current org profile. Authenticated.
      responses:
        "200":
          description: Setup state, gate status, and org profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupDetail" }

  /setup/bootstrap:
    post:
      tags: [setup]
      operationId: bootstrapSetup
      summary: >-
        Consume the one-time install secret and grant the caller System Administrator
        (the bootstrap-of-trust). Authenticated, but outside the PEP — the secret authorizes it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [secret]
              properties:
                secret: { type: string }
      responses:
        "200":
          description: The caller is now System Administrator; setup_state advanced to IN_SETUP.
          content:
            application/json:
              schema:
                type: object
                required: [setup_state, admin_user_id]
                properties:
                  setup_state: { type: string }
                  admin_user_id: { type: string, format: uuid }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "429": { $ref: "#/components/responses/ProblemResponse" }

  /setup/org-profile:
    patch:
      tags: [setup]
      operationId: setSetupOrgProfile
      summary: Set the organization profile (Step 2 / gate G-E). Needs config.update.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrgProfileUpdate" }
      responses:
        "200":
          description: The updated org profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrgProfileUpdate" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /setup/finalize:
    post:
      tags: [setup]
      operationId: finalizeSetup
      summary: >-
        Re-check the gates live and flip the setup latch to OPERATIONAL (Step 10). Needs
        config.update. 409 setup_gates_unsatisfied lists the failed gates.
      responses:
        "200":
          description: Setup finalized; the latch is now OPERATIONAL.
          content:
            application/json:
              schema:
                type: object
                required: [setup_state]
                properties:
                  setup_state: { type: string }
                  finalized_at: { type: string, format: date-time }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /verify:
    get:
      tags: [verify]
      operationId: verifyControlledCopy
      summary: Public controlled-copy currency check (no auth). Scan a printout's QR / signed token.
      description: >-
        Returns an HTML page with the copy's currency: CURRENT (this revision still governs),
        SUPERSEDED (a newer revision is now Effective, or the version is obsolete), or UNKNOWN
        (bad/forged/tampered token, or no such version). The token is Ed25519-signed, so this only
        confirms what a valid token encodes — no enumeration. Minimal disclosure (status + identifier
        + current revision/date; no content). doc 05 §6.4.
      security: []
      parameters:
        - name: t
          in: query
          required: true
          schema: { type: string }
          description: The signed verify token from the controlled copy's QR/footer.
      responses:
        "200":
          description: An HTML verify page (CURRENT / SUPERSEDED / UNKNOWN).
          content:
            text/html:
              schema: { type: string }

  /me:
    get:
      tags: [auth]
      operationId: getMe
      summary: The authenticated user, JIT-provisioned from the Keycloak subject.
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppUser" }
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /auth/step-up:
    post:
      tags: [auth]
      operationId: postAuthStepUp
      summary: Reserved Part-11 re-auth seam (declared; not enforced in v1).
      responses:
        "200":
          description: Step-up acknowledgement.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /permissions:
    get:
      tags: [authz]
      operationId: listPermissions
      summary: Read the closed v1 permission catalog (reference data).
      responses:
        "200":
          description: The full permission catalog.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Permission" }
        "403": { $ref: "#/components/responses/ProblemResponse" }

  /roles:
    get:
      tags: [authz]
      operationId: listRoles
      summary: List the org's roles (seeded starter roles plus any org-defined).
      responses:
        "200":
          description: Roles.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Role" }
        "403": { $ref: "#/components/responses/ProblemResponse" }

  /roles/{role_id}:
    get:
      tags: [authz]
      operationId: getRole
      summary: A role with its resolved permission grants.
      parameters:
        - name: role_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The role and its grants.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RoleDetail" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /users/{user_id}/roles:
    get:
      tags: [authz]
      operationId: listUserRoles
      summary: A user's role assignments.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Role assignments.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RoleAssignment" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [authz]
      operationId: assignUserRole
      summary: Assign a role to a user. Needs permission.grant; two-tier guard (R35).
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleAssignmentCreate" }
      responses:
        "201":
          description: The created role assignment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RoleAssignment" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: Validation or two_tier_violation (system-domain role at content tier).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /users/{user_id}/roles/{assignment_id}:
    delete:
      tags: [authz]
      operationId: revokeUserRole
      summary: Revoke a role assignment. Needs permission.grant.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: assignment_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Assignment revoked.
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /users/{user_id}/overrides:
    get:
      tags: [authz]
      operationId: listUserOverrides
      summary: A user's direct permission overrides.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Overrides.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PermissionOverride" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [authz]
      operationId: createUserOverride
      summary: Grant a direct ALLOW/DENY override. Needs permission.grant; two-tier guard.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PermissionOverrideCreate" }
      responses:
        "201":
          description: The created override.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PermissionOverride" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: Validation or two_tier_violation (system-domain key at content tier).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /users/{user_id}/overrides/{override_id}:
    delete:
      tags: [authz]
      operationId: deleteUserOverride
      summary: Remove a direct override. Needs permission.grant.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: override_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Override removed.
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /users/{user_id}/effective-permissions:
    get:
      tags: [authz]
      operationId: getEffectivePermissions
      summary: The user's resolved effective permissions (with provenance) at a scope.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: scope_level
          in: query
          required: false
          description: Scope to resolve at (default SYSTEM).
          schema:
            type: string
            enum: [SYSTEM, FRAMEWORK, PROCESS, FOLDER, DOC_CLASS, ARTIFACT]
        - name: scope_id
          in: query
          required: false
          description: The scope selector value (process id / folder path / artifact id / doc class).
          schema: { type: string }
      responses:
        "200":
          description: Effective permissions with provenance.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EffectivePermissions" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents:
    get:
      tags: [documents]
      operationId: listDocuments
      summary: List documents the caller may read (row-filtered by scope).
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        "200":
          description: Documents.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Document" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [documents]
      operationId: createDocument
      summary: Create a Draft document; allocates a {TYPE}-{AREA}-{SEQ} identifier. Needs document.create.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DocumentCreate" }
      responses:
        "201":
          description: The created document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: Validation error.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}:
    parameters:
      - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [documents]
      operationId: getDocument
      summary: A document's metadata. Needs document.read.
      responses:
        "200":
          description: The document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    patch:
      tags: [documents]
      operationId: updateDocumentMetadata
      summary: Edit metadata (title/folder/classification). Needs document.manage_metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MetadataUpdate" }
      responses:
        "200":
          description: The updated document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/checkout:
    post:
      tags: [documents]
      operationId: checkoutDocument
      summary: Acquire the exclusive 8h check-out lock. Needs document.checkout.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The check-out (working draft).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkingDraft" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Already checked out by another user (lock_conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/versions:init-upload:
    post:
      tags: [documents]
      operationId: initVersionUpload
      summary: Step 1 of upload — get a presigned PUT URL (or a dedup hit). Needs document.checkout.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InitUpload" }
      responses:
        "200":
          description: Presigned upload, or a dedup result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InitUploadResult" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/checkin:
    post:
      tags: [documents]
      operationId: checkinDocument
      summary: Freeze an immutable Draft version (or detect no change). Needs document.edit.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckIn" }
      responses:
        "201":
          description: The version (change_detected=false means dedup, no new version).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckInResult" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Caller does not hold the check-out (lock_conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: INV-3 — missing change_reason or change_significance.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/break-lock:
    post:
      tags: [documents]
      operationId: breakDocumentLock
      summary: Release the lock without check-in, preserving scratch (R9). Needs document.checkout.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Lock broken.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [document_id, lock_broken]
                properties:
                  document_id: { type: string, format: uuid }
                  lock_broken: { type: boolean }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/heartbeat:
    post:
      tags: [documents]
      operationId: heartbeatCheckout
      summary: Refresh the 8h check-out lock (R24) for a long edit. Needs document.checkout.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The refreshed lock TTL.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [document_id, lock_ttl_seconds]
                properties:
                  document_id: { type: string, format: uuid }
                  lock_ttl_seconds: { type: integer, example: 28800 }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Caller does not hold the check-out (lock_conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  # --- lifecycle (S4): named POST action sub-resources; never PATCH status= -----------------
  /documents/{document_id}/submit-review:
    post:
      tags: [documents]
      operationId: submitReview
      summary: "Draft→InReview (T2) / UnderRevision→InReview (T9). Needs document.submit."
      description: "The >=1 clause_mapping precondition (doc 15 §8.5) lands with the IA slice (S9); not enforced in S4."
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Illegal transition (invalid_state_transition; body includes allowed_transitions).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  # Approval/review is NOT a direct document action — it routes through POST /tasks/{id}/decision
  # (C7). There is intentionally no /documents/{id}/approve or /request-changes endpoint.

  /documents/{document_id}/release:
    post:
      tags: [documents]
      operationId: releaseDocument
      summary: "Approved→Effective (T6) — atomic single-Effective cutover (SERIALIZABLE + INV-1). Needs document.release."
      description: "Supersedes the prior Effective version in one transaction; future-dated versions stay Approved (the Beat sweep activates them). Only Released versions reach the FS mirror."
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Release" }
      responses:
        "200":
          description: The document (now Effective).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Illegal transition (invalid_state_transition), or a concurrent release won (conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: effective_from is in the future (validation_error) — the version stays Approved.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/start-revision:
    post:
      tags: [documents]
      operationId: startRevision
      summary: "Effective→UnderRevision (T7) — opens a working draft while the Effective version keeps governing. Needs document.edit."
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The document (now UnderRevision).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Illegal transition (invalid_state_transition), or already checked out (lock_conflict).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/obsolete:
    post:
      tags: [documents]
      operationId: obsoleteDocument
      summary: "Effective→Obsolete (T11), or archive a Superseded version (T12) via version_id. Needs document.obsolete."
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Obsolete" }
      responses:
        "200":
          description: The document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: Illegal transition (invalid_state_transition; body includes allowed_transitions).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Missing reason (validation_error).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/download:
    get:
      tags: [documents]
      operationId: downloadDocument
      summary: A presigned GET URL for the Effective version's controlled-copy PDF. Needs document.read.
      description: >-
        Presigns the Effective version's cached watermarked CONTROLLED COPY rendition
        (rendition=controlled_copy). If the rendition is still being generated or the source format is
        non-renderable (R26), presigns the source bytes instead (rendition=source). Never proxied.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: A short-lived presigned download URL for the controlled copy (or the source).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentDownload" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/export:
    get:
      tags: [documents]
      operationId: exportDocument
      summary: A fresh per-request UNCONTROLLED-when-printed export of the Effective version. Needs document.export.
      description: >-
        Streams a fresh, per-request PDF of the Effective version stamped "UNCONTROLLED WHEN PRINTED —
        valid as of {date}" + "Exported {ts} by {user}" (doc 04 §11.2), as an application/pdf
        attachment. Distinct from /download (the cached, deterministic CONTROLLED COPY presign): this
        rendition carries a timestamp + actor, is never cached, and is audited as an EXPORTED event.
        Returns 409 no_controlled_rendition when no controlled PDF exists yet (still rendering, or a
        non-renderable R26 format — fetch the source via /download instead).
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The stamped export PDF (download attachment).
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: No controlled PDF rendition is available yet (no_controlled_rendition).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/print:
    get:
      tags: [documents]
      operationId: printDocument
      summary: A fresh per-request CONTROLLED-COPY print rendition of the Effective version. Needs document.print_controlled.
      description: >-
        Streams a fresh, per-request PDF of the Effective version stamped "CONTROLLED COPY — valid on
        {date} only" + "Printed {ts} by {user}" (doc 04 §11.2), inline for the browser print dialog.
        Audited as a PRINTED event. Returns 409 no_controlled_rendition when no controlled PDF exists
        yet (still rendering, or a non-renderable R26 format).
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The stamped controlled-copy PDF (inline).
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: No controlled PDF rendition is available yet (no_controlled_rendition).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /documents/{document_id}/versions:
    get:
      tags: [documents]
      operationId: listVersions
      summary: A document's versions, newest first. Needs document.read_draft.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Versions.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DocumentVersion" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/versions/{version_id}:
    get:
      tags: [documents]
      operationId: getVersion
      summary: A single immutable version. Needs document.read_draft.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The version.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentVersion" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/versions/{version_id}/download:
    get:
      tags: [documents]
      operationId: downloadVersion
      summary: A presigned GET URL for a version's bytes (never proxied). Needs document.read_draft.
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: A short-lived presigned download URL.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionDownload" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /tasks:
    get:
      tags: [tasks]
      operationId: listTasks
      summary: "My Tasks — tasks assigned to the caller or where the caller is a candidate (self-scoped)."
      parameters:
        - { name: assignee, in: query, required: false, schema: { type: string, enum: [me] } }
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, CLAIMED, DONE, SKIPPED, ESCALATED, EXPIRED]
        - { name: type, in: query, required: false, schema: { type: string } }
        - { name: instance_id, in: query, required: false, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The caller's tasks.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Task" } }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /tasks/{task_id}:
    get:
      tags: [tasks]
      operationId: getTask
      summary: "A single task the caller may see (assignee or candidate); else 404 (sensitive collapse)."
      parameters:
        - { name: task_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The task.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /tasks/{task_id}/decision:
    post:
      tags: [tasks]
      operationId: decideTask
      summary: "The canonical approval/review trigger — writes signature_event + task_outcome + audit in one txn."
      description: >-
        Permission is derived from the subject + outcome: approve → document.approve (sig-hook,
        SoD-1/2 enforced → 403 sod_violation with conflicting_duty); changes_requested/reject →
        document.review. Idempotent via the Idempotency-Key header (replay on match, else 409).
      parameters:
        - { name: task_id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Decision" }
      responses:
        "200":
          description: The recorded decision (+ the signature_event for an approval).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DecisionResult" }
        "403":
          description: "permission_denied, or sod_violation (with conflicting_duty), or step_up_required."
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: "Task already decided (conflict), or an illegal lifecycle transition."
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /workflow-instances/{instance_id}:
    get:
      tags: [tasks]
      operationId: getWorkflowInstance
      summary: "An approval instance (expand=tasks for its tasks). Gated by document.read on the subject."
      parameters:
        - { name: instance_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: expand, in: query, required: false, schema: { type: string, enum: [tasks] } }
      responses:
        "200":
          description: The workflow instance.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkflowInstance" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /audit-events:
    get:
      tags: [audit]
      operationId: listAuditEvents
      summary: "Org-wide audit trail, newest first (keyset-paginated). Gated by system.audit_log.read."
      parameters:
        - { name: cursor, in: query, required: false, schema: { type: integer, format: int64 }, description: "Page rows with id < cursor (keyset, desc)." }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: actor_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: actor_type, in: query, required: false, schema: { type: string } }
        - { name: event_type, in: query, required: false, schema: { type: string } }
        - { name: object_type, in: query, required: false, schema: { type: string } }
        - { name: object_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: occurred_from, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: occurred_to, in: query, required: false, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: A page of audit events.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditEventPage" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /audit-events/verify-chain:
    get:
      tags: [audit]
      operationId: verifyAuditChain
      summary: "Recompute + verify the hash chain; reports the first broken link (AC#6b)."
      parameters:
        - { name: from, in: query, required: false, schema: { type: integer, format: int64 }, description: "Lower bound audit_event id." }
        - { name: to, in: query, required: false, schema: { type: integer, format: int64 }, description: "Upper bound audit_event id." }
      responses:
        "200":
          description: The verification result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyChainResult" }
        "403": { $ref: "#/components/responses/ProblemResponse" }

  /audit-events/export:
    get:
      tags: [audit]
      operationId: exportAuditEvents
      summary: "Async export (CSV/JSON) for evidence packs. DEFERRED in MVP (omit-with-schema, D-9)."
      parameters:
        - { name: format, in: query, required: false, schema: { type: string, enum: [csv, json], default: json } }
      responses:
        "202":
          description: Export job accepted; poll the job link.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditExportJob" }
        "403": { $ref: "#/components/responses/ProblemResponse" }

  /audit/status:
    get:
      tags: [audit]
      operationId: getAuditStatus
      summary: "The tamper-evidence soft-gate (R13) + chain lag the SPA reads."
      responses:
        "200":
          description: Audit subsystem status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditStatus" }
        "403": { $ref: "#/components/responses/ProblemResponse" }

  /audit-events/{event_id}:
    get:
      tags: [audit]
      operationId: getAuditEvent
      summary: "A single audit event incl. before/after, reason, auth_context, prev_hash/row_hash."
      parameters:
        - { name: event_id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: The audit event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditEvent" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /documents/{document_id}/audit-events:
    get:
      tags: [audit]
      operationId: listDocumentAuditEvents
      summary: "One document's full trail (doc + version events), newest first."
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
      responses:
        "200":
          description: A page of the document's audit events.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditEventPage" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

components:
  securitySchemes:
    keycloak:
      type: openIdConnect
      openIdConnectUrl: https://auth.example/realms/easysynq/.well-known/openid-configuration
      description: >-
        OIDC Authorization Code + PKCE via Keycloak. The API validates the access
        JWT against Keycloak's JWKS; permissions are resolved server-side per
        request, never taken from the token.

  responses:
    ProblemResponse:
      description: An error, as RFC 9457 application/problem+json.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, service, version]
      properties:
        status: { type: string, enum: [ok] }
        service: { type: string, example: api }
        version: { type: string, example: "0.1.0" }

    DependencyStatus:
      type: object
      additionalProperties: false
      required: [name, ready]
      properties:
        name:
          type: string
          enum: [postgres, minio, redis, keycloak, alembic]
        ready: { type: boolean }
        detail: { type: [string, "null"] }

    Readiness:
      type: object
      additionalProperties: false
      required: [ready, dependencies]
      properties:
        ready:
          type: boolean
          description: True iff every required dependency is ready.
        dependencies:
          type: array
          items: { $ref: "#/components/schemas/DependencyStatus" }

    Problem:
      type: object
      description: RFC 9457 application/problem+json. HTTP status is authoritative; `code` is the stable machine string.
      additionalProperties: true
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "https://errors.easysynq.local/validation_error" }
        title: { type: string }
        status: { type: integer }
        code:
          type: string
          description: Stable machine-readable error code clients branch on.
          enum:
            - validation_error
            - not_found
            - permission_denied
            - unauthenticated
            - token_expired
            - token_invalid
            - invalid_state_transition
            - conflict
            - lock_conflict
            - etag_mismatch
            - worm_required
            - two_tier_violation
            - sod_violation
            - step_up_required
            - setup_incomplete
            - setup_not_initialized
            - setup_already_complete
            - setup_gates_unsatisfied
            - no_bootstrap_secret
            - bootstrap_invalid
            - bootstrap_expired
            - bootstrap_already_consumed
            - rate_limited
            - idempotency_replay
            - internal_error
            - dependency_unavailable
        detail: { type: [string, "null"] }
        instance: { type: [string, "null"] }
        request_id: { type: [string, "null"] }
        errors:
          type: [array, "null"]
          items:
            type: object
            additionalProperties: false
            properties:
              field: { type: string }
              code: { type: string }
              message: { type: string }
        allowed_transitions:
          type: [array, "null"]
          items: { type: string }
          description: "On invalid_state_transition: the lifecycle actions legal from the current state."
        conflicting_duty:
          type: [object, "null"]
          description: "On sod_violation: the violated duty pair (duty_a/duty_b/target_binding)."

    AuthConfig:
      type: object
      additionalProperties: false
      required: [issuer, client_id, audience]
      properties:
        issuer: { type: string }
        client_id: { type: string }
        audience: { type: string }

    OrgProfileUpdate:
      type: object
      additionalProperties: false
      required: [legal_name, short_code, timezone]
      properties:
        legal_name: { type: string }
        short_code: { type: string, description: "[A-Z0-9-], 2-32 chars, not 'DEFAULT'" }
        timezone: { type: string, description: "IANA tz; authoritative for effective dates (R8)" }

    SetupDetail:
      type: object
      additionalProperties: false
      required: [setup_state, gates, org_profile]
      properties:
        setup_state: { type: string, enum: [UNINITIALIZED, IN_SETUP, OPERATIONAL] }
        gates:
          type: object
          additionalProperties: { type: boolean }
          description: Live gate status keyed by gate id (G-A, G-E, … as later slices add G-B/C/D).
        org_profile:
          type: object
          properties:
            legal_name: { type: [string, "null"] }
            short_code: { type: [string, "null"] }
            timezone: { type: [string, "null"] }

    AppUser:
      type: object
      additionalProperties: false
      required: [id, keycloak_subject, status, is_guest]
      properties:
        id: { type: string, format: uuid }
        keycloak_subject: { type: string }
        display_name: { type: [string, "null"] }
        email: { type: [string, "null"] }
        status:
          type: string
          enum: [INVITED, ACTIVE, LOCKED, DISABLED, RETIRED]
        is_guest: { type: boolean }

    ScopeLevel:
      type: string
      enum: [SYSTEM, FRAMEWORK, PROCESS, FOLDER, DOC_CLASS, ARTIFACT]

    Permission:
      type: object
      additionalProperties: false
      required: [key, resource, action, is_system_domain, sod_sensitive, sig_hook, finest_scope]
      properties:
        key: { type: string, example: document.approve }
        resource: { type: string, example: document }
        action: { type: string, example: approve }
        is_system_domain:
          type: boolean
          description: True for system-administration domains; drives the two-tier grant guard (R35).
        sod_sensitive: { type: boolean }
        sig_hook:
          type: boolean
          description: True for signature-hook actions (approve/release/obsolete/dispose/verify/close).
        finest_scope: { $ref: "#/components/schemas/ScopeLevel" }

    Role:
      type: object
      additionalProperties: false
      required: [id, name, is_reserved]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, "null"] }
        is_reserved: { type: boolean, description: Seeded ADMIN / QMS-Owner roles cannot be deleted. }

    RoleGrantEntry:
      type: object
      additionalProperties: false
      required: [permission_key]
      properties:
        permission_key: { type: string }
        scope_template:
          type: [object, "null"]
          additionalProperties: true
          description: Parameterized default scope, concretized by bound_scope at assignment.

    RoleDetail:
      type: object
      additionalProperties: false
      required: [id, name, is_reserved, grants]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, "null"] }
        is_reserved: { type: boolean }
        grants:
          type: array
          items: { $ref: "#/components/schemas/RoleGrantEntry" }

    RoleAssignment:
      type: object
      additionalProperties: false
      required: [id, role_id, role_name]
      properties:
        id: { type: string, format: uuid }
        role_id: { type: string, format: uuid }
        role_name: { type: string }
        bound_scope:
          type: [object, "null"]
          additionalProperties: true
          description: Concrete scope binding the role's scope_template for this user.

    RoleAssignmentCreate:
      type: object
      additionalProperties: false
      description: Provide exactly one of role_id or role_name.
      properties:
        role_id: { type: string, format: uuid }
        role_name: { type: string }
        bound_scope:
          type: [object, "null"]
          additionalProperties: true

    ScopeInput:
      type: object
      additionalProperties: false
      required: [level]
      properties:
        level: { $ref: "#/components/schemas/ScopeLevel" }
        selector:
          type: [object, "null"]
          additionalProperties: true
          description: e.g. { process_id } / { folder_path } / { document_level } / { artifact_id }.
        predicates:
          type: [object, "null"]
          additionalProperties: true
          description: Narrowing-only ABAC predicates (read_only, lifecycle_state, ip_allow, ...).

    ScopeRepr:
      type: object
      additionalProperties: false
      required: [level]
      properties:
        level: { $ref: "#/components/schemas/ScopeLevel" }
        selector: { type: [object, "null"], additionalProperties: true }
        predicates: { type: [object, "null"], additionalProperties: true }

    PermissionOverride:
      type: object
      additionalProperties: false
      required: [id, permission_key, effect, scope, require_reason]
      properties:
        id: { type: string, format: uuid }
        permission_key: { type: string }
        effect: { type: string, enum: [ALLOW, DENY] }
        scope: { $ref: "#/components/schemas/ScopeRepr" }
        valid_from: { type: [string, "null"], format: date-time }
        valid_until: { type: [string, "null"], format: date-time }
        require_reason: { type: boolean }

    PermissionOverrideCreate:
      type: object
      additionalProperties: false
      required: [permission_key, effect, scope]
      properties:
        permission_key: { type: string }
        effect: { type: string, enum: [ALLOW, DENY] }
        scope: { $ref: "#/components/schemas/ScopeInput" }
        valid_from: { type: [string, "null"], format: date-time }
        valid_until: { type: [string, "null"], format: date-time }
        require_reason: { type: boolean, default: false }
        reason: { type: [string, "null"] }

    EffectivePermissionEntry:
      type: object
      additionalProperties: false
      required: [key, effect]
      properties:
        key: { type: string }
        effect: { type: string, enum: [ALLOW, DENY] }
        source:
          type: [string, "null"]
          description: Provenance, e.g. "role:Author" or "user_override".

    EffectivePermissions:
      type: object
      additionalProperties: false
      required: [scope, permissions]
      properties:
        scope:
          type: object
          additionalProperties: true
          description: The scope the permissions were resolved at.
        permissions:
          type: array
          items: { $ref: "#/components/schemas/EffectivePermissionEntry" }

    Document:
      type: object
      additionalProperties: false
      required: [id, identifier, kind, title, current_state, classification, is_singleton, owner_user_id, framework_id]
      properties:
        id: { type: string, format: uuid }
        identifier: { type: string, example: SOP-PUR-014 }
        kind: { type: string, enum: [DOCUMENT, RECORD] }
        title: { type: string }
        document_type_id: { type: [string, "null"], format: uuid }
        area_code: { type: [string, "null"] }
        folder_path: { type: [string, "null"], description: Dotted scope path (e.g. SOPs.Purchasing). }
        current_state:
          type: string
          enum: [Draft, InReview, Approved, Effective, UnderRevision, Superseded, Obsolete]
        classification: { type: string, enum: [Public, Internal, Confidential, Restricted] }
        is_singleton: { type: boolean }
        owner_user_id: { type: string, format: uuid }
        framework_id: { type: string, format: uuid }
        current_effective_version_id:
          type: [string, "null"]
          format: uuid
          description: The single governing Effective version (set at the release cutover), or null.
        created_at: { type: [string, "null"], format: date-time }

    DocumentCreate:
      type: object
      additionalProperties: false
      required: [title, document_type_id]
      properties:
        title: { type: string }
        document_type_id: { type: string, format: uuid }
        area_code: { type: [string, "null"] }
        folder_path: { type: [string, "null"] }
        classification: { type: string, enum: [Public, Internal, Confidential, Restricted], default: Internal }

    MetadataUpdate:
      type: object
      additionalProperties: false
      properties:
        title: { type: [string, "null"] }
        folder_path: { type: [string, "null"] }
        classification: { type: [string, "null"], enum: [Public, Internal, Confidential, Restricted, null] }

    DocumentVersion:
      type: object
      additionalProperties: false
      required: [id, document_id, version_seq, revision_label, version_state, change_significance, change_reason, source_blob_sha256, author_user_id]
      properties:
        id: { type: string, format: uuid }
        document_id: { type: string, format: uuid }
        version_seq: { type: integer }
        revision_label: { type: string, example: Rev A }
        version_state:
          type: string
          enum: [Draft, InReview, Approved, Effective, Superseded, Obsolete]
        change_significance: { type: string, enum: [MAJOR, MINOR] }
        change_reason: { type: string }
        source_blob_sha256: { type: string, description: Lowercase-hex SHA-256 (content address). }
        metadata_snapshot: { type: object, additionalProperties: true }
        author_user_id: { type: string, format: uuid }
        effective_from:
          type: [string, "null"]
          format: date-time
          description: Planned/actual go-live (UTC; R8). Set at approval; the window starts here once Effective.
        effective_to:
          type: [string, "null"]
          format: date-time
          description: When this version ceased governing — set only when superseded.
        superseded_by_version_id:
          type: [string, "null"]
          format: uuid
          description: The successor that superseded this version (supersession chain), or null.
        created_at: { type: [string, "null"], format: date-time }

    CheckInResult:
      allOf:
        - $ref: "#/components/schemas/DocumentVersion"
        - type: object
          properties:
            change_detected:
              type: boolean
              description: false means identical bytes were re-checked-in — no new version.

    InitUpload:
      type: object
      additionalProperties: false
      required: [sha256]
      properties:
        sha256: { type: string, description: Client-computed lowercase-hex SHA-256 of the bytes. }
        content_type: { type: string, default: application/octet-stream }

    InitUploadResult:
      type: object
      additionalProperties: false
      required: [dedup, object_key]
      properties:
        dedup: { type: boolean, description: true means the bytes are already vaulted — skip the upload. }
        object_key: { type: string }
        upload_url:
          type: [string, "null"]
          description: A short-lived presigned PUT URL (null when dedup=true). Points at MinIO, not the api.

    CheckIn:
      type: object
      additionalProperties: false
      required: [sha256]
      properties:
        sha256: { type: string }
        change_reason: { type: string, description: "Mandatory, non-empty (INV-3)." }
        change_significance: { type: string, enum: [MAJOR, MINOR], description: Mandatory (INV-3). }
        mime_type: { type: string, default: application/octet-stream }

    Obsolete:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: { type: string, description: "Obsolescence reason (required, non-empty)." }
        version_id:
          type: [string, "null"]
          format: uuid
          description: "A Superseded version to archive (T12); omit to obsolete the Effective document (T11)."

    Release:
      type: object
      additionalProperties: false
      properties:
        version_id:
          type: [string, "null"]
          format: uuid
          description: "The Approved version to release; omit to release the sole Approved version."

    WorkingDraft:
      type: object
      additionalProperties: false
      required: [id, document_id, checked_out_by, lock_ttl_seconds]
      properties:
        id: { type: string, format: uuid }
        document_id: { type: string, format: uuid }
        checked_out_by: { type: string, format: uuid }
        checked_out_at: { type: [string, "null"], format: date-time }
        source_version_id: { type: [string, "null"], format: uuid }
        lock_ttl_seconds: { type: integer, example: 28800 }

    VersionDownload:
      type: object
      additionalProperties: false
      required: [download_url]
      properties:
        download_url: { type: string, description: "Short-lived presigned GET URL (MinIO, not the api)." }
        content_type: { type: string }
        sha256: { type: string }

    DocumentDownload:
      type: object
      additionalProperties: false
      required: [download_url, rendition]
      properties:
        download_url: { type: string, description: "Short-lived presigned GET URL (MinIO, not the api)." }
        content_type: { type: string }
        rendition:
          type: string
          enum: [controlled_copy, source]
          description: "controlled_copy = the watermarked PDF rendition; source = no controlled rendition yet (rendering or R26)."
        sha256: { type: string }

    Task:
      type: object
      additionalProperties: false
      required: [id, instance_id, stage_key, type, state]
      properties:
        id: { type: string, format: uuid }
        instance_id: { type: string, format: uuid }
        stage_key: { type: string, example: quality_approval }
        type:
          type: string
          enum:
            - APPROVE
            - REVIEW
            - PERIODIC_REVIEW
            - AUDIT_TASK
            - FINDING_ACK
            - CAPA_STAGE
            - CAPA_ACTION
            - VERIFY
            - MR_INPUT
            - MR_ACTION
            - DCR_TRIAGE
        state:
          type: string
          enum: [PENDING, CLAIMED, DONE, SKIPPED, ESCALATED, EXPIRED]
        assignee_user_id: { type: [string, "null"], format: uuid }
        candidate_pool:
          type: [array, "null"]
          items: { type: string, format: uuid }
          description: "Resolved candidate approver ids (role-derived); My-Tasks filters containment."
        action_expected: { type: [string, "null"] }
        due_at: { type: [string, "null"], format: date-time }

    WorkflowInstance:
      type: object
      additionalProperties: false
      required: [id, definition_id, definition_version, subject_type, subject_id, current_state]
      properties:
        id: { type: string, format: uuid }
        definition_id: { type: string, format: uuid }
        definition_version: { type: integer, description: "Pinned at instantiation." }
        subject_type:
          type: string
          enum: [DOCUMENT, DCR, CAPA, AUDIT, MGMT_REVIEW, PERIODIC_REVIEW]
        subject_id: { type: string, format: uuid }
        current_state:
          type: string
          description: "IN_APPROVAL | APPROVED | REJECTED_TO_DRAFT | NEEDS_ATTENTION (MVP approval-only)."
        started_at: { type: [string, "null"], format: date-time }
        revision: { type: integer }
        tasks:
          type: array
          items: { $ref: "#/components/schemas/Task" }
          description: "Present only with ?expand=tasks."

    Decision:
      type: object
      additionalProperties: false
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [approve, changes_requested, reject]
          description: "approve signs (document.approve); changes_requested/reject returns to Draft (document.review)."
        comment:
          type: [string, "null"]
          description: "Required (non-empty) for changes_requested/reject; recorded as the decision intent."
        effective_from:
          type: [string, "null"]
          format: date-time
          description: "Planned go-live on approve (R8, UTC); future dates stay Approved until the Beat sweep."

    SignatureEventSummary:
      type: object
      additionalProperties: false
      required: [id, meaning, method]
      properties:
        id: { type: string, format: uuid }
        meaning:
          type: string
          enum: [review, approval, release, obsolete, verify, disposition, import_baseline, review_confirmed]
        method: { type: string, enum: [app_click, SESSION], example: SESSION }
        content_digest: { type: [string, "null"] }
        auth_context: { type: [object, "null"], description: "OIDC acr/amr." }
        reauth_at: { type: [string, "null"], format: date-time, description: "Reserved (Part-11); NULL in v1." }
        crypto_signature: { type: [string, "null"], description: "Reserved (Part-11); NULL in v1." }

    DecisionResult:
      type: object
      additionalProperties: false
      required: [task_id, instance_id, stage_key, outcome, decided_at, decided_by]
      properties:
        task_id: { type: string, format: uuid }
        instance_id: { type: string, format: uuid }
        stage_key: { type: string }
        outcome: { type: string, enum: [approve, changes_requested, reject] }
        decided_at: { type: [string, "null"], format: date-time }
        decided_by: { type: string, format: uuid }
        signature_event:
          oneOf:
            - { $ref: "#/components/schemas/SignatureEventSummary" }
            - { type: "null" }
          description: "Present for an approval; null for changes_requested/reject."
        comment: { type: [string, "null"] }

    AuditEvent:
      type: object
      additionalProperties: false
      description: "One immutable, attributed, hash-chained audit row (doc 12 §4.2)."
      required: [id, org_id, occurred_at, actor_type, event_type, object_type]
      properties:
        id: { type: integer, format: int64, description: "Monotonic identity; a gap is a tamper signal." }
        org_id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        actor_id: { type: [string, "null"], format: uuid, description: "Null for system/Beat jobs." }
        actor_type: { type: string, enum: [user, system, external_auditor, admin] }
        event_type: { type: string, description: "Extensible enum (clients tolerate unknown values)." }
        object_type: { type: string, enum: [document, version, record, permission, user, session, config, audit] }
        object_id: { type: [string, "null"], format: uuid }
        scope_ref: { type: [string, "null"] }
        reason: { type: [string, "null"], description: "Mandatory Change Reason for content-changing events." }
        before: { type: [object, "null"], additionalProperties: true }
        after: { type: [object, "null"], additionalProperties: true }
        request_id: { type: [string, "null"], format: uuid }
        client_ip: { type: [string, "null"] }
        user_agent: { type: [string, "null"] }
        auth_context: { type: [object, "null"], additionalProperties: true }
        prev_hash: { type: [string, "null"], description: "Lowercase-hex SHA-256; null until linked." }
        row_hash: { type: [string, "null"], description: "Lowercase-hex SHA-256; null until linked." }
        chained_at: { type: [string, "null"], format: date-time, description: "Null = written-but-not-yet-chained." }
        signature_event_id: { type: [string, "null"], format: uuid, description: "Reserved Part-11 hook (null in v1)." }

    AuditEventPage:
      type: object
      additionalProperties: false
      required: [events, next_cursor]
      properties:
        events:
          type: array
          items: { $ref: "#/components/schemas/AuditEvent" }
        next_cursor: { type: [integer, "null"], format: int64, description: "Pass as ?cursor= for the next page; null at the end." }

    VerifyChainResult:
      type: object
      additionalProperties: false
      required: [verified, checked, pending, breaks]
      properties:
        verified: { type: boolean }
        checked: { type: integer, description: "Linked rows re-walked." }
        pending: { type: integer, description: "Unchained tail (not a break)." }
        breaks:
          type: array
          description: "Empty when verified; the first entry is the root cause."
          items:
            type: object
            additionalProperties: false
            required: [at_id, reason]
            properties:
              at_id: { type: integer, format: int64 }
              reason: { type: string }

    AuditExportJob:
      type: object
      additionalProperties: false
      required: [job_id, status_url]
      properties:
        job_id: { type: string }
        status_url: { type: string }

    AuditStatus:
      type: object
      additionalProperties: false
      required: [tamper_evidence_attested, sink_enabled, chain_lag_seconds]
      properties:
        tamper_evidence_attested: { type: boolean, description: "False until a genuinely off-host anchor exists (R13)." }
        sink_enabled: { type: boolean }
        chain_lag_seconds: { type: number, description: "now − oldest unchained row's occurred_at (0 if fully linked)." }

security:
  - keycloak: []
