      summary: "An approval instance (expand=tasks for its tasks). Gated by document.read on the subject."
      parameters:
        - { name: instance_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: expand, in: query, required: false, schema: { type: string, enum: [tasks] } }
      responses:
