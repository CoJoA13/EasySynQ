      tags: [retention-policies]
      operationId: createRetentionPolicy
      summary: >-
        Create a retention policy. Needs retention.manage. 422 on a malformed duration/applies_to or
        the reserved System-Default name; 409 name_taken on a per-org name collision.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RetentionPolicyCreate" }
      responses:
        "201":
          description: The created policy.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionPolicy" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /retention-policies/{policy_id}:
    parameters:
      - { name: policy_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [retention-policies]
      operationId: getRetentionPolicy
      summary: A single retention policy. Needs retention.read.
      responses:
        "200":
          description: The policy.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionPolicy" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    patch:
      tags: [retention-policies]
      operationId: updateRetentionPolicy
      summary: >-
        Edit a retention policy (partial). Needs retention.manage. Extend-forward only while the
        policy has non-disposed pinned records (doc 06 §5.2): a duration reduction, a weaker
        disposition_action, or review_required true→false is refused 422 retention_reduction_blocked
        (archive + create a shorter policy for future captures instead). The System Default cannot be
        renamed or have its applies_to changed (409 system_default_protected).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RetentionPolicyUpdate" }
      responses:
        "200":
          description: The updated policy.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionPolicy" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /retention-policies/{policy_id}/archive:
    parameters:
      - { name: policy_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [retention-policies]
      operationId: archiveRetentionPolicy
      summary: >-
        Soft-archive a policy (hide from new-capture resolution; pinned records keep it). Needs
        retention.manage. 409 system_default_protected (the System Default) or already_archived.
      responses:
        "200":
          description: The archived policy.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionPolicy" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /retention-policies/{policy_id}/unarchive:
    parameters:
