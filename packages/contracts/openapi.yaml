  /audits/{audit_id}/close:
    parameters:
      - { name: audit_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [audits]
      operationId: closeAudit
      summary: >-
        Closing → Closed. The block-until-corrected close gate (R39) returns 409 audit_close_blocked
        if any live NC finding lacks a linked CAPA at close_state=Closed. Needs audit.close.
      responses:
        "200": { $ref: "#/components/responses/AuditTransition" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/AuditTransitionConflict" }

  /audits/{audit_id}/findings:
    parameters:
      - { name: audit_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [audits]
      operationId: listFindings
      summary: The audit's findings (oldest first). Needs finding.read.
      responses:
        "200":
          description: Findings.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Finding" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [audits]
      operationId: createFinding
      summary: >-
        Log a finding against an audit. An NC mandatorily auto-creates a linked CAPA in the same
        transaction (auto_capa_id); OBSERVATION/OFI do not. NC requires a severity (422 otherwise).
        Rejected once the audit is Closed (409). Needs finding.create (PROCESS, the audit's process).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FindingCreate" }
      responses:
        "201":
          description: The created finding.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Finding" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /findings/{finding_id}:
    parameters:
      - { name: finding_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [audits]
      operationId: getFinding
      summary: A finding by id (with its correction chain). Needs finding.read.
      responses:
        "200":
          description: The finding.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Finding" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /findings/{finding_id}/correction:
    parameters:
      - { name: finding_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [audits]
      operationId: correctFinding
      summary: >-
        Correct/retype a finding by capturing a superseding successor (general retype, any direction).
        A retype TO NC auto-creates its CAPA (re-entering the close gate); NC→Observation/OFI
        declassifies. 409 if already superseded or the audit is Closed. Needs finding.create.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FindingCorrection" }
      responses:
        "201":
          description: The superseding successor finding.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Finding" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports:
    get:
      tags: [imports]
      operationId: listImportRuns
      summary: The org's import runs (newest first; optional status filter). Needs import.review.
      parameters:
        - { name: run_status, in: query, required: false, schema: { $ref: "#/components/schemas/ImportRunStatus" } }
      responses:
        "200":
          description: Import run headers.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ImportRun" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [imports]
      operationId: createImportRun
      summary: >-
        Start an import run over a read-only mounted source root + enqueue the scan. Needs
        import.execute. 422 if source_root escapes the import mount or is not a directory; 409 conflict
        (with active_run_id) if a scan is already in progress for that root.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportRunCreate" }
      responses:
        "202":
          description: The created run (status Created); poll GET until Scanned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportRun" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [imports]
      operationId: getImportRun
      summary: One import run's status + inventory summary (counts). Needs import.review.
      responses:
        "200":
          description: The run.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportRun" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/files:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [imports]
      operationId: listImportRunFiles
      summary: >-
        Paginated file inventory for a run + each file's classification proposal (S-ing-2) + the
        S-ing-4 review folded effective state, optionally filtered by disposition / kind / band, or by
        the derived review_status (folded disposition). Needs import.review.
      parameters:
        - { name: disposition, in: query, required: false, schema: { type: string, enum: [included, excluded, quarantine] } }
        - { name: kind, in: query, required: false, schema: { $ref: "#/components/schemas/ImportKind" } }
        - { name: band, in: query, required: false, schema: { $ref: "#/components/schemas/ImportConfidenceBand" } }
        - { name: review_status, in: query, required: false, schema: { type: string, enum: [included, excluded, deferred, undecided] } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200, default: 100 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        "200":
          description: The inventory page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportFileList" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/files/{file_id}:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: file_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [imports]
      operationId: getImportRunFile
      summary: >-
        One file's full review detail: inventory + extraction + the scored classification proposal
        with its evidence list (S-ing-2) + the S-ing-3 dedup membership and per-keep-item proposal
        (identifier / IA path / conflicts). Needs import.review.
      responses:
        "200":
          description: The file detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportFileDetail" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/dupe-clusters:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [imports]
      operationId: listImportDupeClusters
      summary: >-
        The run's Stage-4 duplicate clusters — exact (SHA-256) and near (MinHash/Jaccard >= 0.85),
        each with its members + the deterministic canonical pick (S-ing-3, doc 09 §7.1). Needs
        import.review.
      responses:
        "200":
          description: The dedup clusters.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportDupeClusterList" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/version-families:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [imports]
      operationId: listImportVersionFamilies
      summary: >-
        The run's Stage-4 reconstructed version families (grouped by doc-code / normalized base-name),
        each with its ordered members + the candidate effective version (S-ing-3, doc 09 §7.3). Needs
        import.review.
      responses:
        "200":
          description: The version families.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportVersionFamilyList" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/checklist:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [imports]
      operationId: getImportReviewChecklist
      summary: >-
        The S-ing-4 pre-commit checklist (doc 09 §9.3): ready + blocking conflicts (duplicate
        identifier / vault collision / ambiguous-over-threshold, over the EFFECTIVE folded state) +
        the non-blocking mandatory-star coverage projection + advisory counts + folded review stats.
        Needs import.review.
      responses:
        "200":
          description: The pre-commit checklist.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/decisions:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [imports]
      operationId: listImportDecisions
      summary: >-
        The run's append-only review-decision log, newest-first (doc 09 §12.2). Needs import.review.
      responses:
        "200":
          description: The decision log.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [imports]
      operationId: recordBulkImportDecisions
      summary: >-
        Apply ONE dimensional action (accept / correct / exclude / defer) across an explicit file_ids
        list OR a selector filter (kind / band / disposition) — the doc 09 §9.2a bulk-triage scale
        lever. Bulk kind-confirm (after.kind) is the explicit human act (R10). An optional
        Idempotency-Key header makes a retry a no-op replay. Needs import.review.
      parameters:
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportBulkDecisionRequest" }
      responses:
        "200":
          description: The applied count (or a replay).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/files/{file_id}/decision:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: file_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [imports]
      operationId: recordImportFileDecision
      summary: >-
        Record one per-file dimensional decision (accept / correct / exclude / defer + the R10
        kind-confirm via after.kind; doc 09 §9.2). Merge/split are rejected here (422) — they are
        structural and have dedicated endpoints. An optional Idempotency-Key header makes a retry a
        no-op replay. Needs import.review. 409 if the run is not Proposed/Reviewing.
      parameters:
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportFileDecisionRequest" }
      responses:
        "200":
          description: The decision result + the file's folded review state.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/merge:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [imports]
      operationId: mergeImportFiles
      summary: >-
        Combine >=2 files into one version family (force the revision chain; doc 09 §9.2). Sets the
        family's effective member + reconstruct_revision_chain (the per-family R10 opt-in), preserves
        other families' flags, and re-derives the proposal nodes. An optional Idempotency-Key header
        makes a retry a no-op replay. Needs import.review.
      parameters:
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportMergeRequest" }
      responses:
        "200":
          description: The created/updated version family.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/split:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [imports]
      operationId: splitImportCluster
      summary: >-
        Break members out of a dupe-cluster / version-family (doc 09 §9.2). A group dropping below 2
        members is deleted; the separated files (and any survivor) become standalone keep-items, then
        the proposal nodes are re-derived. An optional Idempotency-Key header makes a retry a no-op
        replay. Needs import.review.
      parameters:
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportSplitRequest" }
      responses:
        "200":
          description: The split result.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/cancel:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [imports]
      operationId: cancelImportRun
      summary: >-
        Abort an import run (the worker stops cooperatively). Needs import.execute. 409 if the run is
        already in a terminal state.
      responses:
        "200":
          description: The cancelled run.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportRun" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /admin/imports/{import_id}/commit:
    parameters:
      - { name: import_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [imports]
      operationId: commitImportRun
      summary: >-
        S-ing-5 — commit a reviewed run's commit-ready keep-items into the vault (the ONLY verb that
        writes the vault), or RESUME a PartiallyCommitted one. Each commit_ready keep-item (included +
        kind-confirmed) becomes an Effective Rev A controlled document or an immutable Record,
        per-item + idempotent. Flips the run to Committing + enqueues the detached commit worker; poll
        GET /admin/imports/{id} for the final Completed / PartiallyCommitted + counts.commit. Needs
        import.commit — the SoD commit tier (above import.review / import.execute).
      responses:
        "202":
          description: Accepted — the run is Committing; poll for the terminal status + counts.commit.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportRun" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: >-
            commit_blocked — the §9.3 pre-commit checklist has unresolved blocking conflicts
            (members.blocking lists them).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "423": { $ref: "#/components/responses/ProblemResponse" }

  /evidence-packs:
    get:
      tags: [evidence-packs]
      operationId: listEvidencePacks
      summary: List the org's evidence packs (newest first). Needs report.evidence_pack.generate.
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        "200":
          description: Evidence pack headers.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/EvidencePack" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
    post:
      tags: [evidence-packs]
      operationId: createEvidencePack
      summary: Create a pack (DRAFT) + compute its preview. Needs report.evidence_pack.generate.
      description: >-
        Resolves the in-scope record candidates (CLAUSE / PROCESS / FINDING / CAPA scope, optional
        date overlay) and classifies each through the generator's deny-by-default record.read (R28:
        INCLUDED / EXCLUDED_PERMISSION / EXCLUDED_ABSENCE — nothing silently dropped), persisting the
        membership + the gap/exclusion summaries. A FINDING/CAPA pack also bundles a sealed dossier
        (the finding fields / CAPA stage trail + e-signatures). The preview is advisory — POST
        .../generate seals it.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvidencePackCreate" }
      responses:
        "201":
          description: The DRAFT pack with its preview membership + summaries.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidencePackDetail" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "422":
          description: >-
            Validation error — bad scope_kind, an empty/invalid id list for the scope kind, an unknown
            clause/process/finding/CAPA, or period_end before period_start.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /evidence-packs/{pack_id}:
    parameters:
      - { name: pack_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [evidence-packs]
      operationId: getEvidencePack
      summary: The pack header + membership + status (the build poll endpoint). Needs report.evidence_pack.generate.
      description: >-
        status is DRAFT → BUILDING → SEALED | FAILED. Membership/summaries reflect the seal-time
        classification once SEALED (the preview is advisory).
      responses:
        "200":
          description: The pack header, membership, and gap/exclusion summaries.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidencePackDetail" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /evidence-packs/{pack_id}/generate:
    parameters:
      - { name: pack_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [evidence-packs]
      operationId: generateEvidencePack
      summary: Enqueue the immutable build/seal (DRAFT/FAILED → BUILDING). Needs report.evidence_pack.generate.
      description: >-
        Flips the pack to BUILDING and enqueues the worker build; poll GET /evidence-packs/{pack_id}
        for SEALED. Re-triggerable from FAILED.
      responses:
        "202":
          description: The pack flipped to BUILDING; the build runs asynchronously.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidencePack" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The pack is already SEALED (terminal) or a build is already in progress.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /evidence-packs/{pack_id}/download:
    parameters:
      - { name: pack_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [evidence-packs]
      operationId: downloadEvidencePack
      summary: Presign the sealed pack ZIP. Needs report.export.
      responses:
        "200":
          description: A presigned GET URL for the sealed pack ZIP (+ its sha256).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidencePackDownload" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409":
          description: The pack is not SEALED yet (detail carries the current status).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /evidence-packs/{pack_id}/share:
    parameters:
      - { name: pack_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [evidence-packs]
      operationId: shareEvidencePack
      summary: "Mint a time-boxed Ed25519 share link for a SEALED pack (UJ-7). Needs report.evidence_pack.generate."
      description: >-
        External-auditor delivery (S-pack-2, doc 06 §7.4): mints a signed, time-boxed, revocable
        bearer token and returns it (+ the share URL) ONCE — only its digest is stored. The pack must
        be SEALED (409 else); 503 if the signing key is not provisioned.
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShareLinkCreate" }
      responses:
        "201":
          description: The created share link, with the raw token shown once.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShareLinkCreated" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "503": { $ref: "#/components/responses/ProblemResponse" }

  /evidence-packs/{pack_id}/share-links:
    parameters:
      - { name: pack_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [evidence-packs]
      operationId: listEvidencePackShareLinks
      summary: "List a pack's share links (management view; no raw token). Needs report.evidence_pack.generate."
      responses:
        "200":
          description: The pack's share links (token digest prefix only).
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ShareLink" } }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }

  /evidence-packs/{pack_id}/share-links/{link_id}/revoke:
    parameters:
      - { name: pack_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: link_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [evidence-packs]
      operationId: revokeEvidencePackShareLink
      summary: "Revoke a share link (immediate). Needs report.evidence_pack.generate."
      description: >-
        Revocation is immediate — the public endpoint re-checks the row on every access. The sealed
        pack is untouched (doc 06 §7.4 frozen snapshot). 409 if already revoked.
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShareLinkRevoke" }
      responses:
        "200":
          description: The revoked share link.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShareLink" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }

  /evidence-packs/shared:
    get:
      tags: [evidence-packs]
      operationId: sharedPackLanding
      summary: "Public guest landing for a shared pack (no auth). The signed token is the authorization."
      description: >-
        S-pack-2 external delivery (doc 06 §7.4, UJ-7): an HTML landing page showing the pack summary
        (scope, period, content_hash, gap + exclusion counts — R28 honesty) and the download links, or
        an honest expired/revoked/invalid message. Latch-exempt; Referrer-Policy: no-referrer.
      security: []
      parameters:
        - name: t
          in: query
          required: true
          schema: { type: string }
          description: The signed share token from the delivery link.
      responses:
        "200":
          description: An HTML landing page for the shared pack.
          content:
            text/html: { schema: { type: string } }
        "403":
          description: The link is invalid, expired, or revoked (HTML).
          content:
            text/html: { schema: { type: string } }

  /evidence-packs/shared/download:
    get:
      tags: [evidence-packs]
      operationId: sharedPackDownload
      summary: "Public guest download of a shared pack (no auth), streamed through the API."
      description: >-
        Verifies the token + the revocable DB state on every request (revoke is immediate), audits
        PACK_DOWNLOADED, and streams the bytes through the API (no presigned URL outlives a revoke).
        format=zip is the canonical sealed bundle; format=pdf is the live-stamped portfolio variant
        (409 if the portfolio is unavailable). Latch-exempt; Referrer-Policy: no-referrer.
      security: []
      parameters:
        - { name: t, in: query, required: true, schema: { type: string } }
        - { name: format, in: query, required: false, schema: { type: string, enum: [zip, pdf], default: zip } }
      responses:
        "200":
          description: The pack bytes (application/zip, or application/pdf for the portfolio).
          content:
            application/zip: { schema: { type: string, format: binary } }
            application/pdf: { schema: { type: string, format: binary } }
        "403":
          description: The link is invalid, expired, or revoked.
        "409":
          description: The requested format is not available (e.g. no PDF portfolio).

  /tasks:
    get:
      tags: [tasks]
      operationId: listTasks
      summary: "My Tasks — tasks assigned to the caller or where the caller is a candidate (self-scoped)."
      parameters:
