# Redocly CLI config: lint + bundle the OpenAPI-first contract.
# `redocly bundle openapi.yaml -o dist/openapi.json` produces the artifact that
# datamodel-code-generator (Pydantic v2) and openapi-typescript consume.
extends:
  - recommended

rules:
  operation-operationId: error          # every operation needs a stable operationId (codegen)
  operation-operationId-unique: error
  operation-2xx-response: error
  operation-4xx-response: off            # health/public probes intentionally declare 2xx only
  no-unused-components: warn
  security-defined: error

apis:
  main:
    root: ./openapi.yaml
