# Pre-commit hooks for both stacks. `pre-commit install` after `just setup`.
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/api/
      - id: ruff-format
        files: ^apps/api/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^apps/api/src/
        additional_dependencies: [pydantic>=2, "sqlalchemy[mypy]>=2", pydantic-settings]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks            # D1: no secrets in git

  - repo: local
    hooks:
      - id: contracts-check
        name: openapi contract in sync
        entry: bash scripts/gen-contracts.sh --check
        language: system
        files: ^packages/contracts/
        pass_filenames: false
