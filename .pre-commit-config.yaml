# Pre-commit hooks for both stacks. `pre-commit install` after `just setup`.
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pin to the SAME ruff the CI `api` job runs (`uv run ruff` = 0.15.17, uv-pinned). The local
    # pre-commit ruff-format MUST match CI's, or the two wrap the same code differently and fight —
    # e.g. v0.6.9 wrapped a long `assert cond, (msg)` as `assert (\n cond\n), msg` while 0.15.17
    # wraps it as `assert cond, (\n msg\n)`, so a commit looped (pre-commit reformats → abort → uv
    # re-reformats → CI). Bump this in lockstep with the uv.lock ruff pin (the S-context-2 lesson).
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/api/
      - id: ruff-format
        files: ^apps/api/

  - repo: local
    hooks:
      # Run the PROJECT's mypy (uv-pinned + full deps/stubs + the [tool.mypy] overrides),
      # IDENTICAL to the CI `api` job's `uv run mypy src`. The old mirrors-mypy hook ran an OLDER
      # mypy in an isolated venv missing the stub packages (types-PyYAML/types-redis) and PEP-695
      # support — so it errored on UNTOUCHED files (yaml/redis imports, `type`/`def f[T]`) and
      # blocked every commit. `language: system` reuses the project venv via `uv run`.
      - id: mypy
        name: mypy (strict, apps/api/src — uv run, matches CI)
        entry: bash -c 'cd apps/api && uv run mypy src'
        language: system
        files: ^apps/api/src/
        pass_filenames: false
        require_serial: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks            # D1: no secrets in git

  - repo: local
    hooks:
      # Match the CI `contracts` job EXACTLY: redocly-lint the contract with its config (which sets
      # operation-4xx-response: off, etc.). The contract is lint-only, NOT codegen (CLAUDE.md), so
      # the old `gen-contracts.sh --check` (codegen + a .contract.lock hash gate over a dormant
      # pipeline) is not the gate — and it was doubly broken: a `ROOT="$(A || B && pwd)"` precedence
      # bug made ROOT two lines, mangling the spec path ("openapi.yaml does not exist"). The codegen
      # script (now fixed) stays available via `just contracts`.
      - id: contracts-lint
        name: openapi contract lint (redocly --config, matches CI)
        entry: npx --yes @redocly/cli lint --config packages/contracts/redocly.yaml packages/contracts/openapi.yaml
        language: system
        files: ^packages/contracts/
        pass_filenames: false
