# EasySynQ — single-host Docker Compose stack (base). Profiles in compose.{s,m}.yml.
# Only the `proxy` (Caddy) publishes host ports; everything else is on the internal
# network (D1). OpenSearch is intentionally absent in the MVP (R34).
#
#   docker compose -f infra/compose/compose.yml -f infra/compose/compose.s.yml up -d
#
# Healthchecks use tooling guaranteed present in each image (pg_isready, redis-cli,
# python in the api image, node in the web image). MinIO/Keycloak/Gotenberg lack a
# bundled http client, so they use service_started ordering + in-script retries; the
# app's own /readyz reports their true reachability.
name: easysynq

x-api-build: &api-build
  context: ../..
  dockerfile: apps/api/Dockerfile

x-api-env: &api-env
  env_file: ../../.env

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-easysynq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easysynq}
      POSTGRES_DB: ${POSTGRES_DB:-easysynq}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easysynq} -d ${POSTGRES_DB:-easysynq}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [internal]

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [internal]

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-easysynq}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-easysynqsecret}
    volumes:
      - miniodata:/data
    networks: [internal]

  # One-shot: create buckets with object-lock (WORM) + the GOVERNANCE retention default (D-7).
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on: [minio]
    entrypoint: ["/bin/sh", "/init/minio-init.sh"]
    environment:
      MC_HOST_local: http://${S3_ACCESS_KEY:-easysynq}:${S3_SECRET_KEY:-easysynqsecret}@minio:9000
    volumes:
      - ./minio:/init:ro
    networks: [internal]
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      # Same admin credential the worker uses for the S11 realm export (KEYCLOAK_ADMIN_USER/PASSWORD).
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      # Honor Caddy's X-Forwarded-* so tokens are issued for the browser-facing host.
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    networks: [internal]

  # S7b: office→PDF for the watermarked controlled-copy renditions. Pinned (consistent with the
  # other pinned images). No healthcheck — the gotenberg image bundles no http client (see header)
  # and rendering is resilient anyway: a renderer outage yields render_status=pending and the next
  # mirror reconcile re-renders (a renderer probe in /readyz is a v1 add).
  renderer:
    image: gotenberg/gotenberg:8.33
    restart: unless-stopped
    command: ["gotenberg", "--api-port=3000"]
    networks: [internal]

  # S-ing-2: text extraction + OCR for the ingestion engine (doc 09 §5). The Apache Tika ``-full``
  # image bundles the extractors (~1000 formats) AND Tesseract OCR + tessdata, so extraction AND OCR
  # run locally over HTTP (no telemetry, D1) — the worker reaches it at TIKA_URL (http://tika:9998).
  # Pinned (confirm/bump the -full tag as Tika releases). No healthcheck (the Gotenberg precedent —
  # a JVM image with no bundled http client; a Tika outage degrades a file to extract_failed and the
  # run continues, §5.3). JVM footprint ~1 GB (fits the S-profile budget alongside the other services).
  tika:
    image: apache/tika:3.3.1.0-full
    restart: unless-stopped
    networks: [internal]

  # Run migrations to head, then exit. The api waits for this to complete.
  migrate:
    build: *api-build
    <<: *api-env
    command: ["uv", "run", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: "no"

  api:
    build: *api-build
    <<: *api-env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""
      interval: 10s
      timeout: 3s
      retries: 12
    volumes:
      # R11 mount contract (doc 18 §3 / doc 04 §10.6): users/api see the mirror READ-ONLY; only the
      # worker UID writes it (worker mounts it rw below). The user-facing content route stays the
      # presigned-MinIO download — Caddy must NOT file_server this (it would bypass the PEP).
      - mirror:/var/lib/easysynq/qms-mirror:ro
      - secrets:/run/secrets   # S7c: shared verify-token signing key (api verifies what worker mints)
    networks: [internal]

  worker:
    build: *api-build
    <<: *api-env
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "easysynq_api.tasks.app", "worker", "-l", "info"]
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      renderer:
        condition: service_started   # S7b: the worker renders via gotenberg (resilient if it lags)
      tika:
        condition: service_started   # S-ing-2: the worker extracts/OCRs via tika (resilient if it lags)
    volumes:
      - mirror:/var/lib/easysynq/qms-mirror   # worker writes the read-only mirror (R11)
      - secrets:/run/secrets   # S7c: shared verify-token signing key (worker mints the QR token)
      - backup:/var/lib/easysynq/backups   # S8b2: durable backup archives + the restore-test drill
      # S-ing-1: the import source tree, mounted READ-ONLY (NG3 — the engine physically cannot write
      # back). Only the worker walks it; IMPORT_SOURCE_ROOT (=/srv/import/source) is the confinement root.
      - ${IMPORT_SOURCE_PATH:-./.import-source}:/srv/import/source:ro
    networks: [internal]

  # Scheduler — EXACTLY ONE replica (two would double-fire). Asserted in profile overlays.
  beat:
    build: *api-build
    <<: *api-env
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "easysynq_api.tasks.app", "beat", "-l", "info"]
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 12
    networks: [internal]

  proxy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [api, web]
    environment:
      # SITE_ADDRESS=:80 (dev, plain HTTP) or a domain (prod → automatic HTTPS). CADDY_TLS_DIRECTIVE
      # is empty by default (ACME on a domain; no-op on :80); the air-gap overlay sets it to
      # "tls internal" (the self-signed CA) since ACME is unreachable offline.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      CADDY_TLS_DIRECTIVE: ${CADDY_TLS_DIRECTIVE:-}
      # Browser presigned upload/download go DIRECTLY to the object store (a different origin), so the
      # SPA CSP connect-src must allow it (empty when the object store is same-origin behind Caddy).
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    networks:
      internal:
        aliases:
          - easysynq.local

  # Dev-only SMTP catcher (email is best-effort in MVP). Enable with --profile dev.
  mailpit:
    image: axllent/mailpit:v1.30.1
    profiles: [dev]
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  miniodata:
  mirror:
  secrets:
  backup:   # S8b2: durable backup destination (default backup_policy.destination; a mounted path)
  caddydata:
  caddyconfig:
